{word:"Dominum",answer:"2nd decl., acc. sg. — the Lord (object)",options:["2nd decl., nom. sg. — the Lord (subject)","2nd decl., gen. sg. — of the Lord","2nd decl., acc. sg. — the Lord (object)","2nd decl., abl. sg. — by the Lord"]},
{word:"pacis",answer:"3rd decl., gen. sg. — of peace",options:["3rd decl., nom. sg. — peace (subject)","3rd decl., gen. sg. — of peace","3rd decl., dat. sg. — to/for peace","3rd decl., acc. sg. — peace (object)"]},
{word:"Domine",answer:"2nd decl., voc. sg. — O Lord!",options:["2nd decl., nom. sg. — the Lord","2nd decl., abl. sg. — by the Lord","2nd decl., voc. sg. — O Lord!","2nd decl., dat. sg. — to the Lord"]},
{word:"gratiam",answer:"1st decl., acc. sg. — grace (object)",options:["1st decl., nom. sg. — grace (subject)","1st decl., gen. sg. — of grace","1st decl., acc. sg. — grace (object)","1st decl., abl. sg. — by/with grace"]},
{word:"Patris",answer:"3rd decl., gen. sg. — of the Father",options:["3rd decl., nom. sg. — the Father","3rd decl., gen. sg. — of the Father","3rd decl., acc. sg. — the Father (object)","3rd decl., dat. sg. — to the Father"]},
{word:"verbum",answer:"2nd decl. neut., nom./acc. sg. — word",options:["2nd decl., nom. sg. (masc.) — word","2nd decl. neut., nom./acc. sg. — word","2nd decl., acc. sg. — word (object)","2nd decl., gen. sg. — of the word"]},
{word:"peccata",answer:"2nd decl. neut., nom./acc. pl. — sins",options:["1st decl., nom. sg. — sin","2nd decl. neut., nom./acc. pl. — sins","1st decl., abl. sg. — by sin","2nd decl., gen. sg. — of sin"]},
{word:"caelorum",answer:"2nd decl., gen. pl. — of the heavens",options:["2nd decl., nom. pl. — heavens","2nd decl., acc. pl. — heavens (object)","2nd decl., gen. pl. — of the heavens","2nd decl., abl. pl. — in the heavens"]},
{word:"nominis",answer:"3rd decl., gen. sg. — of the name",options:["3rd decl., nom. sg. — the name","3rd decl., gen. sg. — of the name","3rd decl., dat. sg. — to/for the name","3rd decl., abl. sg. — by the name"]},
{word:"vitam",answer:"1st decl., acc. sg. — life (object)",options:["1st decl., nom. sg. — life (subject)","1st decl., acc. sg. — life (object)","1st decl., abl. sg. — by/with life","1st decl., gen. sg. — of life"]},
{word:"Filii",answer:"2nd decl., gen. sg. — of the Son",options:["2nd decl., nom. pl. — sons","2nd decl., gen. sg. — of the Son","2nd decl., dat. sg. — to the Son","2nd decl., voc. sg. — O Son!"]},
{word:"nomine",answer:"3rd decl., abl. sg. — by/in the name",options:["3rd decl., nom. sg. — name","3rd decl., gen. sg. — of the name","3rd decl., abl. sg. — by/in the name","3rd decl., acc. sg. — name (object)"]},
{word:"laudamus",answer:"1st conj., 1st pl. present indicative — we praise",options:["1st conj., 1st pl. present indicative — we praise","1st conj., 1st pl. present subjunctive — let us praise","1st conj., 1st pl. perfect — we praised","1st conj., 1st pl. imperfect — we were praising"]},
{word:"oremus",answer:"1st conj., 1st pl. present subjunctive — let us pray",options:["1st conj., 1st pl. present indicative — we pray","1st conj., 1st pl. present subjunctive — let us pray","1st conj., 1st pl. future — we will pray","1st conj., 2nd pl. imperative — pray!"]},
{word:"sanctificetur",answer:"Passive subjunctive, 3rd sg. — may it be hallowed",options:["Active indicative, 3rd sg. — it hallows","Passive indicative, 3rd sg. — it is hallowed","Passive subjunctive, 3rd sg. — may it be hallowed","Active subjunctive, 3rd sg. — may it hallow"]},
{word:"fiat",answer:"Subjunctive, 3rd sg. of fieri — may it be done",options:["Indicative, 3rd sg. — it becomes","Subjunctive, 3rd sg. of fieri — may it be done","Imperative, 2nd sg. — become!","Perfect, 3rd sg. — it was done"]},
{word:"dixit",answer:"3rd conj., 3rd sg. perfect — he/she said",options:["3rd conj., 3rd sg. present — he/she says","3rd conj., 3rd sg. imperfect — he/she was saying","3rd conj., 3rd sg. perfect — he/she said","3rd conj., 3rd sg. future — he/she will say"]},
{word:"credidimus",answer:"3rd conj., 1st pl. perfect — we have believed",options:["3rd conj., 1st pl. present — we believe","3rd conj., 1st pl. imperfect — we were believing","3rd conj., 1st pl. perfect — we have believed","3rd conj., 1st pl. future — we will believe"]},
{word:"venite",answer:"4th conj., 2nd pl. imperative — come!",options:["4th conj., 2nd pl. present — you come","4th conj., 2nd pl. imperative — come!","4th conj., 2nd pl. perfect — you came","4th conj., 2nd pl. subjunctive — you may come"]},
];
let parseIdx=0,parseAnswered=false;
function renderParsingDrill(){
  const item=PARSE_ITEMS[parseIdx%PARSE_ITEMS.length];
  $("practice-content").innerHTML=`<div class="parse-card"><div style="font-size:0.8rem;color:var(--brown-muted);margin-bottom:6px">Question ${(parseIdx%PARSE_ITEMS.length)+1} of ${PARSE_ITEMS.length}</div><div class="parse-word">${item.word}</div><div class="parse-hint">Identify the form:</div><div class="parse-options">${item.options.map((o,i)=>`<button class="parse-option" data-oidx="${i}">${o}</button>`).join('')}</div></div>${parseAnswered?`<div style="text-align:center;margin-top:10px"><button class="next-btn" id="parse-next">Next \u2192</button></div>`:''}`;
  if(!parseAnswered){document.querySelectorAll(".parse-option").forEach(b=>b.addEventListener("click",()=>{
    parseAnswered=true;const isCorrect=item.options[parseInt(b.dataset.oidx)]===item.answer;
    document.querySelectorAll(".parse-option").forEach(o=>{o.classList.add("disabled");if(item.options[parseInt(o.dataset.oidx)]===item.answer)o.classList.add("correct");});
    if(!isCorrect)b.classList.add("wrong");
    if(isCorrect){playCorrect();haptic("success");S.score.correct++;S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;}else{playWrong();haptic("error");S.streak=0;}
    S.score.total++;recordStudyDay();saveState();renderParsingDrill();
  }));}
  const nb=$("parse-next");if(nb)nb.addEventListener("click",()=>{parseIdx++;parseAnswered=false;renderParsingDrill();});
}

// ═══════════════════════════════════════════════════════════════════
// CONJUGATION DRILL
// ═══════════════════════════════════════════════════════════════════
const CONJ_DRILLS=[
{verb:"laudare",meaning:"to praise",conj:"1st",tense:"Present",forms:["laudo","laudas","laudat","laudamus","laudatis","laudant"]},
{verb:"videre",meaning:"to see",conj:"2nd",tense:"Present",forms:["video","vides","videt","videmus","videtis","vident"]},
{verb:"credere",meaning:"to believe",conj:"3rd",tense:"Present",forms:["credo","credis","credit","credimus","creditis","credunt"]},
{verb:"audire",meaning:"to hear",conj:"4th",tense:"Present",forms:["audio","audis","audit","audimus","auditis","audiunt"]},
{verb:"orare",meaning:"to pray",conj:"1st",tense:"Present",forms:["oro","oras","orat","oramus","oratis","orant"]},
{verb:"laudare",meaning:"to praise",conj:"1st",tense:"Imperfect",forms:["laudabam","laudabas","laudabat","laudabamus","laudabatis","laudabant"]},
{verb:"laudare",meaning:"to praise",conj:"1st",tense:"Perfect",forms:["laudavi","laudavisti","laudavit","laudavimus","laudavistis","laudaverunt"]},
{verb:"esse",meaning:"to be",conj:"irreg.",tense:"Present",forms:["sum","es","est","sumus","estis","sunt"]},
{verb:"esse",meaning:"to be",conj:"irreg.",tense:"Imperfect",forms:["eram","eras","erat","eramus","eratis","erant"]},
];
const PERSONS=["1st sg. (I)","2nd sg. (you)","3rd sg. (he/she)","1st pl. (we)","2nd pl. (you all)","3rd pl. (they)"];
let conjIdx=0;
function renderConjugationDrill(){
  const drill=CONJ_DRILLS[conjIdx%CONJ_DRILLS.length];
  $("practice-content").innerHTML=`<div class="parse-card"><div style="font-size:0.8rem;color:var(--brown-muted);margin-bottom:4px">Drill ${(conjIdx%CONJ_DRILLS.length)+1} of ${CONJ_DRILLS.length}</div><div class="parse-word">${drill.verb}</div><div class="parse-hint">${drill.meaning} — ${drill.conj} conj., ${drill.tense} tense</div>
<table class="conj-table"><thead><tr><th>Person</th><th>Form</th></tr></thead><tbody>${PERSONS.map((p,i)=>`<tr><td>${p}</td><td><input class="conj-input" data-idx="${i}" placeholder="..."></td></tr>`).join('')}</tbody></table>
<div style="text-align:center;margin-top:10px"><button class="drill-btn" id="conj-check">Check</button><button class="drill-btn" id="conj-show" style="background:transparent;color:var(--brown-soft);border:1px solid var(--gold-border-strong)">Show</button><button class="drill-btn" id="conj-next" style="background:transparent;color:var(--brown-soft);border:1px solid var(--gold-border-strong)">Next Verb \u2192</button></div></div>`;
  $("conj-check").addEventListener("click",()=>{
    const norm=s=>s.trim().toLowerCase().replace(/[\u0101\u0113\u012b\u014d\u016b]/g,m=>({"\u0101":"a","\u0113":"e","\u012b":"i","\u014d":"o","\u016b":"u"}[m]||m));
    document.querySelectorAll(".conj-input").forEach(inp=>{const idx=parseInt(inp.dataset.idx);const ans=drill.forms[idx];inp.classList.remove("correct","wrong");inp.classList.add(norm(inp.value)===norm(ans)?"correct":"wrong");});
    const allOk=document.querySelectorAll(".conj-input.wrong").length===0&&document.querySelectorAll(".conj-input.correct").length>0;
    if(allOk){playAchievement();haptic("success");}else{haptic("error");}recordStudyDay();
  });
  $("conj-show").addEventListener("click",()=>{document.querySelectorAll(".conj-input").forEach(inp=>{inp.value=drill.forms[parseInt(inp.dataset.idx)];inp.classList.remove("wrong");inp.classList.add("correct");});});
  $("conj-next").addEventListener("click",()=>{conjIdx++;renderConjugationDrill();});
}

  $("view-mass").innerHTML=`
${ST("Missa \u2014 The Ordinary of the Mass")}
<p class="instructions">Walk through the entire Mass. Latin responses are annotated with grammatical notes.</p>
${MASS_DATA.map(part=>`<div class="mass-section"><div class="mass-part-title">${part.part}</div>${part.items.map(it=>`<div class="mass-item"><div class="mass-speaker">${it.s}</div><div class="mass-latin">${it.la}</div><div class="mass-english">${it.en}</div>${it.n?`<div class="mass-note">${it.n}</div>`:''}</div>`).join("")}</div>`).join("")}`;

function renderHymns(){

${ST("Hymni \u2014 Sacred Hymns")}
<p class="instructions">Famous Latin hymns with English translations. Tap to expand.</p>
${HYMNS.map((h,i)=>`<div class="hymn-card ${S._hymnExp===i?'expanded':''}" data-idx="${i}"><button class="hymn-header"><div><div class="hymn-title">${h.title}</div><div class="hymn-subtitle">${h.sub}</div></div><span class="prayer-arrow">\u25be</span></button><div class="hymn-body"><div class="hymn-text">${h.la}</div><div class="prayer-translation"><div class="prayer-trans-label">English:</div>${h.en.replace(/\n/g,'<br>')}</div></div></div>`).join("")}`;

}

// ═══════════════════════════════════════════════════════════════════
// SCRIPTURE
// ═══════════════════════════════════════════════════════════════════
function renderScripture(){
  const sections=[{id:"john",label:"Gospel of John"},{id:"vulgate",label:"Vulgate Core Words"},{id:"bookmarks",label:"\u2661 Bookmarks"},{id:"other",label:"Other Passages"}];
  let content="";
  const fz=S.fontSize||1;
  const fontStyle="font-size:"+(fz*100)+"%";
  if(S.scrSection==="john"){
    const ch=JOHN_CHAPTERS[S.scrChapter];
    content=`<div class="font-controls"><button class="font-btn" id="font-down">A\u2212</button><span class="font-label">Text Size</span><button class="font-btn" id="font-up">A+</button></div>
<div class="scripture-nav">${JOHN_CHAPTERS.map((c,i)=>`<button class="scripture-nav-btn ${S.scrChapter===i?'active':''}" data-ch="${i}">Ch. ${c.ch}</button>`).join('')}</div>
<div class="chapter-title">${ch.title}</div>
<div class="chapter-subtitle">${ch.subtitle}</div>
<p class="instructions">Tap any Latin word to see its definition. Grammar notes appear below each verse.</p>
<div class="interlinear" style="${fontStyle}">${ch.verses.map(v=>{const ref="Io."+ch.ch+":"+v.v;const bk=isBookmarked(ref);const words=v.la.split(/\b/).map(w=>/[a-zA-ZāēīōūÀ-ÿ]{2,}/.test(w)?`<span class="word-tap" data-word="${w}">${w}</span>`:w).join('');return`<div class="il-line ${bk?'bookmarked':''}"><button class="verse-bookmark ${bk?'active':''}" data-ref="${ref}" title="Bookmark">${bk?'\u2665':'\u2661'}</button><div class="il-latin"><span class="verse-num">${v.v}</span>${words}</div><div class="il-english">${v.en}</div>${v.n?`<div class="il-note">${v.n}</div>`:''}</div>`;}).join('')}</div>
<div style="display:flex;justify-content:space-between;margin-top:20px">${S.scrChapter>0?`<button class="next-btn" id="prev-ch">\u2190 Ch. ${JOHN_CHAPTERS[S.scrChapter-1].ch}</button>`:'<div></div>'}${S.scrChapter<JOHN_CHAPTERS.length-1?`<button class="next-btn" id="next-ch">Ch. ${JOHN_CHAPTERS[S.scrChapter+1].ch} \u2192</button>`:'<div></div>'}</div>`;
  } else if(S.scrSection==="vulgate"){
    const cats=["All","noun","verb","adj","prep","conj","pron","adv"];
    let filtered=S.vcFilter==="All"?VULGATE_CORE:VULGATE_CORE.filter(w=>w.pos===S.vcFilter);
    if(S.vcSearch){const q=S.vcSearch.toLowerCase();filtered=filtered.filter(w=>w.la.toLowerCase().includes(q)||w.en.toLowerCase().includes(q));}
    content=`<p class="instructions">The most frequent words in the Latin Vulgate. Master these to read ~80% of the text.</p>
<input type="text" class="vc-search" id="vc-search" placeholder="Search words..." value="${S.vcSearch||''}">
<div class="vc-filter-row">${cats.map(c=>`<button class="vc-filter-btn ${S.vcFilter===c?'active':''}" data-vcat="${c}">${c==="All"?"All ("+VULGATE_CORE.length+")":c}</button>`).join('')}</div>
<div class="vc-count" style="font-size:0.82rem;color:var(--brown-muted);margin-bottom:10px">Showing ${filtered.length} words</div>
${filtered.map((w,i)=>`<div class="vc-card" data-vci="${i}"><div><span class="vc-latin">${w.la}</span><span class="vc-pos">${w.pos}</span><div class="vc-english">${w.en}</div>${w.note?`<div class="vc-note">${w.note}</div>`:''}</div></div>`).join('')}`;
  } else if(S.scrSection==="bookmarks"){
    if(S.bookmarks.length===0){
      content='<div style="text-align:center;padding:40px 20px;color:var(--brown-muted)"><div style="font-size:2rem;margin-bottom:10px">\u2661</div><p>No bookmarked verses yet.</p><p style="font-size:0.85rem;margin-top:8px">Tap the heart icon on any verse while reading to save it here.</p></div>';
    } else {
      const bkVerses=[];
      S.bookmarks.forEach(ref=>{const m=ref.match(/Io\.(\d+):(\d+)/);if(m){const ch=JOHN_CHAPTERS.find(c=>c.ch===parseInt(m[1]));if(ch){const v=ch.verses.find(x=>x.v===parseInt(m[2]));if(v)bkVerses.push({ref,ch:ch.ch,...v});}}});
      content=`<p class="instructions">Your saved verses (${bkVerses.length})</p><div class="interlinear">${bkVerses.map(v=>`<div class="il-line bookmarked"><button class="verse-bookmark active" data-ref="${v.ref}" title="Remove">\u2665</button><div class="il-latin"><span class="verse-num">Io.${v.ch}:${v.v}</span>${v.la}</div><div class="il-english">${v.en}</div></div>`).join('')}</div>`;
    }
  } else {
    content=SCRIPTURE.map(s=>`<div style="margin-bottom:28px"><h3 style="font-size:1.1rem;color:var(--brown-mid);margin-bottom:2px">${s.title}</h3><p style="font-size:0.82rem;color:var(--gold);margin-bottom:12px;font-weight:600">${s.ref}</p><div class="interlinear">${s.lines.map(l=>`<div class="il-line"><div class="il-latin">${l.la}</div><div class="il-english">${l.en}</div></div>`).join('')}</div></div>`).join('');
  }
  $("view-scripture").innerHTML=`
${ST("Scriptura Sacra \u2014 Holy Scripture")}
<div class="toggle-row">${sections.map(s=>`<button class="toggle-btn ${S.scrSection===s.id?'active':''}" data-sec="${s.id}">${s.label}</button>`).join('')}</div>
${content}`;
  // Event listeners
  document.querySelectorAll("#view-scripture .toggle-btn").forEach(b=>b.addEventListener("click",()=>{S.scrSection=b.dataset.sec;renderScripture();}));
  document.querySelectorAll(".scripture-nav-btn").forEach(b=>b.addEventListener("click",()=>{S.scrChapter=parseInt(b.dataset.ch);saveState();renderScripture();window.scrollTo({top:0,behavior:"smooth"});}));
  document.querySelectorAll(".word-tap").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();showWordPanel(el.dataset.word);}));
  document.querySelectorAll(".verse-bookmark").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();toggleBookmark(b.dataset.ref);renderScripture();}));
  document.querySelectorAll(".vc-card").forEach(c=>c.addEventListener("click",()=>c.classList.toggle("expanded")));
  document.querySelectorAll(".vc-filter-btn").forEach(b=>b.addEventListener("click",()=>{S.vcFilter=b.dataset.vcat;renderScripture();}));
  const vcs=document.getElementById("vc-search");if(vcs)vcs.addEventListener("input",e=>{S.vcSearch=e.target.value;renderScripture();setTimeout(()=>{const el=document.getElementById("vc-search");if(el){el.focus();el.setSelectionRange(e.target.value.length,e.target.value.length);}},0);});
  const fu=document.getElementById("font-up"),fd=document.getElementById("font-down");
  if(fu)fu.addEventListener("click",()=>{S.fontSize=Math.min((S.fontSize||1)+0.1,1.5);saveState();renderScripture();});
  if(fd)fd.addEventListener("click",()=>{S.fontSize=Math.max((S.fontSize||1)-0.1,0.7);saveState();renderScripture();});
  const pc=$("prev-ch"),nc=$("next-ch");
  if(pc)pc.addEventListener("click",()=>{S.scrChapter--;saveState();renderScripture();window.scrollTo({top:0,behavior:"smooth"});});
  if(nc)nc.addEventListener("click",()=>{S.scrChapter++;saveState();renderScripture();window.scrollTo({top:0,behavior:"smooth"});});
  // Close word panel on body click
  document.addEventListener("click",e=>{if(!e.target.closest(".word-tap")&&!e.target.closest(".word-popup-scripture")){document.getElementById("word-panel").innerHTML="";}},{once:true});
}

renderNav();renderHome();
</script>
