<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--parchment:#f4e8d1;--gold:#b8860b;--gold-light:#d4a846;--brown-dark:#3b2f20;--brown-mid:#5a3e1b;--brown-soft:#5c4a37;--brown-muted:#8b7355;--brown-faint:#b8a080;--green:#2d5a27;--red:#8b2020;--amber:#5a4a27;--white-50:rgba(255,255,255,0.5);--white-60:rgba(255,255,255,0.6);--gold-12:rgba(184,134,11,0.12);--gold-08:rgba(184,134,11,0.08);--gold-border:rgba(184,134,11,0.2);--gold-border-strong:rgba(184,134,11,0.3);--gold-border-bright:rgba(184,134,11,0.4);--card-bg:rgba(255,255,255,0.5);--card-bg-hover:rgba(255,255,255,0.6);--input-bg:rgba(255,255,255,0.7);--overlay-bg:rgba(255,255,255,0.95)}
[data-theme="dark"]{--parchment:#1a1a2e;--gold:#d4a846;--gold-light:#e8c364;--brown-dark:#e8dcc8;--brown-mid:#d4c4a8;--brown-soft:#bfb099;--brown-muted:#8a7e6e;--brown-faint:#5a5040;--green:#4caf50;--red:#e57373;--amber:#ffb74d;--white-50:rgba(255,255,255,0.06);--white-60:rgba(255,255,255,0.08);--gold-12:rgba(212,168,70,0.15);--gold-08:rgba(212,168,70,0.1);--gold-border:rgba(212,168,70,0.15);--gold-border-strong:rgba(212,168,70,0.25);--gold-border-bright:rgba(212,168,70,0.35);--card-bg:rgba(255,255,255,0.05);--card-bg-hover:rgba(255,255,255,0.08);--input-bg:rgba(255,255,255,0.08);--overlay-bg:rgba(26,26,46,0.97)}
body{font-family:'Crimson Text',Georgia,serif;background:var(--parchment);color:var(--brown-dark);min-height:100vh;transition:background 0.3s,color 0.3s}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,rgba(184,134,11,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,69,19,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
[data-theme="dark"] body::before{background:radial-gradient(ellipse at 20% 50%,rgba(212,168,70,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(100,80,40,0.04) 0%,transparent 50%)}
.app{max-width:960px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
header{text-align:center;padding:40px 20px 20px;position:relative}
.header-ornament{font-size:2rem;color:var(--gold);margin-bottom:8px}
h1.title{font-size:clamp(2rem,5.5vw,3.2rem);font-weight:700;color:var(--brown-mid);letter-spacing:0.06em;text-shadow:1px 1px 2px rgba(0,0,0,0.08)}
.subtitle{font-size:clamp(0.9rem,2.5vw,1.3rem);font-weight:400;color:var(--brown-muted);letter-spacing:0.25em;text-transform:uppercase;margin:4px 0 12px}
.header-rule{width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 8px}
.tagline{font-size:0.9rem;color:var(--brown-muted);font-style:italic}
.theme-toggle{position:absolute;top:16px;right:16px;background:var(--card-bg);border:1px solid var(--gold-border);border-radius:20px;padding:6px 14px;font-family:inherit;font-size:0.8rem;color:var(--brown-soft);cursor:pointer;transition:all 0.2s}
.theme-toggle:hover{background:var(--gold-08);border-color:var(--gold-border-strong)}
nav{display:flex;justify-content:center;flex-wrap:wrap;gap:3px;padding:6px 0 20px;border-bottom:1px solid var(--gold-border);margin-bottom:20px}
.nav-btn{background:transparent;border:1px solid transparent;padding:8px 12px;border-radius:6px;cursor:pointer;text-align:center;font-family:inherit;transition:all 0.2s}
.nav-btn:hover{background:var(--gold-08)}
.nav-btn.active{background:var(--gold-12);border-color:var(--gold-border-strong)}
.nav-latin{display:block;font-size:0.9rem;font-weight:600;color:var(--brown-mid)}
.nav-english{display:block;font-size:0.65rem;color:var(--brown-muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:1px}
main{padding-bottom:40px;transition:opacity 0.25s ease}
.view{display:none}.view.active{display:block}
.section-title{display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:600;color:var(--brown-mid);letter-spacing:0.05em;margin:28px 0 10px;gap:10px}
.instructions{text-align:center;font-size:0.88rem;color:var(--brown-muted);font-style:italic;margin-bottom:18px}
.ornament{text-align:center;color:var(--gold);font-size:1.1rem;letter-spacing:0.5em;user-select:none}
.toggle-row{display:flex;justify-content:center;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.toggle-btn{padding:7px 20px;border-radius:20px;border:1px solid var(--gold-border-strong);background:transparent;font-family:inherit;font-size:0.85rem;color:var(--brown-soft);cursor:pointer;transition:all 0.2s}
.toggle-btn.active{background:var(--brown-mid);color:var(--parchment);border-color:var(--brown-mid)}
[data-theme="dark"] .toggle-btn.active{background:var(--gold);color:#1a1a2e;border-color:var(--gold)}
.filter-row{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--gold-border-strong);background:transparent;font-family:inherit;font-size:0.82rem;color:var(--brown-soft);cursor:pointer;transition:all 0.2s}
.filter-btn.active{background:var(--brown-mid);color:var(--parchment);border-color:var(--brown-mid)}
[data-theme="dark"] .filter-btn.active{background:var(--gold);color:#1a1a2e}
/* Home */
.home-hero{text-align:center;padding:16px 20px 28px}
.hero-cross{font-size:2.5rem;color:var(--gold);margin-bottom:6px}
.home-title{font-size:clamp(1.5rem,4vw,2rem);font-weight:700;color:var(--brown-mid);margin-bottom:4px}
.home-subtitle{font-size:0.95rem;font-style:italic;color:var(--brown-muted);margin-bottom:14px}
.home-desc{font-size:0.95rem;line-height:1.7;color:var(--brown-soft);max-width:600px;margin:0 auto}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:20px 0}
.stat-card{background:var(--card-bg);border-radius:10px;padding:16px;border:1px solid var(--gold-border);text-align:center}
.stat-number{font-size:1.8rem;font-weight:700;color:var(--brown-mid)}
.stat-label{font-size:0.85rem;font-weight:600;color:var(--brown-soft);margin-top:3px}
.stat-sub{font-size:0.72rem;color:var(--brown-muted);margin-top:2px;margin-bottom:8px}
.progress-bar-bg{height:5px;background:rgba(128,128,128,0.15);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width 0.5s}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin:16px 0}
.quick-card{background:var(--card-bg);border:1px solid var(--gold-border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;font-family:inherit;transition:all 0.2s;width:100%}
.quick-card:hover{background:var(--card-bg-hover);border-color:var(--gold-border-strong)}
.quick-icon{font-size:1.8rem;margin-bottom:6px}
.quick-title{font-size:1rem;font-weight:700;color:var(--brown-mid);margin-bottom:4px}
.quick-desc{font-size:0.8rem;color:var(--brown-soft);line-height:1.4}
.tip-box{background:var(--gold-08);border:1px solid var(--gold-border);border-radius:10px;padding:16px;margin:20px 0}
.tip-header{font-size:0.9rem;font-weight:700;color:var(--brown-mid);margin-bottom:6px}
.tip-text{font-size:0.85rem;color:var(--brown-soft);line-height:1.6}
/* Achievements */
.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:16px 0}
.achievement{background:var(--card-bg);border:1px solid var(--gold-border);border-radius:10px;padding:14px;text-align:center;opacity:0.4;transition:all 0.3s}
.achievement.unlocked{opacity:1;border-color:var(--gold);background:var(--gold-08)}
.achievement-icon{font-size:2rem;margin-bottom:4px}
.achievement-name{font-size:0.85rem;font-weight:700;color:var(--brown-mid)}
.achievement-desc{font-size:0.72rem;color:var(--brown-muted);margin-top:2px}
/* Streak Calendar */
.streak-section{margin:20px 0}
.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-width:300px;margin:10px auto}
.streak-day{width:100%;aspect-ratio:1;border-radius:4px;background:rgba(128,128,128,0.1);display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:var(--brown-muted)}
.streak-day.active{background:var(--gold);color:#fff}
.streak-day.today{border:2px solid var(--gold)}
.streak-label{text-align:center;font-size:0.8rem;color:var(--brown-muted);margin-bottom:6px}
/* Search */
.search-box{display:block;width:100%;max-width:400px;margin:0 auto 20px;padding:10px 16px;border:1px solid var(--gold-border-strong);border-radius:8px;background:var(--input-bg);font-family:inherit;font-size:0.95rem;color:var(--brown-dark);outline:none;transition:border-color 0.2s}
.search-box:focus{border-color:var(--gold)}
.search-box::placeholder{color:var(--brown-faint)}
/* Spaced Rep indicators */
.sr-indicator{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:6px;vertical-align:middle}
.sr-new{background:#888}.sr-learning{background:#e67e22}.sr-familiar{background:#f1c40f}.sr-known{background:#27ae60}.sr-mastered{background:#2ecc71;box-shadow:0 0 4px #2ecc71}
/* Vocabulary */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.vocab-card{perspective:800px;cursor:pointer;height:195px}
.vocab-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d}
.vocab-card.flipped .vocab-inner{transform:rotateY(180deg)}
.vocab-front,.vocab-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px}
.vocab-front{background:var(--card-bg);border:1px solid rgba(184,134,11,0.25)}
.vocab-back{transform:rotateY(180deg);background:rgba(90,62,27,0.92);border:1px solid var(--gold-border-bright);color:#f4e8d1}
[data-theme="dark"] .vocab-back{background:rgba(40,35,25,0.95)}
.vocab-category{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--gold);margin-bottom:6px;font-weight:600}
.vocab-latin{font-size:1.4rem;font-weight:700;color:var(--brown-mid)}
.vocab-back .vocab-latin{font-size:0.95rem;margin-top:6px;color:var(--brown-faint)}
.vocab-english{font-size:1.3rem;font-weight:700;color:#f4e8d1}
.vocab-pronunciation{font-size:0.75rem;color:var(--brown-muted);font-style:italic;margin-top:3px}
.vocab-back .vocab-pronunciation{color:var(--brown-faint)}
.vocab-hint{font-size:0.65rem;color:var(--brown-faint);margin-top:8px;text-transform:uppercase;letter-spacing:0.1em}
.learned-btn{margin-top:6px;padding:3px 12px;border-radius:14px;border:1px solid var(--gold-border-strong);background:transparent;font-family:inherit;font-size:0.7rem;color:var(--brown-muted);cursor:pointer;transition:all 0.2s}
.learned-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.vocab-count{text-align:center;font-size:0.82rem;color:var(--brown-muted);margin-bottom:14px}
/* Prayers */
.prayers-list{display:flex;flex-direction:column;gap:10px}
.prayer-card{background:var(--card-bg);border:1px solid var(--gold-border);border-radius:10px;overflow:hidden}
.prayer-header{width:100%;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;background:transparent;border:none;cursor:pointer;font-family:inherit;text-align:left}
.prayer-title{font-size:1.05rem;font-weight:700;color:var(--brown-mid)}
.prayer-english-title{font-size:0.78rem;color:var(--brown-muted);font-style:italic}
.prayer-meta{display:flex;align-items:center;gap:8px}
.difficulty-badge{font-size:0.62rem;padding:3px 9px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;color:#fff}
.difficulty-badge.beginner{background:var(--green)}.difficulty-badge.intermediate{background:var(--amber)}.difficulty-badge.advanced{background:var(--red)}
.prayer-arrow{font-size:1.1rem;color:var(--brown-muted);transition:transform 0.3s;display:inline-block}
.prayer-card.expanded .prayer-arrow{transform:rotate(180deg)}
.prayer-body{display:none;padding:0 18px 18px}
.prayer-card.expanded .prayer-body{display:block}
.prayer-text{font-size:1rem;line-height:1.9;color:var(--brown-dark);font-weight:500;padding:14px;background:var(--gold-08);border-radius:8px;border-left:3px solid var(--gold)}
.prayer-text .pw{cursor:pointer;border-bottom:1px dotted var(--gold);transition:background 0.15s;padding:1px 2px;border-radius:3px}
.prayer-text .pw:hover{background:var(--gold-12)}
.prayer-translation{margin-top:10px;font-size:0.88rem;line-height:1.7;color:var(--brown-soft);font-style:italic;padding:0 14px}
.prayer-trans-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--brown-muted);font-weight:600;font-style:normal;margin-bottom:4px}
/* Word popup */
.word-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--overlay-bg);border:2px solid var(--gold);border-radius:12px;padding:24px;z-index:1000;max-width:340px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.3);text-align:center}
.word-popup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:999}
.word-popup h3{font-size:1.6rem;color:var(--brown-mid);margin-bottom:4px}
.word-popup .wp-form{font-size:0.85rem;color:var(--gold);font-weight:600;margin-bottom:8px}
.word-popup .wp-meaning{font-size:1.1rem;color:var(--brown-dark);margin-bottom:6px}
.word-popup .wp-detail{font-size:0.82rem;color:var(--brown-soft);line-height:1.5}
.word-popup .wp-close{margin-top:12px;padding:6px 20px;border-radius:6px;background:var(--brown-mid);color:var(--parchment);border:none;font-family:inherit;cursor:pointer;font-size:0.85rem}
[data-theme="dark"] .word-popup .wp-close{background:var(--gold);color:#1a1a2e}
/* Grammar */
.grammar-nav{display:flex;flex-direction:column;gap:5px;margin-bottom:20px}
.grammar-nav-btn{padding:10px 14px;text-align:left;background:rgba(255,255,255,0.2);border:1px solid rgba(184,134,11,0.12);border-radius:8px;font-family:inherit;font-size:0.9rem;color:var(--brown-soft);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:10px;width:100%}
.grammar-nav-btn.active{background:var(--gold-12);border-color:var(--gold-border-bright);color:var(--brown-mid);font-weight:600}
.grammar-num{font-size:0.72rem;color:var(--gold);font-weight:700;width:26px;text-align:center;flex-shrink:0}
.grammar-content{background:var(--card-bg);border:1px solid var(--gold-border);border-radius:10px;padding:24px}
.grammar-title{font-size:1.3rem;font-weight:700;color:var(--brown-mid);text-align:center;margin-bottom:4px}
.grammar-section{margin-bottom:18px}
.grammar-heading{font-size:0.95rem;font-weight:700;color:var(--brown-mid);margin-bottom:5px;border-bottom:1px solid rgba(184,134,11,0.12);padding-bottom:3px}
.grammar-text{font-size:0.9rem;line-height:1.75;color:var(--brown-dark)}
.grammar-table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:0.84rem}
.grammar-table th{background:rgba(90,62,27,0.08);color:var(--brown-mid);padding:7px 10px;text-align:left;font-weight:700;border-bottom:2px solid var(--gold-border-strong)}
[data-theme="dark"] .grammar-table th{background:rgba(212,168,70,0.08)}
.grammar-table td{padding:6px 10px;border-bottom:1px solid rgba(184,134,11,0.1);color:var(--brown-dark)}
.grammar-table tr:hover td{background:rgba(184,134,11,0.04)}
.grammar-note{background:var(--gold-08);border-left:3px solid var(--gold);padding:10px 14px;border-radius:0 6px 6px 0;margin:10px 0;font-size:0.84rem;line-height:1.6;color:var(--brown-soft)}
.grammar-note strong{color:var(--brown-mid)}
/* Drill */
.drill-section{margin-top:24px;padding-top:20px;border-top:2px solid var(--gold-border)}
.drill-table{width:100%;border-collapse:collapse;margin:10px 0}
.drill-table th{background:rgba(90,62,27,0.08);padding:7px 10px;text-align:left;font-weight:700;font-size:0.82rem;color:var(--brown-mid);border-bottom:2px solid var(--gold-border-strong)}
.drill-table td{padding:5px 8px;border-bottom:1px solid rgba(184,134,11,0.1);font-size:0.88rem}
.drill-input{width:100%;padding:5px 8px;border:1px solid var(--gold-border-strong);border-radius:4px;background:var(--input-bg);font-family:inherit;font-size:0.85rem;color:var(--brown-dark);outline:none}
.drill-input:focus{border-color:var(--gold)}
.drill-input.correct{border-color:var(--green);background:rgba(45,90,39,0.1)}
.drill-input.wrong{border-color:var(--red);background:rgba(139,32,32,0.1)}
.drill-btn{padding:8px 24px;border-radius:8px;background:var(--brown-mid);color:var(--parchment);border:none;font-family:inherit;font-size:0.9rem;cursor:pointer;font-weight:600;margin:10px 4px}
[data-theme="dark"] .drill-btn{background:var(--gold);color:#1a1a2e}
/* Quiz & Practice */
.quiz-score-bar{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;font-size:0.85rem;color:var(--brown-soft);font-weight:600;margin-bottom:18px}
.quiz-card{background:var(--card-bg);border:1px solid var(--gold-border);border-radius:12px;padding:28px;text-align:center;max-width:560px;margin:0 auto}
.quiz-prompt-label{font-size:0.82rem;color:var(--brown-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.quiz-word{font-size:2rem;font-weight:700;color:var(--brown-mid);margin-bottom:4px}
.quiz-pronunciation{font-size:0.85rem;color:var(--brown-muted);font-style:italic;margin-bottom:20px}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-option{padding:12px 14px;border-radius:8px;font-family:inherit;font-size:0.95rem;color:var(--brown-dark);cursor:pointer;transition:all 0.2s;background:transparent;border:1px solid var(--gold-border-bright)}
.quiz-option:hover:not(.disabled){background:var(--gold-08)}
.quiz-option.correct{background:rgba(45,90,39,0.2);border:2px solid var(--green)}
.quiz-option.wrong{background:rgba(139,32,32,0.15);border:2px solid var(--red)}
.quiz-option.disabled{cursor:default}
.quiz-feedback{margin-top:16px;padding:14px;font-size:0.95rem}
.quiz-feedback .correct-msg{color:var(--green)}
.quiz-feedback .wrong-msg{color:var(--red)}
.next-btn{margin-top:10px;padding:8px 24px;border-radius:8px;background:var(--brown-mid);color:var(--parchment);border:none;font-family:inherit;font-size:0.9rem;cursor:pointer;font-weight:600;transition:background 0.2s}
[data-theme="dark"] .next-btn{background:var(--gold);color:#1a1a2e}
.next-btn:hover{opacity:0.9}
.quiz-filter-label{font-size:0.82rem;color:var(--brown-muted);text-align:center;margin-bottom:6px}
/* Sentence Builder */
.sb-english{font-size:1.1rem;color:var(--brown-mid);font-weight:600;margin-bottom:16px}
.sb-words{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;min-height:48px}
.sb-word{padding:8px 16px;border-radius:8px;border:1px solid var(--gold-border-strong);background:var(--card-bg);font-family:inherit;font-size:1rem;color:var(--brown-dark);cursor:pointer;transition:all 0.15s;user-select:none}
.sb-word:hover{background:var(--gold-12);border-color:var(--gold)}
.sb-word.placed{opacity:0.3;cursor:default}
.sb-answer{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:50px;padding:14px;border:2px dashed var(--gold-border-strong);border-radius:10px;margin-bottom:16px;background:var(--gold-08)}
.sb-answer .sb-word{background:var(--gold-12);border-color:var(--gold)}
/* Mass Walkthrough */
.mass-section{margin-bottom:24px}
.mass-part-title{font-size:1.1rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--gold-border)}
.mass-item{margin-bottom:14px;padding:12px 16px;background:var(--card-bg);border-radius:8px;border:1px solid var(--gold-border)}
.mass-speaker{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);font-weight:700;margin-bottom:4px}
.mass-latin{font-size:1rem;font-weight:600;color:var(--brown-mid);line-height:1.6;margin-bottom:4px}
.mass-english{font-size:0.88rem;color:var(--brown-soft);font-style:italic;line-height:1.5}
.mass-note{font-size:0.78rem;color:var(--brown-muted);margin-top:4px;padding-left:12px;border-left:2px solid var(--gold-border)}
/* Hymns & Scripture */
.hymn-card{background:var(--card-bg);border:1px solid var(--gold-border);border-radius:10px;margin-bottom:14px;overflow:hidden}
.hymn-header{width:100%;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;background:transparent;border:none;cursor:pointer;font-family:inherit;text-align:left}
.hymn-title{font-size:1.05rem;font-weight:700;color:var(--brown-mid)}
.hymn-subtitle{font-size:0.78rem;color:var(--brown-muted);font-style:italic}
.hymn-body{display:none;padding:0 18px 18px}
.hymn-card.expanded .hymn-body{display:block}
.hymn-text{font-size:0.95rem;line-height:1.8;color:var(--brown-dark);padding:14px;background:var(--gold-08);border-radius:8px;border-left:3px solid var(--gold);white-space:pre-line}
.interlinear{margin:10px 0}
.il-line{margin-bottom:10px;padding:8px 12px;background:var(--card-bg);border-radius:6px;border-left:3px solid var(--gold)}
.il-latin{font-size:1rem;font-weight:600;color:var(--brown-mid);margin-bottom:2px}
.il-english{font-size:0.85rem;color:var(--brown-soft);font-style:italic}

.grammar-nav-btn .check-mark{margin-left:auto;color:var(--green);font-weight:700;font-size:1.1rem}
.lesson-complete-row{display:flex;justify-content:center;margin:20px 0 10px}
.complete-lesson-btn{padding:10px 28px;border-radius:8px;border:2px solid var(--green);background:transparent;font-family:inherit;font-size:0.95rem;color:var(--green);cursor:pointer;font-weight:700;transition:all 0.2s}
.complete-lesson-btn:hover{background:rgba(45,90,39,0.1)}
.complete-lesson-btn.completed{background:var(--green);color:#fff;border-color:var(--green)}
.spanish-bridge{background:linear-gradient(135deg,rgba(184,134,11,0.06),rgba(139,69,19,0.06));border:1px solid rgba(184,134,11,0.18);border-left:4px solid #c67a1a;padding:12px 16px;border-radius:0 8px 8px 0;margin:12px 0;font-size:0.84rem;line-height:1.6;color:var(--brown-soft)}
.spanish-bridge strong{color:var(--brown-mid)}

.scripture-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;justify-content:center}
.scripture-nav-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--gold-border-strong);background:transparent;font-family:inherit;font-size:0.85rem;color:var(--brown-soft);cursor:pointer;transition:all 0.2s;text-align:left}
.scripture-nav-btn.active{background:var(--brown-mid);color:var(--parchment);border-color:var(--brown-mid)}
[data-theme="dark"] .scripture-nav-btn.active{background:var(--gold);color:#1a1a2e}
.scripture-nav-btn:hover:not(.active){background:var(--gold-08)}
.verse-num{display:inline-block;font-size:0.65rem;color:var(--gold);font-weight:700;vertical-align:super;margin-right:3px;min-width:14px}
.il-note{font-size:0.78rem;color:var(--brown-muted);padding:4px 12px 8px;line-height:1.5;border-left:2px solid var(--gold-border);margin-left:8px}
.il-note b{color:var(--brown-soft)}
.il-line{margin-bottom:2px;padding:8px 12px;background:var(--card-bg);border-radius:6px;border-left:3px solid var(--gold)}
.il-line:hover{background:var(--card-bg-hover)}
.chapter-title{font-size:1.2rem;font-weight:700;color:var(--brown-mid);text-align:center;margin:24px 0 6px}
.chapter-subtitle{font-size:0.88rem;color:var(--brown-muted);text-align:center;font-style:italic;margin-bottom:16px}

/* Word tap popup for scripture */
.word-tap{cursor:pointer;border-bottom:1px dotted rgba(184,134,11,0.4);transition:background 0.15s}
.word-tap:hover,.word-tap:active{background:rgba(184,134,11,0.12);border-radius:2px}
.word-popup-scripture{position:fixed;bottom:0;left:0;right:0;background:var(--card-bg);border-top:3px solid var(--gold);padding:16px 20px;z-index:1001;box-shadow:0 -4px 20px rgba(0,0,0,0.2);max-height:40vh;overflow-y:auto;animation:slideUp 0.2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.word-popup-scripture h3{color:var(--gold);font-size:1.1rem;margin-bottom:4px}
.word-popup-scripture .wp-pos{font-size:0.78rem;color:var(--brown-muted);font-style:italic;margin-bottom:6px}
.word-popup-scripture .wp-def{font-size:0.92rem;color:var(--brown-mid);margin-bottom:4px}
.word-popup-scripture .wp-note{font-size:0.8rem;color:var(--brown-muted);line-height:1.5}
.word-popup-scripture .wp-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:1.3rem;color:var(--brown-muted);cursor:pointer}
/* Font size controls */
.font-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.font-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--gold-border-strong);background:transparent;font-size:1.1rem;color:var(--brown-soft);cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.font-btn:active{background:var(--gold-08)}
.font-label{font-size:0.8rem;color:var(--brown-muted)}
/* Bookmarked verse */
.verse-bookmark{position:absolute;right:8px;top:8px;background:none;border:none;font-size:1rem;cursor:pointer;opacity:0.3;transition:opacity 0.2s}
.verse-bookmark.active{opacity:1}
.il-line{position:relative}
.il-line.bookmarked{border-left-color:var(--red)}
/* Daily verse card */
.daily-verse{background:var(--card-bg);border-radius:12px;padding:16px 20px;border-left:4px solid var(--gold);margin-bottom:20px}
.daily-verse .dv-label{font-size:0.75rem;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.daily-verse .dv-latin{font-size:1rem;color:var(--brown-dark);font-style:italic;margin-bottom:6px;line-height:1.5}
.daily-verse .dv-english{font-size:0.88rem;color:var(--brown-muted);margin-bottom:4px}
.daily-verse .dv-ref{font-size:0.78rem;color:var(--gold);font-weight:600}
/* Vulgate Core vocab */
.vc-card{background:var(--card-bg);border-radius:8px;padding:10px 14px;border-left:3px solid var(--gold);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background 0.15s}
.vc-card:hover{background:var(--card-bg-hover)}
.vc-latin{font-weight:700;color:var(--brown-mid);font-size:0.95rem}
.vc-english{color:var(--brown-soft);font-size:0.88rem}
.vc-pos{font-size:0.72rem;color:var(--gold);font-weight:600;text-transform:uppercase;margin-left:6px}
.vc-note{font-size:0.78rem;color:var(--brown-muted);margin-top:4px;line-height:1.4;display:none}
.vc-card.expanded .vc-note{display:block}
.vc-freq{font-size:0.7rem;color:var(--brown-faint)}
.vc-search{width:100%;padding:10px 14px;border:1px solid var(--gold-border);border-radius:8px;font-size:0.9rem;font-family:inherit;background:var(--card-bg);color:var(--brown-dark);margin-bottom:10px}
.vc-filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.vc-filter-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--gold-border);background:transparent;font-size:0.78rem;color:var(--brown-soft);cursor:pointer}
.vc-filter-btn.active{background:var(--brown-mid);color:var(--parchment);border-color:var(--brown-mid)}
/* Parsing drills */
.parse-card{background:var(--card-bg);border-radius:10px;padding:20px;text-align:center;margin-bottom:16px}
.parse-word{font-size:1.6rem;font-weight:700;color:var(--brown-dark);margin-bottom:4px}
.parse-hint{font-size:0.82rem;color:var(--brown-muted);margin-bottom:16px}
.parse-options{display:flex;flex-direction:column;gap:8px}
.parse-option{padding:12px 16px;border-radius:8px;border:1px solid var(--gold-border);background:transparent;font-family:inherit;font-size:0.9rem;color:var(--brown-soft);cursor:pointer;text-align:left;transition:all 0.15s}
.parse-option:hover{background:var(--gold-08)}
.parse-option.correct{background:rgba(45,90,39,0.15);border-color:var(--green);color:var(--green)}
.parse-option.wrong{background:rgba(139,32,32,0.1);border-color:var(--red);color:var(--red)}
.parse-option.disabled{pointer-events:none}
/* Conjugation drill */
.conj-table{width:100%;border-collapse:collapse;margin:12px 0}
.conj-table th,.conj-table td{padding:8px 10px;border:1px solid var(--gold-border);font-size:0.85rem}
.conj-table th{background:var(--gold-08);color:var(--brown-mid);font-weight:700}
.conj-table input{width:100%;padding:6px;border:1px solid var(--gold-border);border-radius:4px;font-family:inherit;font-size:0.85rem;background:var(--card-bg);color:var(--brown-dark)}
.conj-table input.correct{border-color:var(--green);background:rgba(45,90,39,0.08)}
.conj-table input.wrong{border-color:var(--red);background:rgba(139,32,32,0.06)}

footer{text-align:center;padding:28px 0 44px}
footer .footer-text{margin-top:10px;font-size:0.78rem;color:var(--brown-muted)}
@media(max-width:600px){.quiz-options{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}.quick-grid{grid-template-columns:1fr 1fr}.vocab-grid{grid-template-columns:1fr 1fr}nav{gap:2px}.nav-btn{padding:6px 8px}.nav-latin{font-size:0.8rem}.nav-english{font-size:0.58rem}.quiz-word{font-size:1.6rem}.grammar-table{font-size:0.76rem}.grammar-table th,.grammar-table td{padding:4px 5px}.grammar-content{padding:14px}.word-popup{max-width:90%}}
@media(max-width:360px){.vocab-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr}.quick-grid{grid-template-columns:1fr}}
</style>

<body>
<div class="app">
<header>
