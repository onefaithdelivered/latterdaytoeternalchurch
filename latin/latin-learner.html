<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingua Latina Ecclesiastica</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --parchment: #f4e8d1;
  --gold: #b8860b;
  --gold-light: #d4a846;
  --brown-dark: #3b2f20;
  --brown-mid: #5a3e1b;
  --brown-soft: #5c4a37;
  --brown-muted: #8b7355;
  --brown-faint: #b8a080;
  --green: #2d5a27;
  --red: #5a2727;
  --amber: #5a4a27;
  --white-50: rgba(255,255,255,0.5);
  --white-60: rgba(255,255,255,0.6);
  --gold-12: rgba(184,134,11,0.12);
  --gold-08: rgba(184,134,11,0.08);
  --gold-border: rgba(184,134,11,0.2);
  --gold-border-strong: rgba(184,134,11,0.3);
  --gold-border-bright: rgba(184,134,11,0.4);
}

body {
  font-family: 'Crimson Text', Georgia, Palatino, serif;
  background: var(--parchment);
  color: var(--brown-dark);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(184,134,11,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(139,69,19,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(184,134,11,0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

.app {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 16px;
  position: relative;
  z-index: 1;
}

/* ─── Header ─────────────────────────────── */
header {
  text-align: center;
  padding: 48px 20px 24px;
}
.header-ornament { font-size: 2rem; color: var(--gold); margin-bottom: 8px; }
h1.title {
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  font-weight: 700; color: var(--brown-mid);
  letter-spacing: 0.06em;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.08);
}
.subtitle {
  font-size: clamp(1rem, 3vw, 1.4rem);
  font-weight: 400; color: var(--brown-muted);
  letter-spacing: 0.25em; text-transform: uppercase;
  margin: 4px 0 16px;
}
.header-rule {
  width: 120px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 12px;
}
.tagline { font-size: 0.95rem; color: var(--brown-muted); font-style: italic; }

/* ─── Nav ────────────────────────────────── */
nav {
  display: flex; justify-content: center; flex-wrap: wrap; gap: 4px;
  padding: 8px 0 24px;
  border-bottom: 1px solid var(--gold-border);
  margin-bottom: 24px;
}
.nav-btn {
  background: transparent; border: 1px solid transparent;
  padding: 10px 16px; border-radius: 6;
  cursor: pointer; text-align: center;
  font-family: inherit; transition: all 0.2s;
  border-radius: 6px;
}
.nav-btn:hover { background: var(--gold-08); }
.nav-btn.active {
  background: var(--gold-12);
  border-color: var(--gold-border-strong);
}
.nav-latin { display: block; font-size: 0.95rem; font-weight: 600; color: var(--brown-mid); }
.nav-english {
  display: block; font-size: 0.7rem; color: var(--brown-muted);
  text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px;
}

/* ─── Content Area ───────────────────────── */
main {
  padding-bottom: 40px;
  transition: opacity 0.25s ease;
}
.view { display: none; }
.view.active { display: block; }

/* ─── Shared Elements ────────────────────── */
.section-title {
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 600; color: var(--brown-mid);
  letter-spacing: 0.05em; margin: 32px 0 12px;
  gap: 12px;
}
.cross-icon { font-size: 0.9rem; color: var(--brown-mid); }
.instructions {
  text-align: center; font-size: 0.9rem; color: var(--brown-muted);
  font-style: italic; margin-bottom: 20px;
}
.ornament {
  text-align: center; color: var(--gold);
  font-size: 1.2rem; letter-spacing: 0.5em; user-select: none;
}
.toggle-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 24px; }
.toggle-btn {
  padding: 8px 24px; border-radius: 20;
  border: 1px solid var(--gold-border-strong);
  background: transparent; font-family: inherit; font-size: 0.9rem;
  color: var(--brown-soft); cursor: pointer; transition: all 0.2s;
  border-radius: 20px;
}
.toggle-btn.active {
  background: var(--brown-mid); color: var(--parchment);
  border-color: var(--brown-mid);
}
.filter-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.filter-btn {
  padding: 6px 16px; border-radius: 20px;
  border: 1px solid var(--gold-border-strong);
  background: transparent; font-family: inherit; font-size: 0.85rem;
  color: var(--brown-soft); cursor: pointer; transition: all 0.2s;
}
.filter-btn.active {
  background: var(--brown-mid); color: var(--parchment);
  border-color: var(--brown-mid);
}

/* ─── Home ───────────────────────────────── */
.home-hero { text-align: center; padding: 20px 20px 32px; }
.hero-cross { font-size: 3rem; color: var(--gold); margin-bottom: 8px; }
.home-title { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 700; color: var(--brown-mid); margin-bottom: 4px; }
.home-subtitle { font-size: 1rem; font-style: italic; color: var(--brown-muted); margin-bottom: 16px; }
.home-desc { font-size: 1rem; line-height: 1.7; color: var(--brown-soft); max-width: 600px; margin: 0 auto; }

.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin: 24px 0;
}
.stat-card {
  background: var(--white-50); border-radius: 10px; padding: 20px;
  border: 1px solid var(--gold-border); text-align: center;
}
.stat-number { font-size: 2rem; font-weight: 700; color: var(--brown-mid); }
.stat-label { font-size: 0.9rem; font-weight: 600; color: var(--brown-soft); margin-top: 4px; }
.stat-sub { font-size: 0.75rem; color: var(--brown-muted); margin-top: 2px; margin-bottom: 10px; }
.progress-bar-bg { height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden; }
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 3px; transition: width 0.5s;
}

.quick-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin: 20px 0;
}
.quick-card {
  background: var(--white-50); border: 1px solid var(--gold-border);
  border-radius: 10px; padding: 20px; text-align: center;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
  width: 100%;
}
.quick-card:hover { background: var(--white-60); border-color: var(--gold-border-strong); }
.quick-icon { font-size: 2rem; margin-bottom: 8px; }
.quick-title { font-size: 1.1rem; font-weight: 700; color: var(--brown-mid); margin-bottom: 6px; }
.quick-desc { font-size: 0.85rem; color: var(--brown-soft); line-height: 1.5; }

.tip-box {
  background: var(--gold-08); border: 1px solid var(--gold-border);
  border-radius: 10px; padding: 20px; margin: 24px 0;
}
.tip-header { font-size: 0.95rem; font-weight: 700; color: var(--brown-mid); margin-bottom: 8px; }
.tip-text { font-size: 0.9rem; color: var(--brown-soft); line-height: 1.6; }

/* ─── Vocabulary ─────────────────────────── */
.vocab-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;
}
.vocab-card {
  perspective: 800px; cursor: pointer; height: 200px;
}
.vocab-inner {
  position: relative; width: 100%; height: 100%;
  transition: transform 0.5s; transform-style: preserve-3d;
}
.vocab-card.flipped .vocab-inner { transform: rotateY(180deg); }
.vocab-front, .vocab-back {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: 10px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 16px;
}
.vocab-front {
  background: var(--white-60); border: 1px solid rgba(184,134,11,0.25);
}
.vocab-back {
  transform: rotateY(180deg);
  background: rgba(90,62,27,0.9); border: 1px solid var(--gold-border-bright);
  color: var(--parchment);
}
.vocab-category {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--gold); margin-bottom: 8px; font-weight: 600;
}
.vocab-latin { font-size: 1.5rem; font-weight: 700; color: var(--brown-mid); }
.vocab-back .vocab-latin { font-size: 1rem; margin-top: 8px; color: var(--brown-muted); }
.vocab-english { font-size: 1.4rem; font-weight: 700; color: var(--parchment); }
.vocab-pronunciation { font-size: 0.8rem; color: var(--brown-muted); font-style: italic; margin-top: 4px; }
.vocab-back .vocab-pronunciation { color: var(--brown-faint); }
.vocab-hint {
  font-size: 0.7rem; color: var(--brown-faint); margin-top: 10px;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.learned-btn {
  margin-top: 8px; padding: 4px 14px; border-radius: 14px;
  border: 1px solid var(--gold-border-strong); background: transparent;
  font-family: inherit; font-size: 0.72rem; color: var(--brown-muted);
  cursor: pointer; transition: all 0.2s;
}
.learned-btn.active {
  background: var(--green); color: var(--parchment); border-color: var(--green);
}

/* ─── Prayers ────────────────────────────── */
.prayers-list { display: flex; flex-direction: column; gap: 12px; }
.prayer-card {
  background: var(--white-50); border: 1px solid var(--gold-border);
  border-radius: 10px; overflow: hidden;
}
.prayer-header {
  width: 100%; padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: center;
  background: transparent; border: none; cursor: pointer;
  font-family: inherit; text-align: left;
}
.prayer-title { font-size: 1.1rem; font-weight: 700; color: var(--brown-mid); }
.prayer-english-title { font-size: 0.8rem; color: var(--brown-muted); font-style: italic; }
.prayer-meta { display: flex; align-items: center; gap: 10px; }
.difficulty-badge {
  font-size: 0.65rem; padding: 3px 10px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  color: var(--parchment);
}
.difficulty-badge.beginner { background: var(--green); }
.difficulty-badge.intermediate { background: var(--amber); }
.difficulty-badge.advanced { background: var(--red); }
.prayer-arrow {
  font-size: 1.2rem; color: var(--brown-muted);
  transition: transform 0.3s; display: inline-block;
}
.prayer-card.expanded .prayer-arrow { transform: rotate(180deg); }
.prayer-body {
  display: none; padding: 0 20px 20px;
}
.prayer-card.expanded .prayer-body { display: block; }
.prayer-text {
  font-size: 1.05rem; line-height: 1.8; color: var(--brown-dark); font-weight: 500;
  padding: 16px; background: rgba(184,134,11,0.06); border-radius: 8px;
  border-left: 3px solid var(--gold);
}
.prayer-translation {
  margin-top: 12px; font-size: 0.9rem; line-height: 1.7;
  color: var(--brown-soft); font-style: italic; padding: 0 16px;
}
.prayer-trans-label {
  font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--brown-muted); font-weight: 600; font-style: normal; margin-bottom: 4px;
}

/* ─── Grammar ────────────────────────────── */
.grammar-nav { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.grammar-nav-btn {
  padding: 12px 16px; text-align: left;
  background: rgba(255,255,255,0.3); border: 1px solid rgba(184,134,11,0.15);
  border-radius: 8px; font-family: inherit; font-size: 0.95rem;
  color: var(--brown-soft); cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 12px;
  width: 100%;
}
.grammar-nav-btn.active {
  background: var(--gold-12); border-color: var(--gold-border-bright);
  color: var(--brown-mid); font-weight: 600;
}
.grammar-num {
  font-size: 0.75rem; color: var(--gold); font-weight: 700;
  width: 28px; text-align: center; flex-shrink: 0;
}
.grammar-content {
  background: var(--white-50); border: 1px solid var(--gold-border);
  border-radius: 10px; padding: 28px;
}
.grammar-title {
  font-size: 1.4rem; font-weight: 700; color: var(--brown-mid);
  text-align: center; margin-bottom: 4px;
}
.grammar-section { margin-bottom: 20px; }
.grammar-heading {
  font-size: 1rem; font-weight: 700; color: var(--brown-mid);
  margin-bottom: 6px; border-bottom: 1px solid rgba(184,134,11,0.15); padding-bottom: 4px;
}
.grammar-text { font-size: 0.93rem; line-height: 1.75; color: var(--brown-dark); }

/* ─── Quiz ───────────────────────────────── */
.quiz-score-bar {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  font-size: 0.9rem; color: var(--brown-soft); font-weight: 600; margin-bottom: 20px;
}
.quiz-card {
  background: var(--white-50); border: 1px solid var(--gold-border);
  border-radius: 12px; padding: 32px; text-align: center;
  max-width: 560px; margin: 0 auto;
}
.quiz-prompt-label {
  font-size: 0.85rem; color: var(--brown-muted);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;
}
.quiz-word { font-size: 2.2rem; font-weight: 700; color: var(--brown-mid); margin-bottom: 4px; }
.quiz-pronunciation { font-size: 0.9rem; color: var(--brown-muted); font-style: italic; margin-bottom: 24px; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.quiz-option {
  padding: 14px 16px; border-radius: 8px;
  font-family: inherit; font-size: 1rem;
  color: var(--brown-dark); cursor: pointer; transition: all 0.2s;
  background: transparent; border: 1px solid rgba(184,134,11,0.4);
}
.quiz-option:hover:not(.disabled) { background: var(--gold-08); }
.quiz-option.correct { background: rgba(45,90,39,0.2); border: 2px solid var(--green); }
.quiz-option.wrong { background: rgba(90,39,39,0.2); border: 2px solid var(--red); }
.quiz-option.disabled { cursor: default; }
.quiz-feedback { margin-top: 20px; padding: 16px; font-size: 1rem; }
.quiz-feedback .correct-msg { color: var(--green); }
.quiz-feedback .wrong-msg { color: var(--red); }
.next-btn {
  margin-top: 12px; padding: 10px 28px; border-radius: 8px;
  background: var(--brown-mid); color: var(--parchment);
  border: none; font-family: inherit; font-size: 0.95rem;
  cursor: pointer; font-weight: 600; transition: background 0.2s;
}
.next-btn:hover { background: var(--brown-dark); }

/* ─── Footer ─────────────────────────────── */
footer {
  text-align: center; padding: 32px 0 48px;
}
footer .footer-text { margin-top: 12px; font-size: 0.8rem; color: var(--brown-muted); }

/* ─── Mobile ─────────────────────────────── */
@media (max-width: 500px) {
  .quiz-options { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr; }
  .quick-grid { grid-template-columns: 1fr; }
  .vocab-grid { grid-template-columns: 1fr 1fr; }
  nav { gap: 2px; }
  .nav-btn { padding: 8px 10px; }
  .quiz-word { font-size: 1.7rem; }
}
@media (max-width: 360px) {
  .vocab-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="app">

  <!-- Header -->
  <header>
    <div class="header-ornament">❧</div>
    <h1 class="title">Lingua Latina</h1>
    <p class="subtitle">Ecclesiastica</p>
    <div class="header-rule"></div>
    <p class="tagline">A study of the sacred tongue of the Church</p>
  </header>

  <!-- Navigation -->
  <nav id="main-nav"></nav>

  <!-- Content Views -->
  <main>
    <div id="view-home" class="view active"></div>
    <div id="view-vocabulary" class="view"></div>
    <div id="view-prayers" class="view"></div>
    <div id="view-grammar" class="view"></div>

  <!-- Footer -->
  <footer>
    <div class="ornament">✦ ✦ ✦</div>
    <p class="footer-text">Ad Maiorem Dei Gloriam</p>

</div>

const GRAMMAR_LESSONS = [
  {
    title: "Pronunciation Basics",
    content: [
      { heading: "Vowels", text: "In ecclesiastical Latin, vowels are pronounced as in Italian: A = 'ah', E = 'eh', I = 'ee', O = 'oh', U = 'oo'. There are no silent vowels — every vowel is sounded." },
      { heading: "Consonants", text: "Most consonants sound like English, with key differences: C before 'e' or 'i' = 'ch' (as in 'church'); G before 'e' or 'i' = soft 'j' (as in 'gentle'); SC before 'e' or 'i' = 'sh'; TI before a vowel = 'tsee'; V = 'v' (not 'w' as in classical)." },
      { heading: "Diphthongs", text: "AE and OE are both pronounced 'eh'. AU is pronounced 'ow' as in 'how'. EI is pronounced 'ay'." }
    ]
  },
  {
    title: "Noun Declensions",
    content: [
      { heading: "What are Declensions?", text: "Latin nouns change their endings based on how they're used in a sentence. This is called 'declension.' There are five declension patterns, identified by the genitive singular ending." },
      { heading: "First Declension (-a)", text: "Mostly feminine nouns. Example: 'Maria' (Mary). Nominative: Maria, Genitive: Mariae, Dative: Mariae, Accusative: Mariam, Ablative: Maria." },
      { heading: "Second Declension (-us/-um)", text: "Mostly masculine (-us) or neuter (-um). Example: 'Dominus' (Lord). Nominative: Dominus, Genitive: Domini, Dative: Domino, Accusative: Dominum, Ablative: Domino." },
      { heading: "In Practice", text: "When you pray 'Agnus Dei' (Lamb of God), 'Agnus' is nominative (subject) and 'Dei' is genitive (possession) — literally 'Lamb of-God.'" }
    ]
  },
  {
    title: "Verb Conjugations",
    content: [
      { heading: "Latin Verb Basics", text: "Latin verbs change endings to show person and number. The infinitive often ends in '-are', '-ēre', '-ere', or '-ire'. These are the four conjugation groups." },
      { heading: "Present Tense (1st Conj.)", text: "Using 'orare' (to pray): Oro (I pray), Oras (you pray), Orat (he/she prays), Oramus (we pray), Oratis (you all pray), Orant (they pray)." },
      { heading: "Common Liturgical Forms", text: "'Oremus' = Let us pray (hortatory subjunctive). 'Laudate' = Praise ye (imperative plural). 'Credo' = I believe. 'Confiteor' = I confess. These fixed forms appear constantly in the Mass." }
    ]
  },
  {
    title: "Cases & Their Uses",
    content: [
      { heading: "The Six Cases", text: "Latin has six cases: Nominative (subject), Genitive (possession/of), Dative (indirect object/to/for), Accusative (direct object), Ablative (by/with/from/in), and Vocative (direct address)." },
      { heading: "Liturgical Examples", text: "Nominative: 'Dominus vobiscum' — The Lord [be] with you. Genitive: 'Agnus Dei' — Lamb of God. Dative: 'Gloria Patri' — Glory to the Father. Accusative: 'Ad Deum' — Toward God. Ablative: 'In nomine' — In the name. Vocative: 'Domine!' — O Lord!" },
      { heading: "Why It Matters", text: "Understanding cases unlocks the meaning of prayers. When you see 'nobis' (to/for us — dative), you know something is being given or done for us: 'Dona nobis pacem' = Grant to-us peace." }
    ]
  }
];

// ─── STATE ───────────────────────────────────────────────────────────────────

const state = {
  activeTab: "home",
  learnedWords: new Set(),
  score: { correct: 0, total: 0 },
  streak: 0,
  vocabFilter: "All",
  flippedCards: new Set(),
  prayerExpanded: null,
  prayerShowLatin: true,
  activeLesson: 0,
  quizMode: "latin-to-english",
  quizCurrent: null,
  quizOptions: [],
  quizSelected: null,
};

// ─── CROSS SVG ───────────────────────────────────────────────────────────────

const crossSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="22"/><line x1="4" y1="8" x2="20" y2="8"/></svg>`;

// ─── NAV ─────────────────────────────────────────────────────────────────────

function renderNav() {
  const tabs = [
    { id: "home", label: "Domus", english: "Home" },
    { id: "vocabulary", label: "Vocabula", english: "Vocabulary" },
    { id: "prayers", label: "Orationes", english: "Prayers" },
    { id: "grammar", label: "Grammatica", english: "Grammar" },
    { id: "quiz", label: "Probatio", english: "Quiz" },
  ];
  document.getElementById("main-nav").innerHTML = tabs.map(t =>
    `<button class="nav-btn ${state.activeTab === t.id ? 'active' : ''}" data-tab="${t.id}">
      <span class="nav-latin">${t.label}</span>
      <span class="nav-english">${t.english}</span>
    </button>`
  ).join("");

  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
  });
}

function switchTab(tab) {
  const main = document.querySelector("main");
  main.style.opacity = "0";
  setTimeout(() => {
    state.activeTab = tab;
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.getElementById(`view-${tab}`).classList.add("active");
    renderNav();
    renderView(tab);
    main.style.opacity = "1";
  }, 250);
}

function renderView(tab) {
  switch (tab) {
    case "home": renderHome(); break;
    case "vocabulary": renderVocabulary(); break;
    case "prayers": renderPrayers(); break;
    case "grammar": renderGrammar(); break;
    case "quiz": renderQuiz(); break;
  }
}

// ─── HOME ────────────────────────────────────────────────────────────────────

function renderHome() {
  const progress = Math.round((state.learnedWords.size / VOCABULARY.length) * 100);
  const accuracy = state.score.total > 0 ? Math.round((state.score.correct / state.score.total) * 100) : 0;

  document.getElementById("view-home").innerHTML = `
    <div class="home-hero">
      <div class="hero-cross">✠</div>
      <h2 class="home-title">Salvē, Discipule!</h2>
      <p class="home-subtitle">Greetings, Student!</p>
      <p class="home-desc">
        Begin your journey into the beautiful language of the Church. Ecclesiastical Latin —
        the living language of the Roman liturgy, sacred music, and papal documents —
        awaits your study.
      </p>
    </div>

    <div class="stats-row">
      <div class="stat-card">

        <div class="stat-label">Words Learned</div>

      <div class="stat-card">

        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${accuracy}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${PRAYERS.length}</div>
        <div class="stat-label">Prayers</div>
        <div class="stat-sub">to study & memorize</div>
      </div>
    </div>

    <div class="section-title">
      <span class="cross-icon">${crossSvg}</span>
      <span>Begin Your Studies</span>
      <span class="cross-icon">${crossSvg}</span>
    </div>

    <div class="quick-grid">
      ${[
        { tab: "vocabulary", icon: "📖", title: "Vocabula", desc: "Master essential Latin words used in liturgy, scripture, and sacred music." },
        { tab: "prayers", icon: "🕯️", title: "Orationes", desc: "Learn the great prayers of the Church in their original Latin." },
        { tab: "grammar", icon: "📜", title: "Grammatica", desc: "Understand pronunciation, declensions, conjugations, and cases." },
        { tab: "quiz", icon: "✍️", title: "Probatio", desc: "Test your knowledge with vocabulary quizzes and track your progress." },
      ].map(item => `
        <button class="quick-card" data-tab="${item.tab}">
          <div class="quick-icon">${item.icon}</div>
          <div class="quick-title">${item.title}</div>
          <div class="quick-desc">${item.desc}</div>
        </button>
      `).join("")}
    </div>

    <div class="tip-box">
      <div class="tip-header">📌 Pronunciation Tip</div>
      <p class="tip-text">
        Ecclesiastical Latin follows <strong>Italian pronunciation rules</strong>, not classical Roman ones.
        The key difference: <em>C</em> before <em>e</em> or <em>i</em> sounds like <strong>"ch"</strong> (as in "church"),
        and <em>G</em> before <em>e</em> or <em>i</em> sounds like a soft <strong>"j"</strong> (as in "gentle").
      </p>
    </div>
  `;

  document.querySelectorAll(".quick-card").forEach(btn => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
  });
}

// ─── VOCABULARY ──────────────────────────────────────────────────────────────

function renderVocabulary() {
  const categories = ["All", ...new Set(VOCABULARY.map(v => v.category))];
  const filtered = state.vocabFilter === "All" ? VOCABULARY : VOCABULARY.filter(v => v.category === state.vocabFilter);

  document.getElementById("view-vocabulary").innerHTML = `
    <div class="section-title">
      <span class="cross-icon">${crossSvg}</span>
      <span>Vocabula — Vocabulary</span>
      <span class="cross-icon">${crossSvg}</span>
    </div>
    <p class="instructions">Tap a card to reveal the English meaning. Mark words as learned to track your progress.</p>

    <div class="filter-row">
      ${categories.map(cat => `
        <button class="filter-btn ${state.vocabFilter === cat ? 'active' : ''}" data-cat="${cat}">${cat}</button>
      `).join("")}
    </div>

    <div class="vocab-grid">
      ${filtered.map((word, i) => {
        const key = `${state.vocabFilter}-${i}`;
        const isFlipped = state.flippedCards.has(key);
        const isLearned = state.learnedWords.has(word.latin);
        return `
          <div class="vocab-card ${isFlipped ? 'flipped' : ''}" data-key="${key}">
            <div class="vocab-inner">
              <div class="vocab-front">
                <div class="vocab-category">${word.category}</div>
                <div class="vocab-latin">${word.latin}</div>
                <div class="vocab-pronunciation">[${word.pronunciation}]</div>
                <div class="vocab-hint">tap to reveal</div>
                <button class="learned-btn ${isLearned ? 'active' : ''}" data-latin="${word.latin}">
                  ${isLearned ? '✓ Learned' : 'Mark Learned'}
                </button>
              </div>
              <div class="vocab-back">
                <div class="vocab-category">${word.category}</div>
                <div class="vocab-english">${word.english}</div>
                <div class="vocab-latin">${word.latin}</div>
                <div class="vocab-pronunciation">[${word.pronunciation}]</div>
              </div>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.vocabFilter = btn.dataset.cat; renderVocabulary(); });
  });
  document.querySelectorAll(".vocab-card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest(".learned-btn")) return;
      const key = card.dataset.key;
      state.flippedCards.has(key) ? state.flippedCards.delete(key) : state.flippedCards.add(key);
      card.classList.toggle("flipped");
    });
  });
  document.querySelectorAll(".learned-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const latin = btn.dataset.latin;
      state.learnedWords.has(latin) ? state.learnedWords.delete(latin) : state.learnedWords.add(latin);
      btn.classList.toggle("active");
      btn.textContent = state.learnedWords.has(latin) ? "✓ Learned" : "Mark Learned";
    });
  });
}

// ─── PRAYERS ─────────────────────────────────────────────────────────────────

function renderPrayers() {
  document.getElementById("view-prayers").innerHTML = `
    <div class="section-title">
      <span class="cross-icon">${crossSvg}</span>
      <span>Orationes — Prayers</span>
      <span class="cross-icon">${crossSvg}</span>
    </div>
    <p class="instructions">Study the great prayers of the Church. Toggle between Latin and English to aid memorization.</p>

    <div class="toggle-row">
      <button class="toggle-btn ${state.prayerShowLatin ? 'active' : ''}" data-lang="latin">Latin</button>
      <button class="toggle-btn ${!state.prayerShowLatin ? 'active' : ''}" data-lang="english">English</button>
    </div>

    <div class="prayers-list">
      ${PRAYERS.map((p, i) => {
        const expanded = state.prayerExpanded === i;
        const diffClass = p.difficulty.toLowerCase();
        return `
          <div class="prayer-card ${expanded ? 'expanded' : ''}" data-idx="${i}">
            <button class="prayer-header">
              <div>
                <div class="prayer-title">${p.title}</div>
                <div class="prayer-english-title">${p.english_title}</div>
              </div>
              <div class="prayer-meta">
                <span class="difficulty-badge ${diffClass}">${p.difficulty}</span>
                <span class="prayer-arrow">▾</span>
              </div>
            </button>
            <div class="prayer-body">
              <div class="prayer-text">${state.prayerShowLatin ? p.latin : p.english}</div>
              <div class="prayer-translation">
                <div class="prayer-trans-label">${state.prayerShowLatin ? 'English:' : 'Latin:'}</div>
                ${state.prayerShowLatin ? p.english : p.latin}
              </div>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;

  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.prayerShowLatin = btn.dataset.lang === "latin";
      renderPrayers();
    });
  });
  document.querySelectorAll(".prayer-header").forEach(btn => {
    btn.addEventListener("click", () => {
      const card = btn.closest(".prayer-card");
      const idx = parseInt(card.dataset.idx);
      state.prayerExpanded = state.prayerExpanded === idx ? null : idx;
      renderPrayers();
    });
  });
}

// ─── GRAMMAR ─────────────────────────────────────────────────────────────────

  const lesson = GRAMMAR_LESSONS[state.activeLesson];

  document.getElementById("view-grammar").innerHTML = `

      <span class="cross-icon">${crossSvg}</span>
      <span>Grammatica — Grammar</span>

    <div class="grammar-nav">
      ${GRAMMAR_LESSONS.map((l, i) => `

// ─── QUIZ ────────────────────────────────────────────────────────────────────

function generateQuestion() {
  const idx = Math.floor(Math.random() * VOCABULARY.length);
  state.quizCurrent = VOCABULARY[idx];
  const wrong = VOCABULARY.filter((_, i) => i !== idx).sort(() => Math.random() - 0.5).slice(0, 3);
  state.quizOptions = [state.quizCurrent, ...wrong].sort(() => Math.random() - 0.5);
  state.quizSelected = null;
}

function renderQuiz() {
  if (!state.quizCurrent) generateQuestion();

  const cur = state.quizCurrent;
  const accuracy = state.score.total > 0 ? Math.round((state.score.correct / state.score.total) * 100) : 0;
  const isL2E = state.quizMode === "latin-to-english";

  let feedbackHtml = "";
  if (state.quizSelected !== null) {
    const sel = state.quizSelected;
    const isCorrect = isL2E ? sel.english === cur.english : sel.latin === cur.latin;
    feedbackHtml = `
      <div class="quiz-feedback">
        ${isCorrect
          ? `<div class="correct-msg"><strong>Rēctē!</strong> — Correct!</div>`
          : `<div class="wrong-msg"><strong>Errāvistī</strong> — The answer was: <em>${isL2E ? cur.english : cur.latin}</em></div>`
        }
        <button class="next-btn" id="next-question">Next Question →</button>
      </div>
    `;
  }

  document.getElementById("view-quiz").innerHTML = `
    <div class="section-title">
      <span class="cross-icon">${crossSvg}</span>
      <span>Probatio — Quiz</span>
      <span class="cross-icon">${crossSvg}</span>
    </div>

    <div class="toggle-row">
      <button class="toggle-btn ${isL2E ? 'active' : ''}" data-mode="latin-to-english">Latin → English</button>
      <button class="toggle-btn ${!isL2E ? 'active' : ''}" data-mode="english-to-latin">English → Latin</button>
    </div>

    <div class="quiz-score-bar">
      <span>Score: ${state.score.correct}/${state.score.total}</span>
      <span>Accuracy: ${accuracy}%</span>
      <span>Streak: ${state.streak} 🔥</span>
    </div>

    <div class="quiz-card">
      <div class="quiz-prompt-label">${isL2E ? 'What does this Latin word mean?' : 'Which Latin word means:'}</div>
      <div class="quiz-word">${isL2E ? cur.latin : cur.english}</div>
      ${isL2E ? `<div class="quiz-pronunciation">[${cur.pronunciation}]</div>` : '<div style="margin-bottom:24px"></div>'}

      <div class="quiz-options">
        ${state.quizOptions.map((opt, i) => {
          let cls = "";
          if (state.quizSelected !== null) {
            const isCorrectAnswer = isL2E ? opt.english === cur.english : opt.latin === cur.latin;
            const isSelected = isL2E ? opt.english === state.quizSelected.english : opt.latin === state.quizSelected.latin;
            if (isCorrectAnswer) cls = "correct";
            else if (isSelected) cls = "wrong";
            cls += " disabled";
          }
          return `<button class="quiz-option ${cls}" data-idx="${i}">${isL2E ? opt.english : opt.latin}</button>`;
        }).join("")}
      </div>

      ${feedbackHtml}
    </div>
  `;

  // Mode toggles
  document.querySelectorAll("#view-quiz .toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.quizMode = btn.dataset.mode;
      generateQuestion();
      renderQuiz();
    });
  });

  // Option clicks
  if (state.quizSelected === null) {
    document.querySelectorAll(".quiz-option").forEach(btn => {
      btn.addEventListener("click", () => {
        const opt = state.quizOptions[parseInt(btn.dataset.idx)];
        state.quizSelected = opt;
        const isCorrect = isL2E ? opt.english === cur.english : opt.latin === cur.latin;
        state.score.total++;
        if (isCorrect) { state.score.correct++; state.streak++; } else { state.streak = 0; }
        renderQuiz();
      });
    });
  }

  // Next question
  const nextBtn = document.getElementById("next-question");
  if (nextBtn) {
    nextBtn.addEventListener("click", () => { generateQuestion(); renderQuiz(); });
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderNav();
renderHome();
</script>
