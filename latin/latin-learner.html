{h:"Why Ecclesiastical?",t:"Ecclesiastical (Church) Latin uses Italian-influenced pronunciation, different from the Classical Latin taught in universities. This is the Latin you hear at Mass, in Gregorian chant, and at the Vatican. Once you learn the rules below, Latin pronunciation is very consistent — far more regular than English."},
{h:"Vowels",x:'<p class="grammar-text">Every vowel is always sounded. Latin has no silent letters.</p><table class="grammar-table"><thead><tr><th>Letter</th><th>Sound</th><th>Like English</th><th>Examples</th></tr></thead><tbody><tr><td><b>A</b></td><td>ah</td><td>f<b>a</b>ther</td><td><i>Maria</i> (mah-REE-ah), <i>gratia</i> (GRAH-tsee-ah)</td></tr><tr><td><b>E</b></td><td>eh</td><td>m<b>e</b>t</td><td><i>Deus</i> (DEH-oos), <i>terra</i> (TEHR-rah)</td></tr><tr><td><b>I</b></td><td>ee</td><td>mach<b>i</b>ne</td><td><i>Filius</i> (FEE-lee-oos), <i>vita</i> (VEE-tah)</td></tr><tr><td><b>O</b></td><td>oh</td><td>n<b>o</b>te</td><td><i>Dominus</i> (DOH-mee-noos), <i>Ordo</i> (OR-doh)</td></tr><tr><td><b>U</b></td><td>oo</td><td>r<b>u</b>de</td><td><i>unus</i> (OO-noos), <i>cum</i> (KOOM)</td></tr></tbody></table>'},
{h:"Key Consonant Differences",x:'<p class="grammar-text">Most consonants sound like English, but these are different:</p><table class="grammar-table"><thead><tr><th>Letter(s)</th><th>Rule</th><th>Example</th></tr></thead><tbody><tr><td><b>C</b> before e, i, ae, oe</td><td>= "ch" (church)</td><td><i>caelum</i> → CHEH-loom, <i>pax</i> → PAHKS but <i>pacem</i> → PAH-chehm</td></tr><tr><td><b>C</b> otherwise</td><td>= "k" (cat)</td><td><i>corpus</i> → KOHR-poos, <i>cum</i> → KOOM</td></tr><tr><td><b>G</b> before e, i</td><td>= soft "j" (gentle)</td><td><i>regina</i> → reh-JEE-nah, <i>angelus</i> → AHN-jeh-loos</td></tr><tr><td><b>G</b> otherwise</td><td>= hard "g" (go)</td><td><i>gloria</i> → GLOH-ree-ah, <i>gratia</i> → GRAH-tsee-ah</td></tr><tr><td><b>SC</b> before e, i</td><td>= "sh"</td><td><i>ascendit</i> → ah-SHEHN-deet</td></tr><tr><td><b>GN</b></td><td>= "ny" (canyon)</td><td><i>agnus</i> → AH-nyoos, <i>regnum</i> → REH-nyoom</td></tr><tr><td><b>TI</b> + vowel</td><td>= "tsee"</td><td><i>gratia</i> → GRAH-<b>tsee</b>-ah, <i>natio</i> → NAH-<b>tsee</b>-oh</td></tr><tr><td><b>V</b></td><td>= "v" (not "w")</td><td><i>vita</i> → VEE-tah, <i>vobiscum</i> → voh-BEES-koom</td></tr><tr><td><b>J</b></td><td>= "y" (yes)</td><td><i>Iesus</i> → YEH-soos, <i>iustus</i> → YOOS-toos</td></tr></tbody></table>'},
{h:"Diphthongs",x:'<table class="grammar-table"><thead><tr><th>Letters</th><th>Sound</th><th>Examples</th></tr></thead><tbody><tr><td><b>AE</b></td><td>"eh"</td><td><i>caelum</i> (CHEH-loom), <i>terrae</i> (TEHR-reh)</td></tr><tr><td><b>OE</b></td><td>"eh"</td><td><i>poenitentia</i> (peh-nee-TEHN-tsee-ah)</td></tr><tr><td><b>AU</b></td><td>"ow" (how)</td><td><i>laudate</i> (lau-DAH-teh), <i>gaudium</i> (GAU-dee-oom)</td></tr></tbody></table>'},
{h:"Stress Rules",t:"Two-syllable words: always stress the first syllable (DÉ-us, PÁ-ter). Longer words: stress the second-to-last syllable if it is long; otherwise stress the third-to-last (Do-mí-nus, mi-se-ri-CÓR-di-a, ec-CLÉ-si-a)."},
{h:"Practice: Pronounce These",x:'<div class="grammar-note">Try pronouncing each word, then check the pronunciation guide:<br><br>1. <i>Sanctus</i> → <span style="color:var(--brown-muted)">(SAHNK-toos)</span><br>2. <i>Misericordia</i> → <span style="color:var(--brown-muted)">(mee-seh-ree-KOR-dee-ah)</span><br>3. <i>Benedicite</i> → <span style="color:var(--brown-muted)">(beh-neh-DEE-chee-teh) — note the C before I = "ch"</span><br>4. <i>Paenitentia</i> → <span style="color:var(--brown-muted)">(peh-nee-TEHN-tsee-ah) — AE = "eh", TI+vowel = "tsee"</span><br>5. <i>Agnus Dei</i> → <span style="color:var(--brown-muted)">(AH-nyoos DEH-ee) — GN = "ny"</span><br>6. <i>Resurrectio</i> → <span style="color:var(--brown-muted)">(reh-soo-REK-tsee-oh) — TI+vowel = "tsee"</span><br>7. <i>Excelsis</i> → <span style="color:var(--brown-muted)">(ehk-SHEHL-sees) — SC before E = "sh"</span><br>8. <i>Magnificat</i> → <span style="color:var(--brown-muted)">(mah-NYEE-fee-kaht) — GN = "ny"</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>Great news for Spanish speakers!</strong> Ecclesiastical Latin pronunciation is very close to Spanish. The vowels A, E, I, O, U sound nearly identical. <b>GN = ñ</b> — <i>agnus</i> is like <i>año</i> with a g. Latin stress rules work almost identically to Spanish. The biggest differences: Latin <b>V = v</b> always (not the b/v blur of Spanish), and Latin <b>J = y</b> (as in <i>yo</i>). If you can read Spanish aloud, you can read Latin aloud with just a few adjustments.</div>'},
]},

{title:"2. Nouns & Gender",content:[
{h:"Three Genders",t:"Every Latin noun has one of three genders: masculine (m.), feminine (f.), or neuter (n.). Gender is not about biology — it is a grammatical category. 'Mors' (death) is feminine, 'peccatum' (sin) is neuter, 'mundus' (world) is masculine. You must learn the gender with each noun because it determines which adjective endings to use."},
{h:"Gender Patterns",x:'<table class="grammar-table"><thead><tr><th>Ending</th><th>Usual Gender</th><th>Examples</th></tr></thead><tbody><tr><td><b>-us</b></td><td>Masculine</td><td><i>Dominus</i> (Lord), <i>Filius</i> (Son), <i>mundus</i> (world), <i>populus</i> (people)</td></tr><tr><td><b>-a</b></td><td>Feminine</td><td><i>Maria</i>, <i>ecclesia</i> (church), <i>gratia</i> (grace), <i>vita</i> (life)</td></tr><tr><td><b>-um</b></td><td>Neuter</td><td><i>regnum</i> (kingdom), <i>verbum</i> (word), <i>caelum</i> (heaven), <i>peccatum</i> (sin)</td></tr><tr><td><b>-or, -er</b></td><td>Masculine</td><td><i>pater</i> (father), <i>amor</i> (love), <i>pastor</i> (shepherd)</td></tr><tr><td><b>-io, -tas, -tus</b></td><td>Feminine</td><td><i>resurrectio</i>, <i>veritas</i> (truth), <i>virtus</i> (virtue)</td></tr></tbody></table>'},
{h:"Watch Out — Exceptions!",x:'<div class="grammar-note"><b>These look feminine (-a) but are masculine:</b><br>• <i>propheta</i> (prophet) — m. because it describes a male role<br>• <i>nauta</i> (sailor) — m.<br><br><b>These look masculine (-us) but are feminine:</b><br>• <i>domus</i> (house) — f.<br>• <i>manus</i> (hand) — f.<br><br><b>Rule of thumb:</b> When in doubt, learn the gender alongside the word!</div>'},
{h:"Why Gender Matters — Adjective Agreement",x:'<p class="grammar-text">The adjective <b>must match</b> the gender of its noun. Watch how "sanctus" (holy) changes:</p><table class="grammar-table"><thead><tr><th>Gender</th><th>Phrase</th><th>Translation</th></tr></thead><tbody><tr><td>Masculine</td><td><i>Spiritus <b>Sanctus</b></i></td><td>the Holy Spirit</td></tr><tr><td>Feminine</td><td><i><b>Sancta</b> Maria</i></td><td>Holy Mary</td></tr><tr><td>Neuter</td><td><i>nomen <b>sanctum</b></i></td><td>the holy name</td></tr><tr><td>Masculine</td><td><i>Pater <b>noster</b></i></td><td>our Father</td></tr><tr><td>Feminine</td><td><i>vita <b>nostra</b></i></td><td>our life</td></tr><tr><td>Neuter</td><td><i>regnum <b>nostrum</b></i></td><td>our kingdom</td></tr></tbody></table>'},
{h:"Exercise: Identify the Gender",x:'<div class="grammar-note">Based on the ending patterns above, guess the gender of each noun:<br><br>1. <i>terra</i> (earth) → <span style="color:var(--brown-muted)">Feminine (ends in -a)</span><br>2. <i>templum</i> (temple) → <span style="color:var(--brown-muted)">Neuter (ends in -um)</span><br>3. <i>angelus</i> (angel) → <span style="color:var(--brown-muted)">Masculine (ends in -us)</span><br>4. <i>crux</i> (cross) → <span style="color:var(--brown-muted)">Feminine (3rd decl., must memorize)</span><br>5. <i>peccatum</i> (sin) → <span style="color:var(--brown-muted)">Neuter (ends in -um)</span><br>6. <i>redemptio</i> (redemption) → <span style="color:var(--brown-muted)">Feminine (ends in -io)</span><br>7. <i>sacerdos</i> (priest) → <span style="color:var(--brown-muted)">Masculine (must memorize)</span><br>8. <i>caritas</i> (charity) → <span style="color:var(--brown-muted)">Feminine (ends in -tas)</span></div>'},
{h:"Exercise: Match the Adjective",x:'<div class="grammar-note">Which form of <b>bonus</b> (good) goes with each noun? Options: bonus (m.), bona (f.), bonum (n.)<br><br>1. <i>_____ pastor</i> (good shepherd) → <span style="color:var(--brown-muted)"><i>bonus</i> pastor (masc.)</span><br>2. <i>_____ aqua</i> (good water) → <span style="color:var(--brown-muted)"><i>bona</i> aqua (fem.)</span><br>3. <i>_____ verbum</i> (good word) → <span style="color:var(--brown-muted)"><i>bonum</i> verbum (neut.)</span><br>4. <i>_____ ecclesia</i> (good church) → <span style="color:var(--brown-muted)"><i>bona</i> ecclesia (fem.)</span><br>5. <i>_____ vinum</i> (good wine) → <span style="color:var(--brown-muted)"><i>bonum</i> vinum (neut.)</span><br>6. <i>_____ Deus</i> (good God) → <span style="color:var(--brown-muted)"><i>bonus</i> Deus (masc.)</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>You already understand grammatical gender!</strong> Spanish and Latin gender work almost identically. <i>El mundo</i> = masculine, <i>la vida</i> = feminine — same genders as Latin <i>mundus</i> (m.) and <i>vita</i> (f.). The <b>-us → -o</b> and <b>-a → -a</b> patterns carried through: <i>sanctus → santo</i>, <i>terra → tierra</i>, <i>ecclesia → iglesia</i>. Adjective agreement is identical: <i>Sancta Maria = Santa María</i>, <i>Spiritus Sanctus = Espíritu Santo</i>. The one tricky area: Latin has <b>neuter</b> (-um), which Spanish lost — neuter nouns became masculine: <i>regnum → el reino</i>, <i>verbum → el verbo</i>.</div>'},
]},

{title:"3. First Declension (-a)",content:[
{h:"What Is a Declension?",t:"A declension is a pattern of endings that nouns follow. Think of it like a template. If you know the pattern, you can figure out the ending for ANY noun in that group. The first declension covers mostly feminine nouns ending in '-a.' These are some of the most common words in Church Latin: Maria, ecclesia, gratia, vita, terra, gloria, anima."},
{h:"The Six Cases — What They Do",x:'<p class="grammar-text">Before we see the endings, understand that each ending tells you the <b>job</b> the noun is doing in the sentence:</p><table class="grammar-table"><thead><tr><th>Case</th><th>Job</th><th>English Clue</th><th>Example</th></tr></thead><tbody><tr><td><b>Nominative</b></td><td>Subject — who does it</td><td>(no word)</td><td><i><b>Gratia</b> plena</i> — <b>Grace</b> full (full of grace)</td></tr><tr><td><b>Genitive</b></td><td>Possession — "of"</td><td>of, \'s</td><td><i>Mater <b>ecclesiae</b></i> — Mother <b>of the church</b></td></tr><tr><td><b>Dative</b></td><td>Indirect object — "to/for"</td><td>to, for</td><td><i>Gloria <b>Mariae</b></i> — Glory <b>to Mary</b></td></tr><tr><td><b>Accusative</b></td><td>Direct object — receives action</td><td>(no word)</td><td><i>ad <b>vitam</b></i> — to <b>life</b></td></tr><tr><td><b>Ablative</b></td><td>By, with, from, in</td><td>by, with, in</td><td><i><b>gratiā</b> plena</i> — full <b>with grace</b></td></tr><tr><td><b>Vocative</b></td><td>Calling someone</td><td>O...!</td><td><i>Sancta <b>Maria</b>!</i> — Holy <b>Mary</b>!</td></tr></tbody></table>'},
{h:"First Declension Endings — Singular",x:'<table class="grammar-table"><thead><tr><th>Case</th><th>Ending</th><th>vita (life)</th><th>ecclesia (church)</th><th>gratia (grace)</th></tr></thead><tbody><tr><td><b>Nom.</b></td><td>-a</td><td>vita</td><td>ecclesia</td><td>gratia</td></tr><tr><td><b>Gen.</b></td><td>-ae</td><td>vitae</td><td>ecclesiae</td><td>gratiae</td></tr><tr><td><b>Dat.</b></td><td>-ae</td><td>vitae</td><td>ecclesiae</td><td>gratiae</td></tr><tr><td><b>Acc.</b></td><td>-am</td><td>vitam</td><td>ecclesiam</td><td>gratiam</td></tr><tr><td><b>Abl.</b></td><td>-ā</td><td>vitā</td><td>ecclesiā</td><td>gratiā</td></tr><tr><td><b>Voc.</b></td><td>-a</td><td>vita</td><td>ecclesia</td><td>gratia</td></tr></tbody></table>'},
{h:"First Declension Endings — Plural",x:'<table class="grammar-table"><thead><tr><th>Case</th><th>Ending</th><th>vita</th><th>ecclesia</th><th>terra</th></tr></thead><tbody><tr><td><b>Nom.</b></td><td>-ae</td><td>vitae</td><td>ecclesiae</td><td>terrae</td></tr><tr><td><b>Gen.</b></td><td>-ārum</td><td>vitārum</td><td>ecclesiārum</td><td>terrārum</td></tr><tr><td><b>Dat.</b></td><td>-īs</td><td>vitīs</td><td>ecclesiīs</td><td>terrīs</td></tr><tr><td><b>Acc.</b></td><td>-ās</td><td>vitās</td><td>ecclesiās</td><td>terrās</td></tr><tr><td><b>Abl.</b></td><td>-īs</td><td>vitīs</td><td>ecclesiīs</td><td>terrīs</td></tr></tbody></table>'},
{h:"Examples in Prayers & Liturgy",x:'<div class="grammar-note"><b>Nominative (subject):</b><br>• <i><b>Gratia</b> plena</i> — <b>Grace</b> [is] full → Mary is full of grace<br>• <i><b>Gloria</b> Patri</i> — <b>Glory</b> [be] to the Father<br><br><b>Genitive (of):</b><br>• <i>Mater <b>misericordiae</b></i> — Mother <b>of mercy</b><br>• <i>in hora <b>mortis nostrae</b></i> — in the hour of <b>our death</b> (mortis = death, 3rd decl., but nostrae = our, 1st decl. gen.)<br><br><b>Dative (to):</b><br>• <i>Gloria <b>Mariae</b></i> — Glory <b>to Mary</b><br><br><b>Accusative (object):</b><br>• <i>ad <b>vitam</b> aeternam</i> — to <b>eternal life</b><br>• <i>per <b>gratiam</b> tuam</i> — through <b>your grace</b><br><br><b>Ablative (with/in):</b><br>• <i><b>gratiā</b> plena</i> — full <b>with grace</b><br>• <i>in <b>terrā</b></i> — <b>on earth</b><br>• <i>in hac lacrimārum <b>valle</b></i> — in this <b>valley</b> of tears</div>'},
{h:"Exercise: Identify the Case",x:'<div class="grammar-note">Look at the ending and tell which case each word is in:<br><br>1. <i>ecclesiam</i> → <span style="color:var(--brown-muted)">Accusative singular (-am ending, "the church" as object)</span><br>2. <i>vitae</i> → <span style="color:var(--brown-muted)">Could be genitive ("of life") OR dative ("to life") OR nominative plural ("lives") — context decides!</span><br>3. <i>terrā</i> → <span style="color:var(--brown-muted)">Ablative singular ("on/in/with the earth")</span><br>4. <i>gratiam</i> → <span style="color:var(--brown-muted)">Accusative singular ("grace" as object)</span><br>5. <i>ecclesiārum</i> → <span style="color:var(--brown-muted)">Genitive plural ("of the churches")</span><br>6. <i>Mariae</i> → <span style="color:var(--brown-muted)">Genitive/dative singular ("of Mary" or "to Mary")</span></div>'},
{h:"Exercise: Translate These Phrases",x:'<div class="grammar-note">Using what you know about 1st declension endings, translate:<br><br>1. <i>vita ecclesiae</i> → <span style="color:var(--brown-muted)">the life of the church (vita = nom., ecclesiae = gen.)</span><br>2. <i>ad gloriam</i> → <span style="color:var(--brown-muted)">to/toward glory (gloriam = acc. after ad)</span><br>3. <i>in ecclesiā</i> → <span style="color:var(--brown-muted)">in the church (ecclesiā = abl. after in+location)</span><br>4. <i>gratia Mariae</i> → <span style="color:var(--brown-muted)">the grace of Mary (Mariae = gen.)</span><br>5. <i>pro animā</i> → <span style="color:var(--brown-muted)">for the soul (animā = abl. after pro)</span><br>6. <i>terrae et caeli</i> → <span style="color:var(--brown-muted)">of earth and of heaven (both genitive)</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>You already know these words!</strong> Almost every 1st declension noun survived into Spanish: <i>terra → tierra</i>, <i>vita → vida</i>, <i>ecclesia → iglesia</i>, <i>gratia → gracia</i>, <i>gloria → gloria</i>, <i>anima → alma</i>. The big difference: Spanish kept <b>one form</b> per noun (usually from the accusative: <i>terram → tierra</i>). Latin uses <b>six endings</b> for different roles. Where Spanish uses <i>de</i> (of), <i>a</i> (to), <i>con</i> (with), Latin changes the ending instead. <i>De la iglesia</i> = <i>ecclesiae</i> (gen.). <i>A la iglesia</i> = <i>ecclesiae</i> (dat.). <i>En la iglesia</i> = <i>in ecclesiā</i> (abl.).</div>'},
],drills:[
{noun:"terra",gender:"f",decl:1,sg:["terra","terrae","terrae","terram","terrā"],pl:["terrae","terrārum","terrīs","terrās","terrīs"]},
{noun:"gloria",gender:"f",decl:1,sg:["gloria","gloriae","gloriae","gloriam","gloriā"],pl:["gloriae","gloriārum","gloriīs","gloriās","gloriīs"]},
{noun:"anima",gender:"f",decl:1,sg:["anima","animae","animae","animam","animā"],pl:["animae","animārum","animīs","animās","animīs"]}
]},

{title:"4. Second Declension (-us/-um)",content:[
{h:"Overview",t:"The second declension has two main types: masculine nouns ending in '-us' (Dominus, Filius, servus) and neuter nouns ending in '-um' (regnum, verbum, caelum, peccatum). These are extremely common in Church Latin. Learning this pattern alongside the first declension gives you coverage of the vast majority of liturgical nouns."},
{h:"Masculine (-us) — Singular & Plural",x:'<table class="grammar-table"><thead><tr><th>Case</th><th>Sg. End</th><th>Dominus</th><th>Filius</th><th>Pl. End</th><th>Dominus pl.</th></tr></thead><tbody><tr><td><b>Nom.</b></td><td>-us</td><td>Dominus</td><td>Filius</td><td>-ī</td><td>Dominī</td></tr><tr><td><b>Gen.</b></td><td>-ī</td><td>Dominī</td><td>Filiī</td><td>-ōrum</td><td>Dominōrum</td></tr><tr><td><b>Dat.</b></td><td>-ō</td><td>Dominō</td><td>Filiō</td><td>-īs</td><td>Dominīs</td></tr><tr><td><b>Acc.</b></td><td>-um</td><td>Dominum</td><td>Filium</td><td>-ōs</td><td>Dominōs</td></tr><tr><td><b>Abl.</b></td><td>-ō</td><td>Dominō</td><td>Filiō</td><td>-īs</td><td>Dominīs</td></tr><tr><td><b>Voc.</b></td><td><b>-e</b></td><td><b>Domine!</b></td><td>Filī!</td><td>-ī</td><td>Dominī!</td></tr></tbody></table><div class="grammar-note"><b>Key point:</b> The vocative singular is special — it ends in <b>-e</b>, not -us! That is why we say <i>"Domine!"</i> (O Lord!) and not "Dominus!" when addressing God. <i>Filius</i> has irregular vocative <i>Filī</i>.</div>'},
{h:"Neuter (-um) — Singular & Plural",x:'<table class="grammar-table"><thead><tr><th>Case</th><th>Sg. End</th><th>verbum</th><th>regnum</th><th>Pl. End</th><th>verbum pl.</th></tr></thead><tbody><tr><td><b>Nom.</b></td><td>-um</td><td>verbum</td><td>regnum</td><td><b>-a</b></td><td><b>verba</b></td></tr><tr><td><b>Gen.</b></td><td>-ī</td><td>verbī</td><td>regnī</td><td>-ōrum</td><td>verbōrum</td></tr><tr><td><b>Dat.</b></td><td>-ō</td><td>verbō</td><td>regnō</td><td>-īs</td><td>verbīs</td></tr><tr><td><b>Acc.</b></td><td><b>-um</b></td><td><b>verbum</b></td><td><b>regnum</b></td><td><b>-a</b></td><td><b>verba</b></td></tr><tr><td><b>Abl.</b></td><td>-ō</td><td>verbō</td><td>regnō</td><td>-īs</td><td>verbīs</td></tr></tbody></table><div class="grammar-note"><b>The Golden Neuter Rule:</b> In <i>every</i> neuter noun in <i>every</i> declension, the <b>nominative and accusative are always identical</b>. Also, neuter nominative/accusative plurals always end in <b>-a</b>. This rule never fails!</div>'},
{h:"Examples in Prayers & Liturgy",x:'<div class="grammar-note"><b>Nominative (subject):</b><br>• <i><b>Dominus</b> vobiscum</i> — The <b>Lord</b> [be] with you<br>• <i>Benedictus qui <b>venit</b></i> — Blessed [is he] who comes<br>• <i><b>Agnus</b> Dei</i> — The <b>Lamb</b> of God<br><br><b>Genitive (of):</b><br>• <i>Verbum <b>Domini</b></i> — The Word <b>of the Lord</b><br>• <i>Agnus <b>Dei</b></i> — Lamb <b>of God</b> (Dei = gen. of Deus, irregular)<br>• <i>fructus ventris <b>tui</b></i> — the fruit of <b>your</b> womb<br><br><b>Dative (to/for):</b><br>• <i>Gloria <b>Filio</b></i> — Glory to <b>the Son</b><br>• <i>laus <b>Domino</b></i> — praise <b>to the Lord</b><br><br><b>Accusative (object):</b><br>• <i>ad <b>Dominum</b></i> — to/toward <b>the Lord</b><br>• <i>Adveniat <b>regnum</b> tuum</i> — May <b>your kingdom</b> come<br>• <i>per <b>Filium</b></i> — through <b>the Son</b><br><br><b>Ablative (with/in/by):</b><br>• <i>in <b>nomine Domini</b></i> — in <b>the name</b> of the Lord (nomen is 3rd decl., but Domini = 2nd decl.)<br>• <i>cum <b>Filio</b></i> — with <b>the Son</b><br><br><b>Vocative (address):</b><br>• <i><b>Domine</b>!</i> — O <b>Lord</b>! (-us → -e)<br>• <i><b>Christe</b>!</i> — O <b>Christ</b>!</div>'},
{h:"Comparing 1st & 2nd Declension",x:'<p class="grammar-text">Notice how 1st and 2nd declensions are similar — they are often taught together because adjectives use BOTH patterns:</p><table class="grammar-table"><thead><tr><th>Case</th><th>1st (fem.)</th><th>2nd masc.</th><th>2nd neut.</th></tr></thead><tbody><tr><td>Nom.</td><td>-a</td><td>-us</td><td>-um</td></tr><tr><td>Gen.</td><td>-ae</td><td>-ī</td><td>-ī</td></tr><tr><td>Dat.</td><td>-ae</td><td>-ō</td><td>-ō</td></tr><tr><td>Acc.</td><td>-am</td><td>-um</td><td>-um</td></tr><tr><td>Abl.</td><td>-ā</td><td>-ō</td><td>-ō</td></tr></tbody></table><div class="grammar-note">This is why <i>sanctus/sancta/sanctum</i> uses both patterns — masculine follows 2nd declension endings, feminine follows 1st!</div>'},
{h:"Exercise: Identify the Case",x:'<div class="grammar-note">1. <i>Domini</i> → <span style="color:var(--brown-muted)">Genitive singular ("of the Lord") — as in Verbum Domini</span><br>2. <i>Filium</i> → <span style="color:var(--brown-muted)">Accusative singular ("the Son" as object) — as in per Filium</span><br>3. <i>Domine</i> → <span style="color:var(--brown-muted)">Vocative singular (addressing God directly)</span><br>4. <i>regnum</i> → <span style="color:var(--brown-muted)">Nominative OR accusative singular (neuter rule!) — context decides</span><br>5. <i>verbō</i> → <span style="color:var(--brown-muted)">Dative or ablative singular ("to/for the word" or "by/with the word")</span><br>6. <i>peccata</i> → <span style="color:var(--brown-muted)">Nominative or accusative PLURAL (neuter plural -a!) — "sins"</span></div>'},
{h:"Exercise: Translate These Phrases",x:'<div class="grammar-note">1. <i>Verbum Domini</i> → <span style="color:var(--brown-muted)">The Word of the Lord</span><br>2. <i>regnum caelorum</i> → <span style="color:var(--brown-muted)">the kingdom of the heavens (caelorum = gen. pl.)</span><br>3. <i>Agnus Dei</i> → <span style="color:var(--brown-muted)">the Lamb of God</span><br>4. <i>ad Dominum</i> → <span style="color:var(--brown-muted)">toward the Lord (acc. after ad)</span><br>5. <i>cum Filio et Spiritu Sancto</i> → <span style="color:var(--brown-muted)">with the Son and the Holy Spirit (abl. after cum)</span><br>6. <i>peccata mundi</i> → <span style="color:var(--brown-muted)">the sins of the world (peccata = acc./nom. pl., mundi = gen.)</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>The -us → -o shift you already know!</strong> Second declension masculines ended in <i>-us</i>, which became <i>-o</i> in Spanish: <i>Dominus → dueño</i>, <i>servus → siervo</i>, <i>mundus → mundo</i>, <i>filius → hijo</i>. Neuter <i>-um</i> also became <i>-o</i>: <i>verbum → verbo</i>, <i>regnum → reino</i>, <i>caelum → cielo</i>. The <b>vocative</b> (<i>Domine!</i>) has no Spanish parallel — Spanish just uses the same form: <i>¡Señor!</i> Latin genitive (<i>Domini</i> = of the Lord) is where Spanish uses <i>del</i>: <i>Verbum Domini</i> = <i>Palabra del Señor</i>.</div>'},
],drills:[
{noun:"servus",gender:"m",decl:2,sg:["servus","servī","servō","servum","servō"],pl:["servī","servōrum","servīs","servōs","servīs"]},
{noun:"verbum",gender:"n",decl:2,sg:["verbum","verbī","verbō","verbum","verbō"],pl:["verba","verbōrum","verbīs","verba","verbīs"]},
{noun:"filius",gender:"m",decl:2,sg:["filius","filiī","filiō","filium","filiō"],pl:["filiī","filiōrum","filiīs","filiōs","filiīs"]}
]},
{title:"5. Third Declension",content:[
{h:"Overview",t:"The third declension is the largest and most varied. Unlike the neat -a and -us/-um patterns, third declension nouns can end in almost anything in the nominative: rex, pax, lux, pater, nomen, corpus, homo. The key trick: always learn the GENITIVE form alongside the nominative. The genitive always ends in '-is' and reveals the TRUE STEM that all other cases build from."},
{h:"Finding the Stem",x:'<p class="grammar-text">The nominative form is often shortened or changed. The genitive reveals the real stem:</p><table class="grammar-table"><thead><tr><th>Nominative</th><th>Genitive</th><th>Stem</th><th>Gender</th><th>Meaning</th></tr></thead><tbody><tr><td>rex</td><td>reg-<b>is</b></td><td>reg-</td><td>m.</td><td>king</td></tr><tr><td>pax</td><td>pac-<b>is</b></td><td>pac-</td><td>f.</td><td>peace</td></tr><tr><td>lux</td><td>luc-<b>is</b></td><td>luc-</td><td>f.</td><td>light</td></tr><tr><td>mors</td><td>mort-<b>is</b></td><td>mort-</td><td>f.</td><td>death</td></tr><tr><td>nomen</td><td>nomin-<b>is</b></td><td>nomin-</td><td>n.</td><td>name</td></tr><tr><td>corpus</td><td>corpor-<b>is</b></td><td>corpor-</td><td>n.</td><td>body</td></tr><tr><td>pater</td><td>patr-<b>is</b></td><td>patr-</td><td>m.</td><td>father</td></tr><tr><td>mater</td><td>matr-<b>is</b></td><td>matr-</td><td>f.</td><td>mother</td></tr><tr><td>homo</td><td>homin-<b>is</b></td><td>homin-</td><td>m.</td><td>man/human</td></tr><tr><td>virgo</td><td>virgin-<b>is</b></td><td>virgin-</td><td>f.</td><td>virgin</td></tr></tbody></table><div class="grammar-note">Notice how different the stems look from the nominative! <i>rex → reg-</i>, <i>nomen → nomin-</i>, <i>homo → homin-</i>. You cannot guess the stem from the nominative alone.</div>'},
{h:"Third Declension Endings",x:'<table class="grammar-table"><thead><tr><th>Case</th><th>Sg.</th><th>pax (f.)</th><th>pater (m.)</th><th>nomen (n.)</th></tr></thead><tbody><tr><td><b>Nom.</b></td><td>(varies)</td><td>pax</td><td>pater</td><td>nomen</td></tr><tr><td><b>Gen.</b></td><td>-is</td><td>pacis</td><td>patris</td><td>nominis</td></tr><tr><td><b>Dat.</b></td><td>-ī</td><td>pacī</td><td>patrī</td><td>nominī</td></tr><tr><td><b>Acc.</b></td><td>-em / =nom(n.)</td><td>pacem</td><td>patrem</td><td>nomen</td></tr><tr><td><b>Abl.</b></td><td>-e</td><td>pace</td><td>patre</td><td>nomine</td></tr></tbody></table><table class="grammar-table"><thead><tr><th>Case</th><th>Pl.</th><th>pax</th><th>pater</th><th>nomen</th></tr></thead><tbody><tr><td><b>Nom.</b></td><td>-ēs / -a(n.)</td><td>pacēs</td><td>patrēs</td><td>nomina</td></tr><tr><td><b>Gen.</b></td><td>-um</td><td>pacum</td><td>patrum</td><td>nominum</td></tr><tr><td><b>Dat.</b></td><td>-ibus</td><td>pacibus</td><td>patribus</td><td>nominibus</td></tr><tr><td><b>Acc.</b></td><td>-ēs / -a(n.)</td><td>pacēs</td><td>patrēs</td><td>nomina</td></tr><tr><td><b>Abl.</b></td><td>-ibus</td><td>pacibus</td><td>patribus</td><td>nominibus</td></tr></tbody></table><div class="grammar-note"><b>Remember the neuter rule:</b> Nominative = accusative, always. And neuter plurals end in <b>-a</b> (nomina, corpora).</div>'},
{h:"Examples in Prayers & Liturgy",x:'<div class="grammar-note"><b>Nominative:</b><br>• <i><b>Pax</b> Domini</i> — The <b>peace</b> of the Lord<br>• <i><b>Lux</b> aeterna</i> — <b>Eternal light</b><br>• <i><b>Rex</b> gloriae</i> — <b>King</b> of glory<br><br><b>Genitive (of):</b><br>• <i>in nomine <b>Patris</b></i> — in the name <b>of the Father</b><br>• <i>in hora <b>mortis</b> nostrae</i> — in the hour <b>of our death</b><br>• <i>Agnus Dei... peccata <b>mundi</b></i> — sins <b>of the world</b> (mundus = 2nd decl., but shown here for context)<br>• <i><b>Corpus</b> Christi</i> — <b>Body</b> of Christ<br><br><b>Dative (to):</b><br>• <i>Gloria <b>Patri</b></i> — Glory <b>to the Father</b> (Patri = dat. of pater!)<br>• <i>laus tibi, <b>Christe</b></i> — praise to you, O Christ (voc.)<br><br><b>Accusative (object):</b><br>• <i>dona nobis <b>pacem</b></i> — grant us <b>peace</b><br>• <i>ad <b>lucem</b></i> — toward <b>the light</b><br>• <i>per <b>mortem</b></i> — through <b>death</b><br><br><b>Ablative (in/with/by):</b><br>• <i>in <b>nomine</b> Patris</i> — in the <b>name</b> of the Father<br>• <i>in <b>pace</b></i> — in <b>peace</b><br>• <i>cum <b>Patre</b> et Filio</i> — with <b>the Father</b> and the Son</div>'},
{h:"Exercise: Find the Stem",x:'<div class="grammar-note">Given the nominative and genitive, identify the stem:<br><br>1. <i>crux, crucis</i> → <span style="color:var(--brown-muted)">cruc- (cross)</span><br>2. <i>homo, hominis</i> → <span style="color:var(--brown-muted)">homin- (man)</span><br>3. <i>virtus, virtutis</i> → <span style="color:var(--brown-muted)">virtut- (virtue)</span><br>4. <i>salus, salutis</i> → <span style="color:var(--brown-muted)">salut- (salvation)</span><br>5. <i>veritas, veritatis</i> → <span style="color:var(--brown-muted)">veritat- (truth)</span><br>6. <i>corpus, corporis</i> → <span style="color:var(--brown-muted)">corpor- (body)</span></div>'},
{h:"Exercise: Translate These Phrases",x:'<div class="grammar-note">1. <i>dona nobis pacem</i> → <span style="color:var(--brown-muted)">grant us peace (pacem = acc. of pax)</span><br>2. <i>in nomine Patris</i> → <span style="color:var(--brown-muted)">in the name of the Father (nomine = abl. of nomen; Patris = gen. of pater)</span><br>3. <i>Corpus Christi</i> → <span style="color:var(--brown-muted)">the Body of Christ (Corpus = nom.; Christi = gen.)</span><br>4. <i>Rex regum</i> → <span style="color:var(--brown-muted)">King of kings (regum = gen. pl. of rex)</span><br>5. <i>lux mundi</i> → <span style="color:var(--brown-muted)">the light of the world</span><br>6. <i>requiescant in pace</i> → <span style="color:var(--brown-muted)">may they rest in peace (pace = abl.)</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>Spanish kept the stem, not the nominative!</strong> Third declension nouns look different in nominative vs. other cases — and Spanish usually evolved from the <b>accusative/stem</b>, not the nominative. This is why Spanish words resemble the Latin stem: <i>pax/pac-is → paz</i>, <i>lux/luc-is → luz</i>, <i>nomen/nomin-is → nombre</i>, <i>homo/homin-is → hombre</i>. When you learn the genitive stem, you are seeing the ancestor of the Spanish word! <i>Rex/reg-is → rey</i>, <i>crux/cruc-is → cruz</i>, <i>mors/mort-is → muerte</i>.</div>'},
],drills:[
{noun:"pax",gender:"f",decl:3,sg:["pax","pacis","pacī","pacem","pace"],pl:["pacēs","pacum","pacibus","pacēs","pacibus"]},
{noun:"nomen",gender:"n",decl:3,sg:["nomen","nominis","nominī","nomen","nomine"],pl:["nomina","nominum","nominibus","nomina","nominibus"]},
{noun:"pater",gender:"m",decl:3,sg:["pater","patris","patrī","patrem","patre"],pl:["patrēs","patrum","patribus","patrēs","patribus"]}
]},

{title:"6. Cases Explained",content:[
{h:"The Big Picture",t:"Cases are the heart of Latin. In English, word order tells you who does what: 'The dog bit the man' vs. 'The man bit the dog.' In Latin, the ENDINGS tell you who does what, so word order is flexible. 'Dominus vobiscum' and 'Vobiscum Dominus' mean the same thing — the endings are what matter."},
{h:"All Six Cases at a Glance",x:'<table class="grammar-table"><thead><tr><th>Case</th><th>Question</th><th>Function</th><th>Liturgical Example</th></tr></thead><tbody><tr><td><b>Nominative</b></td><td>Who? What?</td><td>Subject</td><td><i><b>Dominus</b> vobiscum</i> — The <b>Lord</b> be with you</td></tr><tr><td><b>Genitive</b></td><td>Whose? Of what?</td><td>Possession</td><td><i>Agnus <b>Dei</b></i> — Lamb <b>of God</b></td></tr><tr><td><b>Dative</b></td><td>To/for whom?</td><td>Indirect object</td><td><i>Gloria <b>Patri</b></i> — Glory <b>to the Father</b></td></tr><tr><td><b>Accusative</b></td><td>Whom? What?</td><td>Direct object / destination</td><td><i>dona nobis <b>pacem</b></i> — grant us <b>peace</b></td></tr><tr><td><b>Ablative</b></td><td>By/with/from/in?</td><td>Means, accompaniment, location</td><td><i>in <b>nomine</b> Patris</i> — in the <b>name</b></td></tr><tr><td><b>Vocative</b></td><td>— (address)</td><td>Calling someone</td><td><i><b>Domine</b>!</i> — O <b>Lord</b>!</td></tr></tbody></table>'},
{h:"Prepositions — Which Case Do They Take?",x:'<p class="grammar-text">Prepositions in Latin require specific cases. This is not optional — you must memorize which ones go with which case.</p><table class="grammar-table"><thead><tr><th>Preposition</th><th>+ Case</th><th>Meaning</th><th>Example</th></tr></thead><tbody><tr><td><b>ad</b></td><td>+ acc.</td><td>to, toward</td><td><i>ad <b>Deum</b></i> — to God</td></tr><tr><td><b>per</b></td><td>+ acc.</td><td>through</td><td><i>per <b>Christum</b></i> — through Christ</td></tr><tr><td><b>in</b> (motion)</td><td>+ acc.</td><td>into</td><td><i>in <b>tentationem</b></i> — into temptation</td></tr><tr><td><b>ante</b></td><td>+ acc.</td><td>before</td><td><i>ante <b>saecula</b></i> — before the ages</td></tr><tr><td><b>post</b></td><td>+ acc.</td><td>after</td><td><i>post <b>mortem</b></i> — after death</td></tr><tr><td colspan="4" style="background:var(--gold-08);font-weight:700">— Ablative prepositions —</td></tr><tr><td><b>in</b> (location)</td><td>+ abl.</td><td>in, on</td><td><i>in <b>caelis</b></i> — in heaven</td></tr><tr><td><b>cum</b></td><td>+ abl.</td><td>with</td><td><i>cum <b>spiritu</b> tuo</i> — with your spirit</td></tr><tr><td><b>de</b></td><td>+ abl.</td><td>about, from</td><td><i>de <b>caelo</b></i> — from heaven</td></tr><tr><td><b>ex</b></td><td>+ abl.</td><td>out of</td><td><i>ex <b>Maria</b> Virgine</i> — from the Virgin Mary</td></tr><tr><td><b>pro</b></td><td>+ abl.</td><td>for, on behalf of</td><td><i>ora pro <b>nobis</b></i> — pray for us</td></tr><tr><td><b>sine</b></td><td>+ abl.</td><td>without</td><td><i>sine <b>fine</b></i> — without end</td></tr><tr><td><b>sub</b></td><td>+ abl.</td><td>under</td><td><i>sub <b>tectum</b> meum</i> — under my roof</td></tr></tbody></table><div class="grammar-note"><b>The IN Rule:</b> <i>in</i> + accusative = motion INTO somewhere (<i>in tentationem</i> = into temptation).<br><i>in</i> + ablative = location IN somewhere (<i>in caelis</i> = in heaven).</div>'},
{h:"Exercise: Identify the Case and Why",x:'<div class="grammar-note">For each underlined word, name the case and explain why it takes that case:<br><br>1. <i>Dominus <b>vobiscum</b></i> → <span style="color:var(--brown-muted)">Ablative (cum + vobis = with you, ablative after cum)</span><br>2. <i>Gloria <b>Patri</b></i> → <span style="color:var(--brown-muted)">Dative (glory TO the Father — indirect object)</span><br>3. <i>Agnus <b>Dei</b></i> → <span style="color:var(--brown-muted)">Genitive (Lamb OF God — possession)</span><br>4. <i>dona nobis <b>pacem</b></i> → <span style="color:var(--brown-muted)">Accusative (peace = direct object being granted)</span><br>5. <i>in <b>nomine</b> Patris</i> → <span style="color:var(--brown-muted)">Ablative (in + location = ablative)</span><br>6. <i><b>Domine</b>, non sum dignus</i> → <span style="color:var(--brown-muted)">Vocative (directly addressing God — "O Lord")</span><br>7. <i>per <b>Christum</b> Dominum nostrum</i> → <span style="color:var(--brown-muted)">Accusative (per + acc. = through Christ)</span><br>8. <i>pro <b>nobis</b> peccatoribus</i> → <span style="color:var(--brown-muted)">Ablative (pro + abl. = for us)</span></div>'},
{h:"Exercise: Choose the Right Case",x:'<div class="grammar-note">Fill in the correct form of the word in parentheses:<br><br>1. Gloria _____ (Deus, dat.) → <span style="color:var(--brown-muted)">Deo (to God)</span><br>2. in _____ (caelum, abl.) → <span style="color:var(--brown-muted)">caelo (in heaven — location)</span><br>3. per _____ (Filius, acc.) → <span style="color:var(--brown-muted)">Filium (through the Son)</span><br>4. Verbum _____ (Dominus, gen.) → <span style="color:var(--brown-muted)">Domini (Word of the Lord)</span><br>5. cum _____ (spiritus, abl.) tuo → <span style="color:var(--brown-muted)">spiritu (with your spirit)</span><br>6. ora pro _____ (nos, abl.) → <span style="color:var(--brown-muted)">nobis (pray for us)</span><br>7. ad _____ (Dominus, acc.) → <span style="color:var(--brown-muted)">Dominum (toward the Lord)</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>Spanish replaced cases with prepositions — you know the meaning!</strong> Spanish uses prepositions for the same functions as Latin cases:<br><br>• <b>Genitive</b> (of) = <i>de</i>: <i>Agnus <b>Dei</b></i> = <i>Cordero <b>de</b> Dios</i><br>• <b>Dative</b> (to) = <i>a/para</i>: <i>Gloria <b>Patri</b></i> = <i>Gloria <b>al</b> Padre</i><br>• <b>Accusative</b> (object): <i>dona nobis <b>pacem</b></i> = <i>danos <b>la paz</b></i><br>• <b>Ablative</b> (with/in) = <i>con/en/por</i>: <i>cum <b>spiritu</b></i> = <i><b>con</b> el espíritu</i><br><br>You already distinguish <i>in + motion</i> vs. <i>in + location</i>: <i>voy <b>a</b> la iglesia</i> (acc.) vs. <i>estoy <b>en</b> la iglesia</i> (abl.).</div>'},
]},

{title:"7. Adjective Agreement",content:[
{h:"The Golden Rule",t:"Every adjective MUST agree with its noun in three ways: gender, number, and case. This does NOT mean the endings look the same — it means they represent the same grammatical categories. 'Spiritus Sanctus' — both masculine, nominative, singular. 'Vitam aeternam' — both feminine, accusative, singular. The endings differ because the noun and adjective use different declension patterns."},
{h:"1st/2nd Declension Adjectives",x:'<p class="grammar-text">These use 1st declension endings for feminine, 2nd declension for masculine and neuter. The adjective <b>bonus, bona, bonum</b> (good) is the model:</p><table class="grammar-table"><thead><tr><th>Case</th><th>Masc.</th><th>Fem.</th><th>Neut.</th></tr></thead><tbody><tr><td><b>Nom.</b></td><td>bonus</td><td>bona</td><td>bonum</td></tr><tr><td><b>Gen.</b></td><td>bonī</td><td>bonae</td><td>bonī</td></tr><tr><td><b>Dat.</b></td><td>bonō</td><td>bonae</td><td>bonō</td></tr><tr><td><b>Acc.</b></td><td>bonum</td><td>bonam</td><td>bonum</td></tr><tr><td><b>Abl.</b></td><td>bonō</td><td>bonā</td><td>bonō</td></tr></tbody></table><div class="grammar-note">Other common 1st/2nd declension adjectives: <i>sanctus/a/um</i> (holy), <i>aeternus/a/um</i> (eternal), <i>magnus/a/um</i> (great), <i>verus/a/um</i> (true), <i>noster/nostra/nostrum</i> (our).</div>'},
{h:"Adjective Agreement in Action",x:'<table class="grammar-table"><thead><tr><th>Phrase</th><th>Noun</th><th>Adjective</th><th>Why?</th></tr></thead><tbody><tr><td><i>Spiritus <b>Sanctus</b></i></td><td>Spiritus (m. nom.)</td><td>Sanctus (m. nom.)</td><td>Both masc. nom. sg.</td></tr><tr><td><i>Sancta <b>Maria</b></i></td><td>Maria (f. nom./voc.)</td><td>Sancta (f. nom./voc.)</td><td>Both fem. nom. sg.</td></tr><tr><td><i>nomen <b>sanctum</b></i></td><td>nomen (n. nom.)</td><td>sanctum (n. nom.)</td><td>Both neuter nom. sg.</td></tr><tr><td><i>vitam <b>aeternam</b></i></td><td>vitam (f. acc.)</td><td>aeternam (f. acc.)</td><td>Both fem. acc. sg.</td></tr><tr><td><i>Pater <b>noster</b></i></td><td>Pater (m. nom.)</td><td>noster (m. nom.)</td><td>Both masc. nom. sg.</td></tr><tr><td><i>regnum <b>tuum</b></i></td><td>regnum (n. nom./acc.)</td><td>tuum (n. nom./acc.)</td><td>Both neuter nom./acc. sg.</td></tr><tr><td><i>in saecula <b>saeculorum</b></i></td><td>saecula (n. acc. pl.)</td><td>saeculorum (n. gen. pl.)</td><td>Different nouns, diff. cases</td></tr><tr><td><i>gratia <b>plena</b></i></td><td>gratia (f. abl.)</td><td>plena (f. nom.)</td><td>Mary is full — plena agrees with implicit "she"</td></tr></tbody></table>'},
{h:"3rd Declension Adjectives",x:'<p class="grammar-text">Some adjectives use 3rd declension endings. These look the same for masculine and feminine:</p><table class="grammar-table"><thead><tr><th>Case</th><th>M./F.</th><th>N.</th></tr></thead><tbody><tr><td>Nom.</td><td>fidelis</td><td>fidele</td></tr><tr><td>Gen.</td><td>fidelis</td><td>fidelis</td></tr><tr><td>Dat.</td><td>fideli</td><td>fideli</td></tr><tr><td>Acc.</td><td>fidelem</td><td>fidele</td></tr><tr><td>Abl.</td><td>fideli</td><td>fideli</td></tr></tbody></table><div class="grammar-note">Other 3rd declension adjectives: <i>omnis/e</i> (all), <i>dulcis/e</i> (sweet), <i>caelestis/e</i> (heavenly), <i>humilis/e</i> (humble). One-termination: <i>felix</i> (happy), <i>clemens</i> (merciful), <i>omnipotens</i> (almighty).</div>'},
{h:"Exercise: Match the Adjective to the Noun",x:'<div class="grammar-note">Choose the correct form of the adjective:<br><br>1. _____ Deus (aeternus/aeterna/aeternum) → <span style="color:var(--brown-muted)"><i>aeternus</i> Deus (masc. nom.)</span><br>2. vitam _____ (aeternus/aeternam/aeternum) → <span style="color:var(--brown-muted)">vitam <i>aeternam</i> (fem. acc.)</span><br>3. regnum _____ (sanctus/sancta/sanctum) → <span style="color:var(--brown-muted)">regnum <i>sanctum</i> (neuter nom./acc.)</span><br>4. _____ Maria (Sanctus/Sancta/Sanctum) → <span style="color:var(--brown-muted)"><i>Sancta</i> Maria (fem. nom./voc.)</span><br>5. cum spiritu _____ (sanctus/sancto/sanctum) → <span style="color:var(--brown-muted)">cum spiritu <i>sancto</i> (masc. abl.)</span><br>6. in terra _____ (bonus/bona/bonum/bonā) → <span style="color:var(--brown-muted)">in terra <i>bonā</i> (fem. abl.)</span><br>7. Pater _____ (noster/nostra/nostrum) → <span style="color:var(--brown-muted)">Pater <i>noster</i> (masc. nom.)</span><br>8. gratias _____ (magnus/magna/magnam/magnas) → <span style="color:var(--brown-muted)">gratias <i>magnas</i> (fem. acc. pl.)</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>Adjective agreement works exactly like Spanish!</strong> <i>Espíritu <b>Santo</b></i> (m.) and <i><b>Santa</b> María</i> (f.) — same as Latin <i>Spiritus <b>Sanctus</b></i> and <i><b>Sancta</b> Maria</i>. The only difference: Latin has <b>more cases</b> to agree with, not just gender/number. Spanish kept only nominative forms: <i>bueno/buena</i> (from <i>bonus/bona</i>). Latin adds <i>bonum</i> (acc.), <i>boni</i> (gen.), <i>bono</i> (dat./abl.). Think: Spanish agreement + case endings = Latin adjective agreement.</div>'},
]},

{title:"8. Verb Basics — Esse",content:[
{h:"The Most Important Verb",t:"'Esse' (to be) is the most common verb in Latin and the most irregular. You will encounter it constantly: 'est' (is), 'sunt' (are), 'erat' (was), 'sit' (may be). Master this verb before any others."},
{h:"Present Tense",x:'<table class="grammar-table"><thead><tr><th>Person</th><th>Latin</th><th>English</th><th>Liturgical Example</th></tr></thead><tbody><tr><td>1st sg. (I)</td><td><b>sum</b></td><td>I am</td><td><i>non <b>sum</b> dignus</i> — I am not worthy</td></tr><tr><td>2nd sg. (you)</td><td><b>es</b></td><td>you are</td><td><i>qui <b>es</b> in caelis</i> — who art in heaven</td></tr><tr><td>3rd sg. (he/she/it)</td><td><b>est</b></td><td>is</td><td><i>Ite, missa <b>est</b></i> — Go, the Mass is [ended]</td></tr><tr><td>1st pl. (we)</td><td><b>sumus</b></td><td>we are</td><td><i>apti <b>sumus</b></i> — we are prepared</td></tr><tr><td>2nd pl. (you all)</td><td><b>estis</b></td><td>you are</td><td><i>vos <b>estis</b> lux mundi</i> — you are the light of the world</td></tr><tr><td>3rd pl. (they)</td><td><b>sunt</b></td><td>they are</td><td><i>pleni <b>sunt</b> caeli</i> — the heavens are full</td></tr></tbody></table>'},
{h:"Imperfect (Was/Were — Ongoing Past)",x:'<table class="grammar-table"><thead><tr><th>Person</th><th>Latin</th><th>English</th><th>Example</th></tr></thead><tbody><tr><td>1st sg.</td><td><b>eram</b></td><td>I was</td><td></td></tr><tr><td>2nd sg.</td><td><b>eras</b></td><td>you were</td><td></td></tr><tr><td>3rd sg.</td><td><b>erat</b></td><td>he/she/it was</td><td><i>sicut <b>erat</b> in principio</i> — as it <b>was</b> in the beginning</td></tr><tr><td>1st pl.</td><td><b>eramus</b></td><td>we were</td><td></td></tr><tr><td>3rd pl.</td><td><b>erant</b></td><td>they were</td><td><i>et tenebrae super faciem... <b>erant</b></i></td></tr></tbody></table>'},
{h:"Future (Will Be)",x:'<table class="grammar-table"><thead><tr><th>Person</th><th>Latin</th><th>English</th><th>Example</th></tr></thead><tbody><tr><td>1st sg.</td><td><b>ero</b></td><td>I will be</td><td></td></tr><tr><td>2nd sg.</td><td><b>eris</b></td><td>you will be</td><td></td></tr><tr><td>3rd sg.</td><td><b>erit</b></td><td>he/she/it will be</td><td><i>et <b>erit</b> lux</i> — and there will be light</td></tr><tr><td>1st pl.</td><td><b>erimus</b></td><td>we will be</td><td></td></tr><tr><td>3rd pl.</td><td><b>erunt</b></td><td>they will be</td><td><i>beati... filii Dei vocab<b>untur</b></i></td></tr></tbody></table>'},
{h:"Subjunctive of Esse (May Be / Let It Be)",x:'<p class="grammar-text">The subjunctive mood expresses wishes and possibilities. It appears constantly in prayers:</p><table class="grammar-table"><thead><tr><th>Person</th><th>Latin</th><th>English</th><th>Example</th></tr></thead><tbody><tr><td>1st sg.</td><td><b>sim</b></td><td>may I be</td><td></td></tr><tr><td>2nd sg.</td><td><b>sis</b></td><td>may you be</td><td></td></tr><tr><td>3rd sg.</td><td><b>sit</b></td><td>may it be</td><td><i>Pax Domini <b>sit</b> semper vobiscum</i> — may peace be always with you</td></tr><tr><td>1st pl.</td><td><b>simus</b></td><td>may we be</td><td><i>ut apti <b>simus</b></i> — that we may be prepared</td></tr><tr><td>3rd pl.</td><td><b>sint</b></td><td>may they be</td><td></td></tr></tbody></table>'},
{h:"Exercise: Translate These Sentences",x:'<div class="grammar-note">1. <i>Dominus est bonus</i> → <span style="color:var(--brown-muted)">The Lord is good</span><br>2. <i>pleni sunt caeli et terra gloria tua</i> → <span style="color:var(--brown-muted)">The heavens and earth are full of your glory</span><br>3. <i>sicut erat in principio</i> → <span style="color:var(--brown-muted)">as it was in the beginning</span><br>4. <i>non sum dignus</i> → <span style="color:var(--brown-muted)">I am not worthy</span><br>5. <i>qui es in caelis</i> → <span style="color:var(--brown-muted)">who are (you who art) in heaven</span><br>6. <i>Pax Domini sit semper vobiscum</i> → <span style="color:var(--brown-muted)">May the peace of the Lord always be with you</span><br>7. <i>ubi est Deus tuus?</i> → <span style="color:var(--brown-muted)">Where is your God?</span><br>8. <i>beati erant qui crediderunt</i> → <span style="color:var(--brown-muted)">Blessed were those who believed</span></div>'},
{h:"Exercise: Fill in the Correct Form of Esse",x:'<div class="grammar-note">1. Ego non _____ dignus (I am not worthy) → <span style="color:var(--brown-muted)">sum</span><br>2. Tu _____ Christus (You are the Christ) → <span style="color:var(--brown-muted)">es</span><br>3. Hoc _____ corpus meum (This is my body) → <span style="color:var(--brown-muted)">est</span><br>4. Nos _____ populus tuus (We are your people) → <span style="color:var(--brown-muted)">sumus</span><br>5. Pleni _____ caeli (The heavens are full) → <span style="color:var(--brown-muted)">sunt</span><br>6. Sicut _____ in principio (As it was in the beginning) → <span style="color:var(--brown-muted)">erat</span><br>7. Pax Domini _____ semper vobiscum (May peace be...) → <span style="color:var(--brown-muted)">sit (subjunctive — a wish)</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>Esse → Ser!</strong> Latin <i>esse</i> is the direct ancestor of Spanish <i>ser</i>:<br><br>• <i>sum → soy</i> • <i>es → eres</i> • <i>est → es</i> • <i>sumus → somos</i> • <i>sunt → son</i><br>• <i>erat → era</i> (almost identical!)<br>• Subjunctive: <i>sit → sea</i>, <i>simus → seamos</i><br><br><i>Fiat voluntas tua</i> = <i>Hágase tu voluntad</i> — both subjunctive! Your Spanish subjunctive knowledge directly transfers to Latin.</div>'},
]},
{title:"9. Regular Conjugation",content:[
{h:"Four Conjugation Groups",x:'<p class="grammar-text">Latin verbs are divided into four groups based on their infinitive ending. Each group follows a slightly different pattern for forming tenses:</p><table class="grammar-table"><thead><tr><th>Group</th><th>Infinitive</th><th>Stem Vowel</th><th>Examples</th></tr></thead><tbody><tr><td><b>1st</b></td><td>-<b>āre</b></td><td>ā</td><td><i>laudāre</i> (to praise), <i>orāre</i> (to pray), <i>amāre</i> (to love), <i>cantāre</i> (to sing)</td></tr><tr><td><b>2nd</b></td><td>-<b>ēre</b></td><td>ē</td><td><i>vidēre</i> (to see), <i>habēre</i> (to have), <i>docēre</i> (to teach)</td></tr><tr><td><b>3rd</b></td><td>-<b>ere</b></td><td>(short e)</td><td><i>credere</i> (to believe), <i>dicere</i> (to say), <i>mittere</i> (to send)</td></tr><tr><td><b>4th</b></td><td>-<b>īre</b></td><td>ī</td><td><i>audīre</i> (to hear), <i>venīre</i> (to come), <i>servīre</i> (to serve)</td></tr></tbody></table>'},
{h:"Present Tense — All Four Groups",x:'<p class="grammar-text">The personal endings are the same for all groups: <b>-o, -s, -t, -mus, -tis, -nt</b>. What changes is the connecting vowel:</p><table class="grammar-table"><thead><tr><th>Person</th><th>1st: laudāre</th><th>2nd: vidēre</th><th>3rd: credere</th><th>4th: audīre</th></tr></thead><tbody><tr><td>I</td><td>laud<b>o</b></td><td>vide<b>o</b></td><td>cred<b>o</b></td><td>audi<b>o</b></td></tr><tr><td>you</td><td>laud<b>as</b></td><td>vid<b>es</b></td><td>cred<b>is</b></td><td>aud<b>is</b></td></tr><tr><td>he/she</td><td>laud<b>at</b></td><td>vid<b>et</b></td><td>cred<b>it</b></td><td>aud<b>it</b></td></tr><tr><td>we</td><td>laud<b>amus</b></td><td>vid<b>emus</b></td><td>cred<b>imus</b></td><td>aud<b>imus</b></td></tr><tr><td>you all</td><td>laud<b>atis</b></td><td>vid<b>etis</b></td><td>cred<b>itis</b></td><td>aud<b>itis</b></td></tr><tr><td>they</td><td>laud<b>ant</b></td><td>vid<b>ent</b></td><td>cred<b>unt</b></td><td>audi<b>unt</b></td></tr></tbody></table><div class="grammar-note"><b>Key pattern:</b> The 1st person singular always ends in <b>-o</b> (I), and the 3rd person plural always ends in <b>-nt</b> (they). These are the most reliable markers.</div>'},
{h:"Imperatives — Commands",x:'<p class="grammar-text">Commands in Latin are beautifully simple. Most liturgical commands are PLURAL (addressing the congregation):</p><table class="grammar-table"><thead><tr><th>Type</th><th>Form</th><th>Examples</th></tr></thead><tbody><tr><td><b>Singular</b> (to one person)</td><td>= bare stem</td><td><i>Lauda!</i> (Praise!), <i>Audi!</i> (Hear!), <i>Ora!</i> (Pray!), <i>Crede!</i> (Believe!)</td></tr><tr><td><b>Plural</b> (to many)</td><td>= stem + <b>-te</b></td><td><i>Lauda<b>te</b>!</i> (Praise ye!), <i>Veni<b>te</b>!</i> (Come ye!), <i>Benedici<b>te</b>!</i> (Bless ye!)</td></tr></tbody></table><div class="grammar-note">This is why hymns and liturgy use <b>-te</b> endings so often — they are addressing the whole congregation!<br>• <i>Laudate Dominum!</i> — Praise the Lord!<br>• <i>Venite adoremus!</i> — Come, let us adore!<br>• <i>Benedicite!</i> — Bless ye!<br>• <i>Sursum corda!</i> — Lift up [your] hearts! (irregular)</div>'},
{h:"Examples in Liturgy",x:'<div class="grammar-note"><b>1st Conjugation (pray, praise, love):</b><br>• <i>Laudamus te</i> — We praise you (laudamus = 1st pl.)<br>• <i>Adoramus te</i> — We adore you<br>• <i>Ora pro nobis</i> — Pray for us (ora = singular imperative)<br><br><b>2nd Conjugation (see, have, teach):</b><br>• <i>Habemus ad Dominum</i> — We hold [them] toward the Lord<br>• <i>Videmus gloriam tuam</i> — We see your glory<br><br><b>3rd Conjugation (believe, say, send):</b><br>• <i>Credo in unum Deum</i> — I believe in one God<br>• <i>Credimus</i> — We believe<br>• <i>Mittere Spiritum</i> — To send the Spirit<br><br><b>4th Conjugation (hear, come, serve):</b><br>• <i>Venite adoremus</i> — Come, let us adore<br>• <i>Audite verbum Domini</i> — Hear the word of the Lord</div>'},
{h:"Exercise: Conjugate in Present Tense",x:'<div class="grammar-note">Fill in the present tense forms:<br><br><b>orare</b> (to pray, 1st conj.):<br>I pray → <span style="color:var(--brown-muted)">oro</span> | you pray → <span style="color:var(--brown-muted)">oras</span> | he prays → <span style="color:var(--brown-muted)">orat</span> | we pray → <span style="color:var(--brown-muted)">oramus</span> | they pray → <span style="color:var(--brown-muted)">orant</span><br><br><b>credere</b> (to believe, 3rd conj.):<br>I believe → <span style="color:var(--brown-muted)">credo</span> | you believe → <span style="color:var(--brown-muted)">credis</span> | he believes → <span style="color:var(--brown-muted)">credit</span> | we believe → <span style="color:var(--brown-muted)">credimus</span> | they believe → <span style="color:var(--brown-muted)">credunt</span></div>'},
{h:"Exercise: Identify the Verb Forms",x:'<div class="grammar-note">Name the person, number, and meaning:<br><br>1. <i>laudamus</i> → <span style="color:var(--brown-muted)">1st person plural — "we praise"</span><br>2. <i>credit</i> → <span style="color:var(--brown-muted)">3rd person singular — "he/she believes"</span><br>3. <i>venite</i> → <span style="color:var(--brown-muted)">2nd person plural imperative — "come!" (to a group)</span><br>4. <i>audio</i> → <span style="color:var(--brown-muted)">1st person singular — "I hear"</span><br>5. <i>dicunt</i> → <span style="color:var(--brown-muted)">3rd person plural — "they say"</span><br>6. <i>ora</i> → <span style="color:var(--brown-muted)">2nd person singular imperative — "pray!" (to one person)</span><br>7. <i>glorificamus</i> → <span style="color:var(--brown-muted)">1st person plural — "we glorify"</span><br>8. <i>confiteor</i> → <span style="color:var(--brown-muted)">1st person singular (deponent) — "I confess"</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>Latin conjugation groups became Spanish conjugation groups!</strong><br><br>• 1st <i>-āre → -ar</i>: <i>laudāre → loar</i>, <i>orāre → orar</i>, <i>amāre → amar</i>, <i>cantāre → cantar</i><br>• 2nd <i>-ēre → -er</i>: <i>vidēre → ver</i>, <i>habēre → haber</i><br>• 3rd <i>-ere</i> merged into <i>-er/-ir</i>: <i>credere → creer</i>, <i>dicere → decir</i><br>• 4th <i>-īre → -ir</i>: <i>audīre → oír</i>, <i>venīre → venir</i>, <i>servīre → servir</i><br><br>Personal endings encode person/number identically: <i>laudamus = alabamos</i> (we), <i>credunt = creen</i> (they). Latin imperatives: <i>Laudate!</i> = <i>¡Alabad!</i></div>'},
]},

{title:"10. Past & Future",content:[
{h:"Perfect Tense — Completed Action",x:'<p class="grammar-text">The perfect tense describes an action that is completed. It uses a special <b>perfect stem</b> plus these endings: <b>-ī, -istī, -it, -imus, -istis, -ērunt</b>.</p><table class="grammar-table"><thead><tr><th>Person</th><th>laudāre → laudāv-</th><th>vidēre → vīd-</th><th>crēdere → crēdid-</th><th>audīre → audīv-</th></tr></thead><tbody><tr><td>I</td><td>laudāv<b>ī</b></td><td>vīd<b>ī</b></td><td>crēdid<b>ī</b></td><td>audīv<b>ī</b></td></tr><tr><td>you</td><td>laudāv<b>istī</b></td><td>vīd<b>istī</b></td><td>crēdid<b>istī</b></td><td>audīv<b>istī</b></td></tr><tr><td>he/she</td><td>laudāv<b>it</b></td><td>vīd<b>it</b></td><td>crēdid<b>it</b></td><td>audīv<b>it</b></td></tr><tr><td>we</td><td>laudāv<b>imus</b></td><td>vīd<b>imus</b></td><td>crēdid<b>imus</b></td><td>audīv<b>imus</b></td></tr><tr><td>they</td><td>laudāv<b>ērunt</b></td><td>vīd<b>ērunt</b></td><td>crēdid<b>ērunt</b></td><td>audīv<b>ērunt</b></td></tr></tbody></table><div class="grammar-note"><b>Tip:</b> The 3rd person singular <b>-it</b> ending is the most common in prayers and scripture. <i>Dixit</i> (he said), <i>fecit</i> (he did/made), <i>venit</i> (he came).</div>'},
{h:"Imperfect Tense — Ongoing Past",x:'<p class="grammar-text">While the perfect describes a completed action, the imperfect describes ongoing or repeated past action. Form it by adding <b>-ba-</b> to the stem:</p><table class="grammar-table"><thead><tr><th>Person</th><th>laudāre</th><th>vidēre</th><th>credere</th></tr></thead><tbody><tr><td>I</td><td>laudā<b>bam</b></td><td>vidē<b>bam</b></td><td>credē<b>bam</b></td></tr><tr><td>he/she</td><td>laudā<b>bat</b></td><td>vidē<b>bat</b></td><td>credē<b>bat</b></td></tr><tr><td>we</td><td>laudā<b>bamus</b></td><td>vidē<b>bamus</b></td><td>credē<b>bamus</b></td></tr><tr><td>they</td><td>laudā<b>bant</b></td><td>vidē<b>bant</b></td><td>credē<b>bant</b></td></tr></tbody></table>'},
{h:"Examples in Liturgy & Scripture",x:'<div class="grammar-note"><b>Perfect (completed):</b><br>• <i><b>Dixit</b> Dominus</i> — The Lord <b>said</b> (completed act of speaking)<br>• <i><b>Fecit</b> mihi magna</i> — He has <b>done</b> great things for me (Magnificat)<br>• <i><b>Venit</b> in nomine Domini</i> — He <b>came</b> in the name of the Lord<br>• <i><b>Magnificat</b> anima mea Dominum</i> — My soul <b>magnifies</b> the Lord<br>• <i><b>Exsultavit</b> spiritus meus</i> — My spirit <b>rejoiced</b><br><br><b>Imperfect (ongoing past):</b><br>• <i>sicut <b>erat</b> in principio</i> — as it <b>was</b> (ongoing state) in the beginning<br>• <i>In principio <b>erat</b> Verbum</i> — In the beginning <b>was</b> the Word<br>• <i>et Verbum <b>erat</b> apud Deum</i> — and the Word <b>was</b> with God</div>'},
{h:"Exercise: Perfect or Imperfect?",x:'<div class="grammar-note">Decide which tense each verb is and translate:<br><br>1. <i>dixit</i> → <span style="color:var(--brown-muted)">Perfect — "he said" (completed)</span><br>2. <i>erat</i> → <span style="color:var(--brown-muted)">Imperfect — "was" (ongoing state)</span><br>3. <i>laudavit</i> → <span style="color:var(--brown-muted)">Perfect — "he praised" (completed)</span><br>4. <i>credebant</i> → <span style="color:var(--brown-muted)">Imperfect — "they were believing / used to believe"</span><br>5. <i>fecit</i> → <span style="color:var(--brown-muted)">Perfect — "he made / has done"</span><br>6. <i>laudabamus</i> → <span style="color:var(--brown-muted)">Imperfect — "we were praising"</span><br>7. <i>viderunt</i> → <span style="color:var(--brown-muted)">Perfect — "they saw"</span><br>8. <i>exsultavit</i> → <span style="color:var(--brown-muted)">Perfect — "rejoiced" (as in the Magnificat)</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>Pretérito vs. imperfecto — you already make this distinction!</strong><br><br>• Latin <b>perfect</b> = Spanish <b>pretérito indefinido</b>: <i>Dixit = dijo</i>, <i>Fecit = hizo</i>, <i>Venit = vino</i><br>• Latin <b>imperfect</b> = Spanish <b>imperfecto</b>: <i>Erat = era</i>, <i>Laudabat = alababa</i><br><br>The imperfect markers are even related: Latin <b>-ba-</b> → Spanish <b>-ba-</b>: <i>laudabam → alababa</i>. Nearly identical! <i>Sicut erat in principio</i> = <i>como era en el principio</i> — both imperfect.</div>'},
]},

{title:"11. Pronouns",content:[
{h:"Personal Pronouns",x:'<p class="grammar-text">Personal pronouns decline just like nouns. The forms below appear constantly in prayers:</p><table class="grammar-table"><thead><tr><th>Case</th><th>I</th><th>You (sg.)</th><th>We</th><th>You (pl.)</th></tr></thead><tbody><tr><td><b>Nom.</b></td><td>ego</td><td>tu</td><td>nos</td><td>vos</td></tr><tr><td><b>Gen.</b></td><td>mei</td><td>tui</td><td>nostri</td><td>vestri</td></tr><tr><td><b>Dat.</b></td><td>mihi</td><td>tibi</td><td>nobis</td><td>vobis</td></tr><tr><td><b>Acc.</b></td><td>me</td><td>te</td><td>nos</td><td>vos</td></tr><tr><td><b>Abl.</b></td><td>me</td><td>te</td><td>nobis</td><td>vobis</td></tr></tbody></table><div class="grammar-note"><b>Special rule with cum:</b> "With me/you/us" uses a combined form:<br>• cum + me → <b>mecum</b><br>• cum + te → <b>tecum</b> (as in <i>Dominus <b>tecum</b></i>)<br>• cum + nobis → <b>nobiscum</b><br>• cum + vobis → <b>vobiscum</b> (as in <i>Dominus <b>vobiscum</b></i>)</div>'},
{h:"Pronouns in Prayers",x:'<div class="grammar-note"><b>Dative (to/for):</b><br>• <i>miserere <b>nobis</b></i> — have mercy <b>on us</b> (dat.)<br>• <i>dona <b>nobis</b> pacem</i> — grant <b>to us</b> peace<br>• <i>Laus <b>tibi</b>, Christe</i> — praise <b>to you</b>, Christ<br>• <i>Gloria <b>tibi</b>, Domine</i> — glory <b>to you</b>, Lord<br>• <i>fecit <b>mihi</b> magna</i> — he did great things <b>for me</b><br><br><b>Accusative (direct object):</b><br>• <i>laudamus <b>te</b></i> — we praise <b>you</b><br>• <i>benedicimus <b>te</b></i> — we bless <b>you</b><br>• <i>ne <b>nos</b> inducas</i> — lead <b>us</b> not<br><br><b>Ablative (with):</b><br>• <i>Dominus <b>tecum</b></i> — the Lord <b>with you</b><br>• <i>et cum spiritu <b>tuo</b></i> — and with <b>your</b> spirit<br>• <i>ora pro <b>nobis</b></i> — pray for <b>us</b></div>'},
{h:"Possessive Adjectives",x:'<p class="grammar-text">Possessives work like adjectives — they agree with the thing OWNED, not the owner:</p><table class="grammar-table"><thead><tr><th></th><th>Masc.</th><th>Fem.</th><th>Neut.</th><th>Meaning</th></tr></thead><tbody><tr><td><b>my</b></td><td>meus</td><td>mea</td><td>meum</td><td><i>mea culpa</i> — my fault (fem.)</td></tr><tr><td><b>your</b></td><td>tuus</td><td>tua</td><td>tuum</td><td><i>nomen tuum</i> — your name (n.)</td></tr><tr><td><b>our</b></td><td>noster</td><td>nostra</td><td>nostrum</td><td><i>Pater noster</i> — our Father (m.)</td></tr><tr><td><b>your (pl.)</b></td><td>vester</td><td>vestra</td><td>vestrum</td><td><i>sacrificium vestrum</i></td></tr></tbody></table><div class="grammar-note"><b>Important:</b> In <i>"Pater <b>noster</b>"</i>, "noster" is masculine nom. because it agrees with Pater (masc.), NOT because "we" are male. In <i>"mea <b>culpa</b>"</i>, "mea" is feminine because culpa (fault) is feminine, regardless of the speaker\'s gender.</div>'},
{h:"Exercise: Identify the Pronoun",x:'<div class="grammar-note">Name the case and translate:<br><br>1. <i>dona nobis pacem</i> — nobis → <span style="color:var(--brown-muted)">Dative — "to us" (indirect object)</span><br>2. <i>laudamus te</i> — te → <span style="color:var(--brown-muted)">Accusative — "you" (direct object)</span><br>3. <i>Dominus tecum</i> — tecum → <span style="color:var(--brown-muted)">Ablative — "with you" (cum + te)</span><br>4. <i>ora pro nobis</i> — nobis → <span style="color:var(--brown-muted)">Ablative — "for us" (after pro + abl.)</span><br>5. <i>miserere mei</i> — mei → <span style="color:var(--brown-muted)">Genitive — "on me / of me"</span><br>6. <i>fecit mihi magna</i> — mihi → <span style="color:var(--brown-muted)">Dative — "for me"</span><br>7. <i>ne nos inducas</i> — nos → <span style="color:var(--brown-muted)">Accusative — "us" (direct object)</span></div>'},
{h:"Exercise: Choose the Right Possessive",x:'<div class="grammar-note">1. Pater _____ (our) → <span style="color:var(--brown-muted)">noster (masc. nom. to agree with Pater)</span><br>2. _____ culpa (my, fem.) → <span style="color:var(--brown-muted)">mea (fem. nom. to agree with culpa)</span><br>3. nomen _____ (your sg., neut.) → <span style="color:var(--brown-muted)">tuum (neuter nom./acc.)</span><br>4. regnum _____ (your sg., neut.) → <span style="color:var(--brown-muted)">tuum</span><br>5. voluntas _____ (your sg., fem.) → <span style="color:var(--brown-muted)">tua (fem. nom.)</span><br>6. in hora mortis _____ (our, fem. gen.) → <span style="color:var(--brown-muted)">nostrae (fem. gen. sg.)</span><br>7. vita _____ (our, fem. nom.) → <span style="color:var(--brown-muted)">nostra</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>Latin pronouns → Spanish pronouns, directly!</strong><br><br>• <i>ego → yo</i> | <i>tu → tú</i> | <i>nos → nos(otros)</i> | <i>vos → vos(otros)</i><br>• <i>me → me</i> (identical!) | <i>te → te</i> (identical!) | <i>mihi → me/mí</i> | <i>tibi → te/ti</i><br>• <i>mecum → conmigo</i>, <i>tecum → contigo</i>, <i>nobiscum → con nosotros</i><br>• <i>meus/mea → mío/mía</i>, <i>noster/nostra → nuestro/nuestra</i><br><br>Possessives agree with the owned thing: <i>Pater noster</i> = <i>Padre nuestro</i> (masc.). Identical logic.</div>'},
]},

{title:"12. Subjunctive & Special Forms",content:[
{h:"What Is the Subjunctive?",t:"The subjunctive mood expresses wishes, possibilities, commands to third persons, and hypothetical situations — NOT simple facts. It is one of the most common features of prayer Latin, because prayers are full of wishes and hopes. When you see '-mus' endings in prayers, they are often subjunctive ('let us...'), not indicative ('we do...')."},
{h:"Hortatory Subjunctive (Let Us...)",x:'<p class="grammar-text">The 1st person plural subjunctive expresses a collective wish — "let us do something":</p><table class="grammar-table"><thead><tr><th>Latin</th><th>Root Verb</th><th>Translation</th><th>Where You Hear It</th></tr></thead><tbody><tr><td><b>Oremus</b></td><td>orare (to pray)</td><td>Let us pray</td><td>Before every collect prayer</td></tr><tr><td><b>Adoremus</b></td><td>adorare (to adore)</td><td>Let us adore</td><td>Venite adoremus!</td></tr><tr><td><b>Gaudeamus</b></td><td>gaudere (to rejoice)</td><td>Let us rejoice</td><td>Feast day introits</td></tr><tr><td><b>Exsultemus</b></td><td>exsultare (to exult)</td><td>Let us exult</td><td>Easter Vigil</td></tr><tr><td><b>Gratias agamus</b></td><td>agere (to give)</td><td>Let us give thanks</td><td>Before the Preface</td></tr></tbody></table><div class="grammar-note"><b>How to spot it:</b> If you see a 1st pl. verb (<b>-mus</b>) at the beginning of a sentence, and it makes sense as "let us...", it is subjunctive.</div>'},
{h:"Jussive Subjunctive (May It...)",x:'<p class="grammar-text">The 3rd person subjunctive expresses a wish or command about someone/something else — "may it," "let him," "let it be":</p><table class="grammar-table"><thead><tr><th>Latin</th><th>Translation</th><th>Where You Hear It</th></tr></thead><tbody><tr><td><b>sanctificetur</b> nomen tuum</td><td>may your name <b>be hallowed</b></td><td>Pater Noster</td></tr><tr><td><b>adveniat</b> regnum tuum</td><td>may your kingdom <b>come</b></td><td>Pater Noster</td></tr><tr><td><b>fiat</b> voluntas tua</td><td>may your will <b>be done</b></td><td>Pater Noster</td></tr><tr><td><b>requiescant</b> in pace</td><td>may they <b>rest</b> in peace</td><td>Funeral liturgy</td></tr><tr><td>Pax Domini <b>sit</b> semper vobiscum</td><td>may the peace of the Lord always <b>be</b> with you</td><td>Sign of Peace</td></tr><tr><td><b>Benedicat</b> vos omnipotens Deus</td><td>may almighty God <b>bless</b> you</td><td>Final Blessing</td></tr></tbody></table><div class="grammar-note"><b>How to spot it:</b> Look for the Pater Noster pattern — a series of 3rd person wishes about God\'s name, kingdom, and will. The endings <b>-etur, -iat, -iat, -at</b> are subjunctive markers.</div>'},
{h:"Passive Voice Basics",x:'<p class="grammar-text">When the subject receives the action instead of doing it, the verb is passive. Passive endings are:</p><table class="grammar-table"><thead><tr><th>Active</th><th>Passive</th><th>Example</th></tr></thead><tbody><tr><td>-o (I do)</td><td>-or (I am done)</td><td><i>laudor</i> — I am praised</td></tr><tr><td>-s (you do)</td><td>-ris (you are done)</td><td><i>laudaris</i> — you are praised</td></tr><tr><td>-t (he does)</td><td>-<b>tur</b> (it is done)</td><td><i>sanctifica<b>tur</b></i> — it is hallowed</td></tr><tr><td>-mus (we do)</td><td>-mur (we are done)</td><td><i>consolabimur</i> — we will be comforted</td></tr><tr><td>-nt (they do)</td><td>-<b>ntur</b> (they are done)</td><td><i>vocabu<b>ntur</b></i> — they will be called</td></tr></tbody></table><div class="grammar-note"><b>Key tip:</b> When you see <b>-tur</b> at the end of a verb, think "is/may be [verb]-ed." <i>Sanctificetur</i> = may it be sanctified/hallowed.</div>'},
{h:"Participles — Verbal Adjectives",x:'<p class="grammar-text">Participles are verb forms that act like adjectives. Latin has two main types:</p><table class="grammar-table"><thead><tr><th>Type</th><th>Formation</th><th>Examples</th><th>In Liturgy</th></tr></thead><tbody><tr><td><b>Present active</b></td><td>stem + -ns/-ens</td><td><i>veniens</i> (coming), <i>vivens</i> (living), <i>procedens</i> (proceeding)</td><td><i>Procedenti ab utroque</i> — To [the one] proceeding from both</td></tr><tr><td><b>Perfect passive</b></td><td>stem + -tus/-sus</td><td><i>benedictus</i> (blessed), <i>mortuus</i> (dead), <i>missus</i> (sent)</td><td><i><b>Benedictus</b> qui venit</i> — <b>Blessed</b> [is he] who comes</td></tr></tbody></table><div class="grammar-note"><b>Note:</b> <i>Benedictus</i> is a perfect passive participle — literally "having been blessed." It acts as an adjective and declines like <i>bonus/bona/bonum</i>: <i>benedictus</i> (m.), <i>benedicta</i> (f.), <i>benedictum</i> (n.). So: <i>benedictus fructus</i> (m. nom.) but <i>benedicta tu</i> (f. nom.).</div>'},
{h:"Exercise: Subjunctive or Indicative?",x:'<div class="grammar-note">Decide if each verb is subjunctive (wish/command) or indicative (fact), and translate:<br><br>1. <i>Oremus</i> → <span style="color:var(--brown-muted)">Subjunctive — "Let us pray" (hortatory)</span><br>2. <i>Laudamus te</i> → <span style="color:var(--brown-muted)">Indicative — "We praise you" (stating fact)</span><br>3. <i>Adveniat regnum tuum</i> → <span style="color:var(--brown-muted)">Subjunctive — "May your kingdom come" (jussive wish)</span><br>4. <i>Pleni sunt caeli</i> → <span style="color:var(--brown-muted)">Indicative — "The heavens are full" (fact)</span><br>5. <i>Fiat voluntas tua</i> → <span style="color:var(--brown-muted)">Subjunctive — "May your will be done" (jussive)</span><br>6. <i>Benedicat vos</i> → <span style="color:var(--brown-muted)">Subjunctive — "May he bless you" (jussive)</span><br>7. <i>Confiteor Deo</i> → <span style="color:var(--brown-muted)">Indicative — "I confess to God" (statement)</span><br>8. <i>Requiescat in pace</i> → <span style="color:var(--brown-muted)">Subjunctive — "May he/she rest in peace" (jussive)</span></div>'},
{h:"Exercise: Parse the Pater Noster",x:'<div class="grammar-note">Identify the case, mood, or form of each bolded word in the Our Father:<br><br>1. <i><b>Pater</b> noster</i> → <span style="color:var(--brown-muted)">Vocative — addressing God directly (same as nom. for pater)</span><br>2. <i>qui <b>es</b> in caelis</i> → <span style="color:var(--brown-muted)">Indicative present — "you are" (2nd sg. of esse)</span><br>3. <i><b>sanctificetur</b> nomen tuum</i> → <span style="color:var(--brown-muted)">Subjunctive passive — "may [it] be hallowed"</span><br>4. <i><b>adveniat</b> regnum tuum</i> → <span style="color:var(--brown-muted)">Subjunctive active — "may [it] come"</span><br>5. <i><b>panem</b> nostrum</i> → <span style="color:var(--brown-muted)">Accusative — direct object, "bread"</span><br>6. <i><b>da</b> nobis hodie</i> → <span style="color:var(--brown-muted)">Imperative — "give!" (command to God)</span><br>7. <i>dimitte <b>nobis</b></i> → <span style="color:var(--brown-muted)">Dative — "to us" / "for us" (forgive us)</span><br>8. <i>ne nos <b>inducas</b></i> → <span style="color:var(--brown-muted)">Subjunctive — "lest you lead" (negative purpose)</span><br>9. <i><b>libera</b> nos a malo</i> → <span style="color:var(--brown-muted)">Imperative — "deliver!" (command) + ablative "from evil"</span></div>'},
{h:"🇪🇸 Spanish Connection",x:'<div class="spanish-bridge"><strong>The subjunctive is your secret weapon!</strong> Most English speakers struggle with Latin subjunctive. But you use Spanish subjunctive daily — and it works <b>exactly the same</b>:<br><br>• <b>Hortatory</b>: <i>Oremus</i> = <i>Oremos</i> (1st pl. subj.)<br>• <b>Jussive</b>: <i>Sanctificetur nomen tuum</i> = <i>Santificado sea tu nombre</i><br>• <i>Adveniat regnum tuum</i> = <i>Venga tu reino</i><br>• <i>Fiat voluntas tua</i> = <i>Hágase tu voluntad</i><br>• <i>Requiescat in pace</i> = <i>Descanse en paz</i><br>• <i>Benedicat vos</i> = <i>Que os bendiga</i><br><br>Passive: <i>sanctificetur</i> = <i>sea santificado</i>. Your Spanish fluency means you already think in subjunctive.</div>'},
{h:"Final Exercise: Parse the Gloria Patri",x:'<div class="grammar-note">Put it all together — parse every word in the Gloria Patri:<br><br><i><b>Gloria</b></i> → <span style="color:var(--brown-muted)">1st decl. fem., nominative sg. — "Glory"</span><br><i><b>Patri</b></i> → <span style="color:var(--brown-muted)">3rd decl. masc., dative sg. — "to the Father"</span><br><i><b>et Filio</b></i> → <span style="color:var(--brown-muted)">conjunction + 2nd decl. masc., dative sg. — "and to the Son"</span><br><i><b>et Spiritui Sancto</b></i> → <span style="color:var(--brown-muted)">4th decl. masc. dat. + adj. dat. — "and to the Holy Spirit"</span><br><i><b>Sicut</b></i> → <span style="color:var(--brown-muted)">Conjunction — "just as"</span><br><i><b>erat</b></i> → <span style="color:var(--brown-muted)">Imperfect of esse, 3rd sg. — "it was"</span><br><i><b>in principio</b></i> → <span style="color:var(--brown-muted)">Prep. + 2nd decl. neut. abl. — "in the beginning"</span><br><i><b>et nunc</b></i> → <span style="color:var(--brown-muted)">conjunction + adverb — "and now"</span><br><i><b>et semper</b></i> → <span style="color:var(--brown-muted)">conjunction + adverb — "and always"</span><br><i><b>et in saecula saeculorum</b></i> → <span style="color:var(--brown-muted)">prep. + 2nd decl. neut. acc. pl. + gen. pl. — "and unto the ages of ages"</span></div>'},
]}].map(l=>({title:l.title,content:l.content.map(s=>({heading:s.h,text:s.t||null,html:s.x||null})),drills:l.drills||[]}));

const HYMNS=[
{title:"Tantum Ergo",sub:"St. Thomas Aquinas (13th c.)",
la:"Tantum ergo Sacram\u00e9ntum\nVener\u00e9mur c\u00e9rnui:\nEt ant\u00edquum docum\u00e9ntum\nNovo cedat r\u00edtui:\nPraestet fides suppl\u00e9m\u00e9ntum\nS\u00e9nsuum def\u00e9ctui.\n\nGenit\u00f3ri, Genit\u00f3que\nLaus et jubil\u00e1tio,\nSalus, honor, virtus quoque\nSit et benedictio:\nProced\u00e9nti ab utr\u00f3que\nCompar sit laud\u00e1tio. Amen.",
en:"Therefore so great a Sacrament\nLet us venerate with bowed heads:\nAnd let the old covenant\nGive way to the new rite:\nLet faith provide a supplement\nFor the failure of the senses.\n\nTo the Begetter and the Begotten\nBe praise and jubilation,\nSalvation, honor, power also,\nAnd blessing:\nTo the One proceeding from both\nLet there be equal praise. Amen."},
{title:"Veni Creator Spiritus",sub:"Rabanus Maurus (9th c.)",
la:"Veni, Creator Spiritus,\nMentes tu\u00f3rum visita,\nImple sup\u00e9rna gr\u00e1tia,\nQuae tu cre\u00e1sti p\u00e9ctora.\n\nQui diceris Par\u00e1clitus,\nAltissimi donum Dei,\nFons vivus, ignis, c\u00e1ritas,\nEt spirit\u00e1lis \u00fanctio.",
en:"Come, Creator Spirit,\nVisit the minds of your own,\nFill with heavenly grace\nThe hearts which you have created.\n\nYou who are called the Paraclete,\nGift of God most high,\nLiving fountain, fire, love,\nAnd spiritual anointing."},
{title:"Adoro Te Devote",sub:"St. Thomas Aquinas (13th c.)",
la:"Ad\u00f3ro te dev\u00f3te, latens D\u00e9itas,\nQuae sub his fig\u00faris vere l\u00e1titas;\nTibi se cor meum totum s\u00fabjicit,\nQuia te cont\u00e9mplans totum d\u00e9ficit.\n\nVisus, tactus, gustus in te f\u00e1llitur,\nSed aud\u00edtu solo tuto cr\u00e9ditur.\nCredo quidquid dixit Dei F\u00edlius;\nNil hoc verbo verit\u00e1tis v\u00e9rius.",
en:"I devoutly adore you, hidden Deity,\nWho truly lies hidden under these forms;\nMy heart wholly submits itself to you,\nBecause in contemplating you it wholly fails.\n\nSight, touch, taste are all deceived in you,\nBut hearing alone is safely believed.\nI believe whatever the Son of God has said;\nNothing is truer than this word of Truth."},
{title:"O Salutaris Hostia",sub:"St. Thomas Aquinas (13th c.)",
la:"O salut\u00e1ris H\u00f3stia,\nQuae caeli pandis \u00f3stium:\nBella premunt host\u00edlia,\nDa robur, fer auxil\u00edum.\n\nUni trin\u00f3que D\u00f3mino\nSit sempit\u00e9rna gl\u00f3ria,\nQui vitam sine t\u00e9rmino\nNobis donet in p\u00e1tria. Amen.",
en:"O saving Victim,\nWho opens wide the gate of heaven:\nHostile wars press upon us,\nGive us strength, bring us aid.\n\nTo the one and triune Lord\nBe everlasting glory,\nWho may grant us life without end\nIn our homeland. Amen."},
{title:"Te Deum",sub:"Ancient hymn (4th c.)",
la:"Te Deum laud\u00e1mus: te D\u00f3minum confitemur.\nTe aet\u00e9rnum Patrem, omnis terra vener\u00e1tur.\nTibi omnes \u00e1ngeli, tibi caeli et univ\u00e9rsae pot\u00e9states:\nTibi ch\u00e9rubim et s\u00e9raphim incess\u00e1bili voce procl\u00e1mant:\nSanctus, Sanctus, Sanctus, D\u00f3minus Deus S\u00e1baoth.",
en:"We praise you, O God: we acknowledge you to be the Lord.\nAll the earth worships you, the Father everlasting.\nTo you all angels, to you the heavens and all the powers:\nTo you the cherubim and seraphim cry out with unceasing voice:\nHoly, Holy, Holy, Lord God of Hosts."},
,
{title:"Anima Christi",sub:"14th century, attr. to Pope John XXII",
la:"Anima Christi, sanctifica me.\nCorpus Christi, salva me.\nSanguis Christi, inebria me.\nAqua lateris Christi, lava me.\nPassio Christi, conforta me.\nO bone Iesu, exaudi me.\nIntra tua vulnera absconde me.\nNe permittas me separari a te.\nAb hoste maligno defende me.\nIn hora mortis meae voca me.\nEt iube me venire ad te,\nut cum Sanctis tuis laudem te\nin saecula saeculorum. Amen.",
en:"Soul of Christ, sanctify me.\nBody of Christ, save me.\nBlood of Christ, inebriate me.\nWater from the side of Christ, wash me.\nPassion of Christ, strengthen me.\nO good Jesus, hear me.\nWithin your wounds hide me.\nDo not permit me to be separated from you.\nFrom the malicious enemy defend me.\nIn the hour of my death call me.\nAnd bid me come to you,\nthat with your Saints I may praise you\nforever and ever. Amen."},
{title:"Ubi Caritas",sub:"Ancient hymn, sung on Holy Thursday",
la:"Ubi caritas et amor, Deus ibi est.\nCongregavit nos in unum Christi amor.\nExsultemus, et in ipso iucundemur.\nTimeamus, et amemus Deum vivum.\nEt ex corde diligamus nos sincero.\n\nUbi caritas et amor, Deus ibi est.\nSimul ergo cum in unum congregamur:\nNe nos mente dividamur, caveamus.\nCessent iurgia maligna, cessent lites.\nEt in medio nostri sit Christus Deus.\n\nUbi caritas et amor, Deus ibi est.\nSimul quoque cum beatis videamus,\nGlorianter vultum tuum, Christe Deus:\nGaudium quod est immensum, atque probum,\nSaecula per infinita saeculorum. Amen.",
en:"Where charity and love are, God is there.\nChrist's love has gathered us into one.\nLet us rejoice and be glad in him.\nLet us fear and love the living God.\nAnd from a sincere heart let us love one another.\n\nWhere charity and love are, God is there.\nTherefore when we are gathered as one:\nLet us take heed not to be divided in mind.\nLet malicious quarrels cease, let strife end.\nAnd in our midst be Christ our God.\n\nWhere charity and love are, God is there.\nTogether also with the blessed may we see,\nGloriously, your face, O Christ our God:\nA joy that is immense and true,\nForever and ever without end. Amen."},
{title:"Salve Regina",sub:"Marian antiphon (11th c.), attr. to Hermann of Reichenau",
la:"Salve, Regina, Mater misericordiae,\nvita, dulcedo, et spes nostra, salve.\nAd te clamamus exsules filii Hevae.\nAd te suspiramus, gementes et flentes\nin hac lacrimarum valle.\nEia, ergo, advocata nostra,\nillos tuos misericordes oculos ad nos converte;\net Iesum, benedictum fructum ventris tui,\nnobis post hoc exsilium ostende.\nO clemens, O pia, O dulcis Virgo Maria.",
en:"Hail, holy Queen, Mother of mercy,\nour life, our sweetness, and our hope.\nTo thee do we cry, poor banished children of Eve.\nTo thee do we send up our sighs,\nmourning and weeping in this valley of tears.\nTurn then, most gracious advocate,\nthine eyes of mercy toward us;\nand after this our exile show unto us\nthe blessed fruit of thy womb, Jesus.\nO clement, O loving, O sweet Virgin Mary."}
