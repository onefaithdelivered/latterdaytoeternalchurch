const JOHN_CHAPTERS=[
{ch:1,title:"The Word Made Flesh",subtitle:"Logos, Testimony of John the Baptist, First Disciples",verses:[
{v:1,la:"In principio erat Verbum, et Verbum erat apud Deum, et Deus erat Verbum.",en:"In the beginning was the Word, and the Word was with God, and the Word was God.",n:"<b>principio</b> = abl. of principium (beginning); <b>erat</b> = imperfect of esse (was — ongoing state); <b>apud</b> + acc. = with/in the presence of"},
{v:2,la:"Hoc erat in principio apud Deum.",en:"He was in the beginning with God.",n:"<b>Hoc</b> = neut. nom. pronoun (this one / he); same structure as v.1"},
{v:3,la:"Omnia per ipsum facta sunt, et sine ipso factum est nihil quod factum est.",en:"All things were made through him, and without him was made nothing that was made.",n:"<b>omnia</b> = neut. nom. pl. (all things); <b>per</b> + acc. <b>ipsum</b> = through him; <b>facta sunt</b> = perfect passive (were made); <b>sine</b> + abl. = without; <b>nihil</b> = nothing (indeclinable)"},
{v:4,la:"In ipso vita erat, et vita erat lux hominum.",en:"In him was life, and the life was the light of men.",n:"<b>ipso</b> = abl. (in him); <b>vita</b> = nom. (life, subject); <b>lux</b> = 3rd decl. nom. (light); <b>hominum</b> = gen. pl. of homo (of men)"},
{v:5,la:"Et lux in tenebris lucet, et tenebrae eam non comprehenderunt.",en:"And the light shines in the darkness, and the darkness did not overcome it.",n:"<b>tenebris</b> = abl. pl. (in darkness); <b>lucet</b> = 3rd sg. present (shines); <b>eam</b> = acc. fem. pronoun (it — referring to lux); <b>comprehenderunt</b> = 3rd pl. perfect (did not grasp/overcome)"},
{v:6,la:"Fuit homo missus a Deo, cui nomen erat Ioannes.",en:"There was a man sent from God, whose name was John.",n:"<b>fuit</b> = perfect of esse (there was); <b>missus</b> = perf. passive participle (having been sent); <b>a</b> + abl. <b>Deo</b> = from God; <b>cui</b> = dat. relative pronoun (to whom / whose)"},
{v:7,la:"Hic venit in testimonium, ut testimonium perhiberet de lumine, ut omnes crederent per illum.",en:"He came as a witness, to bear witness about the light, so that all might believe through him.",n:"<b>hic</b> = this one (nom.); <b>testimonium</b> = acc. (witness/testimony); <b>ut</b> + subjunctive = purpose clause (so that); <b>perhiberet</b> = imperfect subjunctive (might bear); <b>crederent</b> = imperfect subjunctive (might believe)"},
{v:8,la:"Non erat ille lux, sed ut testimonium perhiberet de lumine.",en:"He was not the light, but came to bear witness about the light.",n:"<b>ille</b> = that one / he (nom.); <b>de</b> + abl. <b>lumine</b> = about/concerning the light (lumen, luminis, 3rd decl.)"},
{v:9,la:"Erat lux vera, quae illuminat omnem hominem venientem in hunc mundum.",en:"The true light, which enlightens every person, was coming into this world.",n:"<b>vera</b> = adj. fem. nom. (true), agreeing with lux; <b>quae</b> = relative pronoun fem. nom.; <b>omnem hominem</b> = every man (acc.); <b>venientem</b> = present participle acc. (coming)"},
{v:10,la:"In mundo erat, et mundus per ipsum factus est, et mundus eum non cognovit.",en:"He was in the world, and the world was made through him, yet the world did not know him.",n:"<b>mundo</b> = abl. (in the world); <b>factus est</b> = perfect passive (was made); <b>eum</b> = acc. pronoun (him); <b>cognovit</b> = perfect (did not recognize)"},
{v:11,la:"In propria venit, et sui eum non receperunt.",en:"He came to his own, and his own people did not receive him.",n:"<b>propria</b> = neut. acc. pl. (his own things/domain); <b>sui</b> = his own people (nom. pl.); <b>receperunt</b> = 3rd pl. perfect (received)"},
{v:12,la:"Quotquot autem receperunt eum, dedit eis potestatem filios Dei fieri, his qui credunt in nomine eius.",en:"But to all who received him, he gave power to become children of God, to those who believe in his name.",n:"<b>quotquot</b> = as many as (indecl.); <b>dedit</b> = perfect of dare (he gave); <b>eis</b> = dat. pl. (to them); <b>potestatem</b> = acc. (power); <b>filios</b> = acc. pl. (sons/children); <b>fieri</b> = passive infinitive of facere (to become)"},
{v:13,la:"Qui non ex sanguinibus, neque ex voluntate carnis, neque ex voluntate viri, sed ex Deo nati sunt.",en:"Who were born not of blood, nor of the will of the flesh, nor of the will of man, but of God.",n:"<b>sanguinibus</b> = abl. pl. (of bloods — Hebrew plural idiom); <b>voluntate</b> = abl. of voluntas (will); <b>carnis</b> = gen. of caro (of flesh); <b>nati sunt</b> = perfect passive (were born)"},
{v:14,la:"Et Verbum caro factum est, et habitavit in nobis; et vidimus gloriam eius, gloriam quasi Unigeniti a Patre, plenum gratiae et veritatis.",en:"And the Word became flesh and dwelt among us, and we saw his glory, glory as of the Only-Begotten from the Father, full of grace and truth.",n:"<b>caro</b> = nom. (flesh, 3rd decl.); <b>factum est</b> = became (perfect passive); <b>habitavit</b> = perfect (dwelt, from habitare); <b>nobis</b> = abl. (among us); <b>vidimus</b> = 1st pl. perfect (we saw); <b>quasi</b> = as if / as of; <b>Unigeniti</b> = gen. (of the Only-Begotten); <b>plenum</b> = acc. neut. (full); <b>gratiae et veritatis</b> = gen. (of grace and truth)"},
{v:15,la:"Ioannes testimonium perhibet de ipso et clamat dicens: Hic erat quem dixi: Qui post me venturus est, ante me factus est, quia prior me erat.",en:"John bore witness about him, and cried out saying: This was he of whom I said, He who comes after me ranks before me, because he was before me.",n:"<b>perhibet</b> = 3rd sg. present (bears witness); <b>clamat</b> = present (cries out); <b>dicens</b> = present participle (saying); <b>venturus est</b> = future active periphrastic (is about to come); <b>prior</b> = comparative adj. (before / prior)"},
{v:16,la:"Et de plenitudine eius nos omnes accepimus, et gratiam pro gratia.",en:"And from his fullness we have all received, grace upon grace.",n:"<b>plenitudine</b> = abl. of plenitudo (fullness, 3rd decl.); <b>accepimus</b> = 1st pl. perfect (we received); <b>pro</b> + abl. = in place of / upon"},
{v:17,la:"Quia lex per Moysen data est, gratia et veritas per Iesum Christum facta est.",en:"For the law was given through Moses; grace and truth came through Jesus Christ.",n:"<b>lex</b> = nom. (law, 3rd decl.); <b>data est</b> = perfect passive fem. (was given); <b>facta est</b> = perfect passive fem. (came to be — agrees with gratia et veritas taken as a unit)"},
{v:18,la:"Deum nemo vidit umquam; unigenitus Filius, qui est in sinu Patris, ipse enarravit.",en:"No one has ever seen God; the only-begotten Son, who is in the bosom of the Father, he has made him known.",n:"<b>nemo</b> = nobody (nom.); <b>vidit</b> = perfect (has seen); <b>umquam</b> = ever; <b>sinu</b> = abl. of sinus (bosom/embrace); <b>ipse</b> = he himself (emphatic); <b>enarravit</b> = perfect (has revealed/explained)"},
{v:19,la:"Et hoc est testimonium Ioannis, quando miserunt Iudaei ab Hierosolymis sacerdotes et Levitas ad eum, ut interrogarent eum: Tu quis es?",en:"And this is the testimony of John, when the Jews sent priests and Levites from Jerusalem to him, to ask him: Who are you?",n:"<b>quando</b> = when; <b>miserunt</b> = 3rd pl. perfect of mittere (they sent); <b>ut interrogarent</b> = purpose clause with imperfect subjunctive (so that they might ask)"},
{v:23,la:"Ait: Ego vox clamantis in deserto: Dirigite viam Domini, sicut dixit Isaias propheta.",en:"He said: I am the voice of one crying in the wilderness: Make straight the way of the Lord, as the prophet Isaiah said.",n:"<b>ait</b> = defective verb (he said); <b>vox</b> = nom. (voice); <b>clamantis</b> = gen. present participle (of one crying); <b>deserto</b> = abl. (in the wilderness); <b>dirigite</b> = 2nd pl. imperative (make straight!)"},
{v:29,la:"Altera die videt Ioannes Iesum venientem ad se et ait: Ecce Agnus Dei, ecce qui tollit peccatum mundi.",en:"The next day he saw Jesus coming toward him, and said: Behold the Lamb of God, behold him who takes away the sin of the world.",n:"<b>altera die</b> = abl. (on the next day); <b>venientem</b> = acc. present participle (coming); <b>ad se</b> = toward himself; <b>ecce</b> = behold!; <b>tollit</b> = 3rd sg. present (takes away); <b>peccatum</b> = acc. sg. (sin)"},
{v:35,la:"Altera die iterum stabat Ioannes et ex discipulis eius duo.",en:"The next day John was standing again with two of his disciples.",n:"<b>iterum</b> = again; <b>stabat</b> = imperfect (was standing); <b>ex</b> + abl. <b>discipulis</b> = from/of his disciples; <b>duo</b> = two"},
{v:38,la:"Conversus autem Iesus et videns eos sequentes, dicit eis: Quid quaeritis? Qui dixerunt ei: Rabbi, ubi habitas?",en:"Jesus turned and saw them following, and said to them: What do you seek? They said to him: Rabbi, where do you stay?",n:"<b>conversus</b> = perf. passive participle (having turned); <b>videns</b> = present participle (seeing); <b>sequentes</b> = acc. present participle (following); <b>quid</b> = what? (acc.); <b>quaeritis</b> = 2nd pl. present (you seek)"},
{v:39,la:"Dicit eis: Venite et videte. Venerunt et viderunt ubi maneret, et apud eum manserunt die illo.",en:"He said to them: Come and see. They came and saw where he was staying, and they stayed with him that day.",n:"<b>venite et videte</b> = plural imperatives (come! and see!); <b>venerunt</b> = 3rd pl. perfect (they came); <b>maneret</b> = imperfect subjunctive (where he was staying — indirect question); <b>manserunt</b> = perfect (they stayed); <b>die illo</b> = abl. (on that day)"},
{v:41,la:"Invenit hic primum fratrem suum Simonem et dicit ei: Invenimus Messiam, quod est interpretatum Christus.",en:"He first found his brother Simon and said to him: We have found the Messiah (which is translated Christ).",n:"<b>invenit</b> = 3rd sg. perfect (he found); <b>primum</b> = adverb (first); <b>fratrem</b> = acc. of frater (brother); <b>invenimus</b> = 1st pl. perfect (we have found); <b>interpretatum</b> = perfect passive participle (translated)"},
{v:45,la:"Invenit Philippus Nathanael et dicit ei: Quem scripsit Moyses in Lege et Prophetae, invenimus: Iesum filium Ioseph a Nazareth.",en:"Philip found Nathanael and said to him: We have found him of whom Moses wrote in the Law, and also the prophets — Jesus, son of Joseph, from Nazareth.",n:"<b>quem</b> = acc. relative pronoun (whom); <b>scripsit</b> = 3rd sg. perfect (wrote); <b>Lege</b> = abl. of lex (in the Law)"},
{v:46,la:"Et dixit ei Nathanael: A Nazareth potest aliquid boni esse? Dicit ei Philippus: Veni et vide.",en:"Nathanael said to him: Can anything good come from Nazareth? Philip said to him: Come and see.",n:"<b>potest</b> = can (3rd sg.); <b>aliquid boni</b> = anything of good (partitive genitive — a common construction); <b>veni et vide</b> = singular imperatives (come! see! — addressed to one person)"},
{v:51,la:"Et dicit ei: Amen, amen dico vobis, videbitis caelum apertum et angelos Dei ascendentes et descendentes super Filium hominis.",en:"And he said to him: Amen, amen, I say to you, you will see heaven opened and the angels of God ascending and descending upon the Son of Man.",n:"<b>dico</b> = 1st sg. present (I say); <b>vobis</b> = dat. (to you all); <b>videbitis</b> = 2nd pl. future (you will see); <b>apertum</b> = perf. passive participle (opened); <b>ascendentes et descendentes</b> = acc. present participles (ascending and descending)"}
]},
{ch:2,title:"The Wedding at Cana & Cleansing the Temple",subtitle:"First sign: water into wine; Jesus drives out merchants",verses:[
{v:1,la:"Et die tertia nuptiae factae sunt in Cana Galilaeae, et erat mater Iesu ibi.",en:"On the third day there was a wedding at Cana in Galilee, and the mother of Jesus was there.",n:"<b>die tertia</b> = abl. (on the third day); <b>nuptiae</b> = nom. pl. (wedding — always plural in Latin); <b>factae sunt</b> = perf. passive (took place); <b>ibi</b> = there"},
{v:3,la:"Et deficiente vino, dicit mater Iesu ad eum: Vinum non habent.",en:"When the wine ran out, the mother of Jesus said to him: They have no wine.",n:"<b>deficiente vino</b> = ablative absolute (the wine failing/running out); <b>vinum</b> = acc. (wine); <b>habent</b> = 3rd pl. present (they have)"},
{v:4,la:"Et dicit ei Iesus: Quid mihi et tibi est, mulier? Nondum venit hora mea.",en:"And Jesus said to her: Woman, what concern is that to you and to me? My hour has not yet come.",n:"<b>quid mihi et tibi</b> = what [is it] to me and to you (dat. of concern); <b>mulier</b> = voc. (woman — respectful in Latin); <b>nondum</b> = not yet; <b>venit</b> = perfect (has come); <b>hora</b> = nom. (hour)"},
{v:5,la:"Dicit mater eius ministris: Quodcumque dixerit vobis, facite.",en:"His mother said to the servants: Do whatever he tells you.",n:"<b>ministris</b> = dat. pl. (to the servants); <b>quodcumque</b> = whatever (neut. acc.); <b>dixerit</b> = future perfect subjunctive (he shall have said); <b>facite</b> = 2nd pl. imperative (do it!)"},
{v:7,la:"Dicit eis Iesus: Implete hydrias aqua. Et impleverunt eas usque ad summum.",en:"Jesus said to them: Fill the jars with water. And they filled them to the brim.",n:"<b>implete</b> = 2nd pl. imperative (fill!); <b>hydrias</b> = acc. pl. (water jars — Greek loanword); <b>aqua</b> = abl. (with water); <b>impleverunt</b> = 3rd pl. perfect (they filled); <b>usque ad summum</b> = all the way to the top"},
{v:9,la:"Ut autem gustavit architriclinus aquam vinum factam, et non sciebat unde esset, ministri autem sciebant qui hauserant aquam, vocat sponsum architriclinus.",en:"When the master of the feast tasted the water now become wine, and did not know where it came from (though the servants who had drawn the water knew), the master of the feast called the bridegroom.",n:"<b>gustavit</b> = perfect (tasted); <b>aquam vinum factam</b> = the water having-become wine (acc. + perf. participle); <b>sciebat</b> = imperfect (he knew — ongoing state); <b>unde esset</b> = where it might be (indirect question + subjunctive); <b>hauserant</b> = pluperfect (had drawn)"},
{v:11,la:"Hoc fecit initium signorum Iesus in Cana Galilaeae, et manifestavit gloriam suam, et crediderunt in eum discipuli eius.",en:"This, the first of his signs, Jesus did at Cana in Galilee, and manifested his glory, and his disciples believed in him.",n:"<b>initium signorum</b> = beginning of signs (gen. pl.); <b>manifestavit</b> = perfect (he revealed/manifested); <b>gloriam suam</b> = his own glory (acc.); <b>crediderunt</b> = 3rd pl. perfect (they believed)"},
{v:14,la:"Et invenit in templo vendentes boves et oves et columbas, et nummularios sedentes.",en:"And he found in the temple those selling oxen and sheep and doves, and the money-changers sitting there.",n:"<b>invenit</b> = perfect (he found); <b>templo</b> = abl. (in the temple); <b>vendentes</b> = acc. present participle (those selling); <b>nummularios</b> = acc. pl. (money-changers); <b>sedentes</b> = acc. present participle (sitting)"},
{v:15,la:"Et cum fecisset quasi flagellum de funiculis, omnes eiecit de templo, oves quoque et boves.",en:"And making a whip of cords, he drove them all out of the temple, and the sheep and oxen.",n:"<b>fecisset</b> = pluperfect subjunctive (had made — temporal clause with cum); <b>flagellum</b> = acc. (whip); <b>funiculis</b> = abl. pl. (from cords); <b>eiecit</b> = perfect (he drove out)"},
{v:16,la:"Et his qui columbas vendebant dixit: Auferte ista hinc; nolite facere domum Patris mei domum negotiationis.",en:"And he told those who sold doves: Take these things away; do not make my Father's house a house of trade.",n:"<b>his qui</b> = to those who (dat.); <b>vendebant</b> = imperfect (were selling); <b>auferte</b> = 2nd pl. imperative (take away!); <b>nolite facere</b> = negative imperative (do not make!); <b>domum</b> = acc. (house); <b>negotiationis</b> = gen. (of trade/business)"},
{v:19,la:"Respondit Iesus et dixit eis: Solvite templum hoc, et in tribus diebus excitabo illud.",en:"Jesus answered them: Destroy this temple, and in three days I will raise it up.",n:"<b>solvite</b> = 2nd pl. imperative (destroy!); <b>templum hoc</b> = this temple (acc.); <b>tribus diebus</b> = abl. (in three days); <b>excitabo</b> = 1st sg. future (I will raise up)"},
{v:21,la:"Ille autem dicebat de templo corporis sui.",en:"But he was speaking about the temple of his body.",n:"<b>dicebat</b> = imperfect (he was speaking — ongoing/explaining); <b>de</b> + abl. <b>templo</b> = about/concerning the temple; <b>corporis</b> = gen. of corpus (of his body); <b>sui</b> = gen. reflexive pronoun (of himself)"},
]},
{ch:3,title:"Nicodemus & Born Again",subtitle:"Conversation with Nicodemus; God so loved the world; John the Baptist's testimony",verses:[
{v:1,la:"Erat autem homo ex Pharisaeis, Nicodemus nomine, princeps Iudaeorum.",en:"Now there was a man of the Pharisees, named Nicodemus, a ruler of the Jews.",n:"<b>ex Pharisaeis</b> = from/of the Pharisees (abl.); <b>nomine</b> = abl. of nomen (by name); <b>princeps</b> = nom. (ruler/leader, 3rd decl.)"},
{v:2,la:"Hic venit ad Iesum nocte et dixit ei: Rabbi, scimus quia a Deo venisti magister; nemo enim potest haec signa facere quae tu facis, nisi fuerit Deus cum eo.",en:"He came to Jesus by night and said to him: Rabbi, we know that you are a teacher come from God, for no one can do these signs that you do, unless God is with him.",n:"<b>nocte</b> = abl. (at/by night); <b>scimus</b> = 1st pl. present (we know); <b>quia</b> = that (introducing indirect statement); <b>venisti</b> = 2nd sg. perfect (you came); <b>nemo</b> = nobody; <b>nisi fuerit</b> = unless [God] be (perfect subjunctive — condition)"},
{v:3,la:"Respondit Iesus et dixit ei: Amen, amen dico tibi, nisi quis natus fuerit denuo, non potest videre regnum Dei.",en:"Jesus answered and said to him: Amen, amen, I say to you, unless one is born again, he cannot see the kingdom of God.",n:"<b>nisi</b> = unless; <b>quis</b> = someone/anyone; <b>natus fuerit</b> = perfect passive subjunctive (shall have been born); <b>denuo</b> = again/from above; <b>potest</b> + infinitive = is able to; <b>regnum Dei</b> = kingdom of God (acc. + gen.)"},
{v:5,la:"Respondit Iesus: Amen, amen dico tibi, nisi quis renatus fuerit ex aqua et Spiritu, non potest introire in regnum Dei.",en:"Jesus answered: Amen, amen, I say to you, unless one is born of water and the Spirit, he cannot enter the kingdom of God.",n:"<b>renatus fuerit</b> = perf. pass. subj. (shall have been reborn); <b>ex aqua et Spiritu</b> = from water and Spirit (abl.); <b>introire</b> = to enter (infinitive); <b>in regnum</b> = into the kingdom (acc. with motion)"},
{v:6,la:"Quod natum est ex carne, caro est; et quod natum est ex Spiritu, spiritus est.",en:"That which is born of the flesh is flesh, and that which is born of the Spirit is spirit.",n:"<b>quod</b> = that which (neut. relative pronoun); <b>natum est</b> = perf. passive (has been born); <b>ex carne</b> = from flesh (abl.); <b>caro</b> = nom. (flesh, 3rd decl.)"},
{v:8,la:"Spiritus ubi vult spirat, et vocem eius audis, sed non scis unde veniat et quo vadat.",en:"The wind blows where it wills, and you hear its sound, but you do not know where it comes from or where it goes.",n:"<b>ubi vult</b> = where it wills; <b>spirat</b> = 3rd sg. present (blows/breathes — wordplay: spiritus = both wind and spirit); <b>vocem</b> = acc. (voice/sound); <b>unde veniat</b> = where it comes from (indirect question + subjunctive); <b>quo vadat</b> = where it goes"},
{v:14,la:"Et sicut Moyses exaltavit serpentem in deserto, ita exaltari oportet Filium hominis,",en:"And as Moses lifted up the serpent in the wilderness, so must the Son of Man be lifted up,",n:"<b>sicut</b> = just as; <b>exaltavit</b> = perfect (lifted up); <b>serpentem</b> = acc. (serpent); <b>deserto</b> = abl. (in the wilderness); <b>ita</b> = so/thus; <b>exaltari</b> = passive infinitive (to be lifted up); <b>oportet</b> = it is necessary (impersonal verb + infinitive)"},
{v:16,la:"Sic enim Deus dilexit mundum, ut Filium suum unigenitum daret: ut omnis qui credit in eum non pereat, sed habeat vitam aeternam.",en:"For God so loved the world that he gave his only-begotten Son, so that everyone who believes in him may not perish but may have eternal life.",n:"<b>sic</b> = so/thus; <b>dilexit</b> = perfect of diligere (loved); <b>ut ... daret</b> = result clause + imperfect subjunctive (that he gave); <b>unigenitum</b> = acc. adj. (only-begotten); <b>qui credit</b> = who believes (relative + present); <b>pereat</b> = present subjunctive (may perish); <b>habeat</b> = present subjunctive (may have)"},
{v:17,la:"Non enim misit Deus Filium suum in mundum ut iudicet mundum, sed ut salvetur mundus per ipsum.",en:"For God did not send his Son into the world to judge the world, but that the world might be saved through him.",n:"<b>misit</b> = perfect of mittere (sent); <b>ut iudicet</b> = purpose clause + subjunctive (in order to judge); <b>ut salvetur</b> = purpose + passive subjunctive (that it might be saved); <b>per ipsum</b> = through him"},
{v:19,la:"Hoc est autem iudicium: quia lux venit in mundum, et dilexerunt homines magis tenebras quam lucem; erant enim eorum mala opera.",en:"And this is the judgment: the light has come into the world, and people loved darkness rather than light, because their works were evil.",n:"<b>iudicium</b> = nom. (judgment); <b>dilexerunt</b> = 3rd pl. perfect (they loved); <b>magis ... quam</b> = more ... than; <b>tenebras</b> = acc. pl. (darkness); <b>lucem</b> = acc. (light); <b>erant</b> = imperfect (were); <b>mala</b> = nom. pl. neut. adj. (evil)"},
{v:27,la:"Respondit Ioannes et dixit: Non potest homo accipere quidquam, nisi fuerit ei datum de caelo.",en:"John answered and said: A man cannot receive anything unless it has been given to him from heaven.",n:"<b>accipere</b> = to receive (infinitive); <b>quidquam</b> = anything; <b>nisi fuerit ... datum</b> = unless it shall have been given (perf. pass. subj.); <b>ei</b> = dat. (to him); <b>de caelo</b> = from heaven"},
{v:30,la:"Illum oportet crescere, me autem minui.",en:"He must increase, but I must decrease.",n:"<b>illum</b> = acc. (him — subject of infinitive); <b>oportet</b> = it is necessary; <b>crescere</b> = to grow/increase; <b>me</b> = acc. (me); <b>minui</b> = to be diminished (passive infinitive)"},
{v:36,la:"Qui credit in Filium, habet vitam aeternam; qui autem incredulus est Filio, non videbit vitam, sed ira Dei manet super eum.",en:"Whoever believes in the Son has eternal life; whoever does not believe the Son shall not see life, but the wrath of God remains on him.",n:"<b>qui credit</b> = whoever believes; <b>habet</b> = has (present); <b>incredulus</b> = nom. adj. (unbelieving); <b>videbit</b> = 3rd sg. future (will see); <b>ira</b> = nom. (wrath, 1st decl.); <b>manet</b> = remains; <b>super</b> + acc. = upon"},
]},
{ch:4,title:"The Samaritan Woman",subtitle:"Jesus at Jacob's well; living water; worship in spirit and truth",verses:[
{v:6,la:"Erat autem ibi fons Iacob. Iesus ergo fatigatus ex itinere sedebat sic super fontem. Hora erat quasi sexta.",en:"Jacob's well was there. So Jesus, wearied from his journey, sat down beside the well. It was about the sixth hour.",n:"<b>fons</b> = nom. (spring/well, 3rd decl.); <b>fatigatus</b> = perf. passive participle (wearied/tired); <b>ex itinere</b> = from the journey (abl.); <b>sedebat</b> = imperfect (was sitting); <b>super fontem</b> = beside/upon the well (acc.); <b>quasi sexta</b> = about the sixth"},
{v:7,la:"Venit mulier de Samaria haurire aquam. Dicit ei Iesus: Da mihi bibere.",en:"A woman from Samaria came to draw water. Jesus said to her: Give me a drink.",n:"<b>mulier</b> = nom. (woman, 3rd decl.); <b>haurire</b> = to draw [water] (infinitive of purpose); <b>da</b> = singular imperative of dare (give!); <b>mihi</b> = dat. (to me); <b>bibere</b> = to drink (infinitive)"},
{v:10,la:"Respondit Iesus et dixit ei: Si scires donum Dei, et quis est qui dicit tibi: Da mihi bibere, tu forsitan petisses ab eo, et dedisset tibi aquam vivam.",en:"Jesus answered and said to her: If you knew the gift of God, and who it is that says to you, Give me a drink, you would have asked him, and he would have given you living water.",n:"<b>si scires</b> = if you knew (imperfect subjunctive — contrary to fact condition); <b>donum</b> = acc. (gift); <b>forsitan</b> = perhaps; <b>petisses</b> = pluperfect subjunctive (you would have asked); <b>dedisset</b> = pluperfect subjunctive (he would have given); <b>aquam vivam</b> = living water (acc.)"},
{v:13,la:"Respondit Iesus et dixit ei: Omnis qui bibit ex aqua hac, sitiet iterum;",en:"Jesus answered and said to her: Everyone who drinks of this water will thirst again;",n:"<b>bibit</b> = 3rd sg. present (drinks); <b>ex aqua hac</b> = from this water (abl.); <b>sitiet</b> = 3rd sg. future (will thirst); <b>iterum</b> = again"},
{v:14,la:"qui autem biberit ex aqua quam ego dabo ei, non sitiet in aeternum; sed aqua quam ego dabo ei, fiet in eo fons aquae salientis in vitam aeternam.",en:"but whoever drinks of the water that I will give him will never thirst; the water that I will give him will become in him a spring of water welling up to eternal life.",n:"<b>biberit</b> = future perfect (shall have drunk); <b>quam</b> = which (acc. fem. relative); <b>dabo</b> = 1st sg. future (I will give); <b>in aeternum</b> = forever (into eternity); <b>fiet</b> = 3rd sg. future of fieri (will become); <b>fons</b> = nom. (spring); <b>salientis</b> = gen. present participle (springing up/welling)"},
{v:23,la:"Sed venit hora, et nunc est, quando veri adoratores adorabunt Patrem in spiritu et veritate; nam et Pater tales quaerit qui adorent eum.",en:"But the hour is coming, and is now here, when the true worshippers will worship the Father in spirit and truth, for the Father seeks such people to worship him.",n:"<b>veri adoratores</b> = true worshippers (nom. pl.); <b>adorabunt</b> = 3rd pl. future (will worship); <b>in spiritu et veritate</b> = in spirit and truth (abl.); <b>tales</b> = such ones (acc.); <b>quaerit</b> = seeks; <b>qui adorent</b> = who may worship (relative + subjunctive — characteristic)"},
{v:24,la:"Spiritus est Deus, et eos qui adorant eum, in spiritu et veritate oportet adorare.",en:"God is spirit, and those who worship him must worship in spirit and truth.",n:"<b>spiritus est Deus</b> = God is spirit (predicate nom.); <b>eos qui adorant</b> = those who worship (acc. + relative); <b>oportet adorare</b> = it is necessary to worship (impersonal + infinitive)"},
{v:25,la:"Dicit ei mulier: Scio quia Messias venit, qui dicitur Christus; cum ergo venerit ille, nobis annuntiabit omnia.",en:"The woman said to him: I know that the Messiah is coming (who is called Christ); when he comes, he will tell us all things.",n:"<b>scio quia</b> = I know that; <b>qui dicitur</b> = who is called (passive); <b>cum venerit</b> = when he shall have come (future perfect subjunctive in temporal clause); <b>annuntiabit</b> = future (will announce/tell); <b>omnia</b> = all things (acc.)"},
{v:26,la:"Dicit ei Iesus: Ego sum, qui loquor tecum.",en:"Jesus said to her: I am he, the one who is speaking to you.",n:"<b>ego sum</b> = I am (emphatic — the great self-revelation); <b>qui loquor</b> = who am speaking (1st sg. deponent verb loqui); <b>tecum</b> = with you (cum + te)"},
{v:34,la:"Dicit eis Iesus: Meus cibus est ut faciam voluntatem eius qui misit me, et perficiam opus eius.",en:"Jesus said to them: My food is to do the will of him who sent me, and to accomplish his work.",n:"<b>cibus</b> = nom. (food); <b>ut faciam</b> = that I may do (purpose/result + subjunctive); <b>voluntatem</b> = acc. (will); <b>eius qui misit</b> = of the one who sent (gen. + relative + perfect); <b>perficiam</b> = present subjunctive (I may complete); <b>opus</b> = acc. (work)"},
{v:42,la:"Et mulieri dicebant: Quia iam non propter tuam loquelam credimus; ipsi enim audivimus, et scimus quia hic est vere Salvator mundi.",en:"And they said to the woman: It is no longer because of your words that we believe, for we have heard for ourselves, and we know that this is truly the Savior of the world.",n:"<b>mulieri</b> = dat. (to the woman); <b>propter</b> + acc. = because of; <b>loquelam</b> = acc. (speech/words); <b>ipsi</b> = we ourselves (emphatic nom.); <b>audivimus</b> = 1st pl. perfect (we heard); <b>vere</b> = truly (adverb); <b>Salvator</b> = nom. (Savior, 3rd decl.)"},
]},
{ch:5,title:"The Healing at Bethesda",subtitle:"Jesus heals on the Sabbath; the authority of the Son; witnesses to Jesus",verses:[
{v:1,la:"Post haec erat dies festus Iudaeorum, et ascendit Iesus Hierosolymam.",en:"After this there was a feast of the Jews, and Jesus went up to Jerusalem.",n:"<b>post haec</b> = after these things (acc.); <b>dies festus</b> = feast day (nom., 5th decl.); <b>ascendit</b> = perfect (went up)"},
{v:2,la:"Est autem Hierosolymis super Probatica piscina, quae cognominatur Hebraice Bethsaida, quinque porticus habens.",en:"Now in Jerusalem by the Sheep Gate there is a pool, which is called in Hebrew Bethesda, having five porticoes.",n:"<b>Hierosolymis</b> = abl. (in Jerusalem); <b>piscina</b> = nom. (pool); <b>cognominatur</b> = passive present (is called); <b>Hebraice</b> = in Hebrew (adverb); <b>habens</b> = present participle (having)"},
{v:5,la:"Erat autem quidam homo ibi triginta et octo annos habens in infirmitate sua.",en:"One man was there who had been ill for thirty-eight years.",n:"<b>quidam</b> = a certain (indefinite pronoun); <b>triginta et octo annos</b> = acc. of duration (for 38 years); <b>habens</b> = having (present participle); <b>infirmitate</b> = abl. (in his illness)"},
{v:6,la:"Hunc cum vidisset Iesus iacentem, et cognovisset quia iam multum tempus haberet, dicit ei: Vis sanus fieri?",en:"When Jesus saw him lying there and knew that he had been there a long time, he said to him: Do you want to be made well?",n:"<b>cum vidisset</b> = when he had seen (pluperfect subjunctive with cum — circumstantial); <b>iacentem</b> = acc. present participle (lying); <b>cognovisset</b> = pluperfect subjunctive (had recognized); <b>multum tempus</b> = acc. (much time / a long time); <b>vis</b> = do you wish? (2nd sg. of velle); <b>sanus fieri</b> = to become well (adj. + passive infinitive)"},
{v:8,la:"Dicit ei Iesus: Surge, tolle grabatum tuum et ambula.",en:"Jesus said to him: Rise, take up your bed, and walk.",n:"<b>surge</b> = singular imperative (rise!); <b>tolle</b> = singular imperative of tollere (take up!); <b>grabatum</b> = acc. (pallet/bed); <b>ambula</b> = singular imperative (walk!) — Three crisp imperatives"},
{v:9,la:"Et statim sanus factus est homo, et sustulit grabatum suum et ambulabat.",en:"And immediately the man was made well, and he took up his bed and walked.",n:"<b>statim</b> = immediately; <b>sanus factus est</b> = was made well (perfect passive); <b>sustulit</b> = perfect of tollere (he took up — irregular perfect stem); <b>ambulabat</b> = imperfect (was walking — ongoing action)"},
{v:14,la:"Postea invenit eum Iesus in templo et dixit ei: Ecce sanus factus es; iam noli peccare, ne deterius tibi aliquid contingat.",en:"Afterward Jesus found him in the temple and said to him: See, you have been made well; sin no more, lest something worse happen to you.",n:"<b>postea</b> = afterward; <b>sanus factus es</b> = you have been made well (2nd sg. perf. passive); <b>noli peccare</b> = do not sin (negative imperative — noli + infinitive); <b>ne</b> = lest; <b>deterius</b> = comparative adj. neut. (something worse); <b>contingat</b> = present subjunctive (may happen)"},
{v:17,la:"Iesus autem respondit eis: Pater meus usque modo operatur, et ego operor.",en:"But Jesus answered them: My Father is working until now, and I am working.",n:"<b>usque modo</b> = until now; <b>operatur</b> = 3rd sg. present deponent (is working); <b>ego operor</b> = I am working (1st sg. deponent — emphatic ego)"},
{v:19,la:"Respondit itaque Iesus et dixit eis: Amen, amen dico vobis: non potest Filius a se facere quidquam, nisi quod viderit Patrem facientem; quaecumque enim ille fecerit, haec et Filius similiter facit.",en:"So Jesus said to them: Amen, amen, I say to you, the Son can do nothing of himself, but only what he sees the Father doing; for whatever the Father does, the Son does likewise.",n:"<b>a se</b> = from himself (abl. reflexive); <b>quidquam</b> = anything; <b>nisi quod viderit</b> = except what he sees (perf. subj.); <b>Patrem facientem</b> = the Father doing (acc. + present participle); <b>quaecumque</b> = whatever; <b>similiter</b> = similarly/likewise"},
{v:21,la:"Sicut enim Pater suscitat mortuos et vivificat, sic et Filius quos vult vivificat.",en:"For just as the Father raises the dead and gives them life, so also the Son gives life to whom he wills.",n:"<b>sicut</b> = just as; <b>suscitat</b> = raises (present); <b>mortuos</b> = acc. pl. (the dead); <b>vivificat</b> = gives life / makes alive; <b>quos vult</b> = whom he wills (acc. relative + present of velle)"},
{v:24,la:"Amen, amen dico vobis, quia qui verbum meum audit et credit ei qui misit me, habet vitam aeternam et in iudicium non venit, sed transiit a morte in vitam.",en:"Amen, amen, I say to you, whoever hears my word and believes him who sent me has eternal life; he does not come into judgment, but has passed from death to life.",n:"<b>qui ... audit et credit</b> = whoever hears and believes; <b>ei qui misit</b> = him who sent (dat. + relative + perfect); <b>habet</b> = has (present — present possession); <b>in iudicium</b> = into judgment (acc.); <b>transiit</b> = perfect (has passed/crossed over); <b>a morte in vitam</b> = from death into life (abl. → acc.)"},
{v:25,la:"Amen, amen dico vobis, quia venit hora, et nunc est, quando mortui audient vocem Filii Dei; et qui audierint, vivent.",en:"Amen, amen, I say to you, an hour is coming, and is now here, when the dead will hear the voice of the Son of God, and those who hear will live.",n:"<b>venit hora</b> = the hour comes/is coming; <b>quando</b> = when; <b>mortui</b> = nom. pl. (the dead); <b>audient</b> = 3rd pl. future (will hear); <b>vocem</b> = acc. (voice); <b>audierint</b> = future perfect (shall have heard); <b>vivent</b> = future (will live)"},
{v:28,la:"Nolite mirari hoc, quia venit hora in qua omnes qui in monumentis sunt audient vocem eius;",en:"Do not marvel at this, for an hour is coming when all who are in the tombs will hear his voice;",n:"<b>nolite mirari</b> = do not marvel (negative imperative + deponent infinitive); <b>in qua</b> = in which (abl. relative); <b>monumentis</b> = abl. pl. (in the tombs); <b>audient</b> = future (will hear)"},
{v:29,la:"et procedent qui bona fecerunt in resurrectionem vitae, qui vero mala egerunt in resurrectionem iudicii.",en:"and those who have done good will come out to the resurrection of life, and those who have done evil to the resurrection of judgment.",n:"<b>procedent</b> = 3rd pl. future (will come forth); <b>bona fecerunt</b> = have done good things (perfect); <b>resurrectionem</b> = acc. (resurrection); <b>vitae</b> = gen. (of life); <b>mala egerunt</b> = have done evil things; <b>iudicii</b> = gen. (of judgment)"},
{v:39,la:"Scrutamini Scripturas, quia vos putatis in ipsis vitam aeternam habere; et illae sunt quae testimonium perhibent de me.",en:"You search the Scriptures because you think that in them you have eternal life; and it is they that bear witness about me.",n:"<b>scrutamini</b> = 2nd pl. present deponent (you search/examine); <b>Scripturas</b> = acc. pl. (the Scriptures); <b>putatis</b> = 2nd pl. present (you think); <b>in ipsis</b> = in them (abl.); <b>illae sunt quae</b> = those are the ones which (fem. nom. pl. — agreeing with Scripturae); <b>testimonium perhibent</b> = bear witness"},
{v:46,la:"Si enim crederetis Moysi, crederetis forsitan et mihi; de me enim ille scripsit.",en:"For if you believed Moses, you would believe me, for he wrote about me.",n:"<b>si crederetis</b> = if you believed (imperfect subjunctive — contrary to fact); <b>crederetis</b> = you would believe (imperfect subjunctive — apodosis); <b>forsitan</b> = perhaps; <b>de me</b> = about me (abl.); <b>scripsit</b> = perfect (he wrote)"},
{v:47,la:"Si autem illius litteris non creditis, quomodo meis verbis credetis?",en:"But if you do not believe his writings, how will you believe my words?",n:"<b>illius litteris</b> = dat. (his writings — credere takes dative in Latin); <b>quomodo</b> = how? (interrogative adverb); <b>meis verbis</b> = dat. (my words — again dat. with credere); <b>credetis</b> = 2nd pl. future (will you believe)"},
]},
{ch:6,title:"The Bread of Life",subtitle:"Feeding the five thousand; walking on water; the Bread of Life discourse",verses:[
{v:1,la:"Post haec abiit Iesus trans mare Galilaeae, quod est Tiberiadis.",en:"After this Jesus went away to the other side of the Sea of Galilee, which is the Sea of Tiberias.",n:"<b>abiit</b> = perfect of abire (went away); <b>trans</b> + acc. <b>mare</b> = across the sea; <b>quod est</b> = which is (neuter relative)"},
{v:2,la:"Et sequebatur eum multitudo magna, quia videbant signa quae faciebat super his qui infirmabantur.",en:"And a large crowd was following him, because they saw the signs that he was doing on those who were sick.",n:"<b>sequebatur</b> = imperfect deponent (was following); <b>multitudo magna</b> = great multitude (nom.); <b>videbant</b> = imperfect (they were seeing); <b>signa quae faciebat</b> = signs which he was doing; <b>infirmabantur</b> = imperfect passive (were being sick)"},
{v:5,la:"Cum sublevasset ergo oculos Iesus et vidisset quia multitudo magna venit ad eum, dicit ad Philippum: Unde ememus panes ut manducent hi?",en:"When Jesus lifted up his eyes and saw that a large crowd was coming to him, he said to Philip: Where shall we buy bread, so that these people may eat?",n:"<b>cum sublevasset</b> = when he had lifted (pluperfect subjunctive with cum); <b>oculos</b> = acc. pl. (eyes); <b>unde</b> = from where; <b>ememus</b> = 1st pl. future (shall we buy); <b>panes</b> = acc. pl. (loaves/bread); <b>ut manducent</b> = purpose clause + subjunctive (so that they may eat)"},
{v:9,la:"Est puer unus hic qui habet quinque panes hordeaceos et duos pisces; sed haec quid sunt inter tantos?",en:"There is a boy here who has five barley loaves and two fish; but what are they for so many?",n:"<b>puer</b> = nom. (boy); <b>hordeaceos</b> = acc. adj. (of barley); <b>pisces</b> = acc. pl. (fish, 3rd decl.); <b>haec</b> = these things (neut. nom. pl.); <b>inter tantos</b> = among so many (acc.)"},
{v:11,la:"Accepit ergo Iesus panes, et cum gratias egisset, distribuit discumbentibus; similiter et ex piscibus quantum volebant.",en:"Jesus then took the loaves, and when he had given thanks, he distributed them to those who were seated; so also the fish, as much as they wanted.",n:"<b>accepit</b> = perfect (took); <b>cum gratias egisset</b> = when he had given thanks (pluperfect subjunctive — cum temporal); <b>distribuit</b> = perfect (distributed); <b>discumbentibus</b> = dat. present participle (to those reclining); <b>quantum volebant</b> = as much as they wanted"},
{v:12,la:"Ut autem impleti sunt, dixit discipulis suis: Colligite quae superaverunt fragmenta, ne pereant.",en:"And when they were filled, he told his disciples: Gather up the leftover fragments, that nothing may be lost.",n:"<b>impleti sunt</b> = perfect passive (they were filled); <b>colligite</b> = 2nd pl. imperative (gather!); <b>quae superaverunt</b> = which were left over (relative + perfect); <b>fragmenta</b> = acc. pl. neut. (fragments); <b>ne pereant</b> = negative purpose + subjunctive (lest they perish)"},
{v:14,la:"Illi ergo homines cum vidissent quod Iesus fecerat signum, dicebant: Quia hic est vere propheta qui venturus est in mundum.",en:"When the people saw the sign that he had done, they said: This is truly the Prophet who is to come into the world.",n:"<b>cum vidissent</b> = when they had seen (pluperfect subjunctive); <b>fecerat</b> = pluperfect (had done); <b>signum</b> = acc. (sign); <b>venturus est</b> = future active periphrastic (is about to come / is to come)"},
{v:16,la:"Ut autem sero factum est, descenderunt discipuli eius ad mare.",en:"When evening came, his disciples went down to the sea.",n:"<b>sero</b> = evening (indeclinable); <b>factum est</b> = it became (perfect); <b>descenderunt</b> = 3rd pl. perfect (went down); <b>ad mare</b> = to the sea (acc.)"},
{v:19,la:"Cum remigassent ergo quasi stadia viginti quinque aut triginta, vident Iesum ambulantem super mare et proximum navi fieri, et timuerunt.",en:"When they had rowed about twenty-five or thirty stadia, they saw Jesus walking on the sea and drawing near to the boat, and they were frightened.",n:"<b>cum remigassent</b> = when they had rowed (pluperfect subjunctive); <b>stadia</b> = acc. pl. (stadia — Greek measure); <b>ambulantem</b> = acc. present participle (walking); <b>super mare</b> = upon the sea; <b>proximum navi fieri</b> = to be coming near to the boat; <b>timuerunt</b> = perfect (they feared)"},
{v:20,la:"Ille autem dicit eis: Ego sum; nolite timere.",en:"But he said to them: It is I; do not be afraid.",n:"<b>ego sum</b> = I am (emphatic — the divine self-identification); <b>nolite timere</b> = do not fear (negative imperative: nolite + infinitive)"},
{v:26,la:"Respondit eis Iesus et dixit: Amen, amen dico vobis, quaeritis me, non quia vidistis signa, sed quia manducastis ex panibus et saturati estis.",en:"Jesus answered them: Amen, amen, I say to you, you are looking for me, not because you saw signs, but because you ate your fill of the loaves.",n:"<b>quaeritis</b> = 2nd pl. present (you seek); <b>vidistis</b> = 2nd pl. perfect (you saw); <b>manducastis</b> = 2nd pl. perfect (you ate); <b>saturati estis</b> = 2nd pl. perfect passive (you were filled/satisfied)"},
{v:27,la:"Operamini non cibum qui perit, sed cibum qui permanet in vitam aeternam, quem Filius hominis dabit vobis; hunc enim Pater signavit Deus.",en:"Do not work for the food that perishes, but for the food that endures to eternal life, which the Son of Man will give to you. For on him God the Father has set his seal.",n:"<b>operamini</b> = 2nd pl. imperative deponent (work!); <b>cibum</b> = acc. (food); <b>qui perit</b> = which perishes; <b>qui permanet</b> = which endures; <b>in vitam aeternam</b> = unto eternal life (acc.); <b>dabit</b> = future (will give); <b>signavit</b> = perfect (has sealed/marked)"},
{v:32,la:"Dixit ergo eis Iesus: Amen, amen dico vobis: non Moyses dedit vobis panem de caelo, sed Pater meus dat vobis panem de caelo verum.",en:"Jesus then said to them: Amen, amen, I say to you, it was not Moses who gave you the bread from heaven, but my Father gives you the true bread from heaven.",n:"<b>dedit</b> = perfect (gave); <b>panem</b> = acc. (bread); <b>de caelo</b> = from heaven (abl.); <b>dat</b> = present (gives — contrasting with dedit); <b>verum</b> = acc. adj. (true)"},
{v:33,la:"Panis enim Dei est qui descendit de caelo et dat vitam mundo.",en:"For the bread of God is he who comes down from heaven and gives life to the world.",n:"<b>panis Dei</b> = bread of God (nom. + gen.); <b>qui descendit</b> = who comes down (relative + present); <b>dat</b> = gives; <b>vitam</b> = acc. (life); <b>mundo</b> = dat. (to the world)"},
{v:35,la:"Dixit autem eis Iesus: Ego sum panis vitae; qui venit ad me, non esuriet, et qui credit in me, non sitiet umquam.",en:"Jesus said to them: I am the bread of life; whoever comes to me shall not hunger, and whoever believes in me shall never thirst.",n:"<b>ego sum panis vitae</b> = I am the bread of life (predicate nom. + gen.); <b>qui venit</b> = whoever comes; <b>esuriet</b> = future (will hunger); <b>sitiet</b> = future (will thirst); <b>umquam</b> = ever"},
{v:37,la:"Omne quod dat mihi Pater, ad me veniet; et eum qui venit ad me, non eiciam foras.",en:"All that the Father gives me will come to me, and whoever comes to me I will never cast out.",n:"<b>omne quod</b> = everything that (neut.); <b>dat</b> = gives (present); <b>veniet</b> = future (will come); <b>eum qui venit</b> = the one who comes (acc. + relative); <b>non eiciam foras</b> = I will not cast out (future + adverb)"},
{v:40,la:"Haec est autem voluntas Patris mei qui misit me, ut omnis qui videt Filium et credit in eum, habeat vitam aeternam; et ego resuscitabo eum in novissimo die.",en:"For this is the will of my Father, that everyone who sees the Son and believes in him should have eternal life, and I will raise him up on the last day.",n:"<b>voluntas</b> = nom. (will); <b>Patris mei</b> = gen. (of my Father); <b>ut ... habeat</b> = purpose + subjunctive (that he may have); <b>resuscitabo</b> = 1st sg. future (I will raise up); <b>novissimo die</b> = abl. (on the last day)"},
{v:44,la:"Nemo potest venire ad me, nisi Pater qui misit me traxerit eum; et ego resuscitabo eum in novissimo die.",en:"No one can come to me unless the Father who sent me draws him, and I will raise him up on the last day.",n:"<b>nemo potest</b> = no one is able; <b>nisi</b> = unless; <b>traxerit</b> = perfect subjunctive of trahere (shall have drawn); <b>resuscitabo</b> = future (I will raise up)"},
{v:48,la:"Ego sum panis vitae.",en:"I am the bread of life.",n:"<b>ego sum</b> = emphatic I AM; <b>panis vitae</b> = bread of life (nom. + gen.) — The great declaration, repeated from v.35"},
{v:51,la:"Ego sum panis vivus qui de caelo descendi. Si quis manducaverit ex hoc pane, vivet in aeternum; et panis quem ego dabo, caro mea est pro mundi vita.",en:"I am the living bread that came down from heaven. If anyone eats of this bread, he will live forever. And the bread that I will give for the life of the world is my flesh.",n:"<b>panis vivus</b> = living bread (nom. + adj.); <b>descendi</b> = 1st sg. perfect (I came down); <b>si quis manducaverit</b> = if anyone shall have eaten (future perfect subjunctive); <b>vivet</b> = future (will live); <b>in aeternum</b> = forever; <b>caro mea</b> = my flesh (nom.)"},
{v:53,la:"Dixit ergo eis Iesus: Amen, amen dico vobis, nisi manducaveritis carnem Filii hominis et biberitis eius sanguinem, non habebitis vitam in vobis.",en:"So Jesus said to them: Amen, amen, I say to you, unless you eat the flesh of the Son of Man and drink his blood, you do not have life in you.",n:"<b>nisi manducaveritis</b> = unless you eat (future perfect subjunctive, 2nd pl.); <b>carnem</b> = acc. of caro (flesh); <b>biberitis</b> = future perfect subjunctive (you shall have drunk); <b>sanguinem</b> = acc. (blood, 3rd decl.); <b>habebitis</b> = 2nd pl. future (you will have)"},
{v:54,la:"Qui manducat meam carnem et bibit meum sanguinem, habet vitam aeternam, et ego resuscitabo eum in novissimo die.",en:"Whoever feeds on my flesh and drinks my blood has eternal life, and I will raise him up on the last day.",n:"<b>qui manducat</b> = whoever eats (present); <b>meam carnem</b> = my flesh (acc.); <b>bibit</b> = drinks; <b>meum sanguinem</b> = my blood (acc.); <b>habet</b> = has (present — present reality)"},
{v:55,la:"Caro enim mea vere est cibus, et sanguis meus vere est potus.",en:"For my flesh is true food, and my blood is true drink.",n:"<b>caro mea</b> = my flesh (nom.); <b>vere</b> = truly (adverb); <b>cibus</b> = nom. (food); <b>sanguis meus</b> = my blood (nom.); <b>potus</b> = nom. (drink)"},
{v:56,la:"Qui manducat meam carnem et bibit meum sanguinem, in me manet et ego in illo.",en:"Whoever feeds on my flesh and drinks my blood abides in me, and I in him.",n:"<b>in me manet</b> = abides/remains in me; <b>in illo</b> = in him/that one — mutual indwelling"},
{v:60,la:"Multi ergo audientes ex discipulis eius dixerunt: Durus est hic sermo; quis potest eum audire?",en:"When many of his disciples heard it, they said: This is a hard saying; who can listen to it?",n:"<b>audientes</b> = present participle nom. pl. (hearing); <b>durus</b> = nom. adj. (hard/difficult); <b>sermo</b> = nom. (saying/word, 3rd decl.); <b>quis potest</b> = who is able"},
{v:67,la:"Dixit ergo Iesus ad Duodecim: Numquid et vos vultis abire?",en:"So Jesus said to the Twelve: Do you want to go away as well?",n:"<b>Duodecim</b> = the Twelve (indeclinable); <b>numquid</b> = introduces a question expecting 'no'; <b>vos</b> = you (emphatic); <b>vultis</b> = 2nd pl. of velle (you wish); <b>abire</b> = to go away (infinitive)"},
{v:68,la:"Respondit ergo ei Simon Petrus: Domine, ad quem ibimus? Verba vitae aeternae habes.",en:"Simon Peter answered him: Lord, to whom shall we go? You have the words of eternal life.",n:"<b>Domine</b> = vocative (O Lord!); <b>ad quem</b> = to whom (acc.); <b>ibimus</b> = 1st pl. future (shall we go); <b>verba vitae aeternae</b> = words of eternal life (acc. + gen. + gen.)"},
{v:69,la:"Et nos credidimus et cognovimus quia tu es Sanctus Dei.",en:"And we have believed and have come to know that you are the Holy One of God.",n:"<b>credidimus et cognovimus</b> = 1st pl. perfect (we have believed and known — completed conviction); <b>tu es</b> = you are; <b>Sanctus Dei</b> = the Holy One of God (nom. + gen.)"},
]},
{ch:18,title:"The Arrest & Trial",subtitle:"Gethsemane, Peter's denial, Jesus before Pilate",verses:[
{v:1,la:"Haec cum dixisset Iesus, egressus est cum discipulis suis trans torrentem Cedron, ubi erat hortus, in quem introivit ipse et discipuli eius.",en:"When Jesus had spoken these words, he went out with his disciples across the brook Kidron, where there was a garden, which he and his disciples entered.",n:"<b>cum dixisset</b> = when he had said (pluperfect subjunctive with cum); <b>egressus est</b> = perfect deponent (he went out); <b>trans torrentem</b> = across the torrent/brook (acc.); <b>hortus</b> = nom. (garden); <b>in quem</b> = into which (acc. — motion); <b>introivit</b> = perfect (entered)"},
{v:4,la:"Iesus itaque sciens omnia quae ventura erant super eum, processit et dixit eis: Quem quaeritis?",en:"Then Jesus, knowing all that would happen to him, came forward and said to them: Whom do you seek?",n:"<b>sciens</b> = present participle (knowing); <b>omnia quae</b> = all things which (acc.); <b>ventura erant</b> = were about to come (future active participle + imperfect of esse — periphrastic); <b>processit</b> = perfect (came forward); <b>quem quaeritis</b> = whom do you seek? (acc. + 2nd pl.)"},
{v:5,la:"Responderunt ei: Iesum Nazarenum. Dicit eis Iesus: Ego sum.",en:"They answered him: Jesus of Nazareth. Jesus said to them: I am he.",n:"<b>Iesum Nazarenum</b> = acc. (Jesus the Nazarene); <b>ego sum</b> = I AM — the divine name; same words as John 6:20, 8:58"},
{v:6,la:"Ut ergo dixit eis: Ego sum, abierunt retrorsum et ceciderunt in terram.",en:"When he said to them, I am he, they drew back and fell to the ground.",n:"<b>ut ... dixit</b> = when he said (ut + indicative = when); <b>abierunt retrorsum</b> = they went backward; <b>ceciderunt</b> = 3rd pl. perfect of cadere (they fell); <b>in terram</b> = to the ground (acc. — motion)"},
{v:10,la:"Simon ergo Petrus, habens gladium, eduxit eum et percussit pontificis servum et abscidit auriculam eius dexteram. Erat autem nomen servo Malchus.",en:"Then Simon Peter, having a sword, drew it and struck the high priest's servant and cut off his right ear. The servant's name was Malchus.",n:"<b>habens gladium</b> = having a sword (present participle + acc.); <b>eduxit</b> = perfect (drew out); <b>percussit</b> = perfect (struck); <b>pontificis servum</b> = servant of the high priest (gen. + acc.); <b>abscidit</b> = perfect (cut off); <b>auriculam dexteram</b> = right ear (acc.)"},
{v:11,la:"Dixit ergo Iesus Petro: Mitte gladium in vaginam. Calicem quem dedit mihi Pater, non bibam illum?",en:"So Jesus said to Peter: Put your sword into its sheath. Shall I not drink the cup that the Father has given me?",n:"<b>mitte</b> = singular imperative (put!); <b>gladium</b> = acc. (sword); <b>vaginam</b> = acc. (sheath); <b>calicem</b> = acc. (cup/chalice); <b>quem dedit</b> = which gave (acc. relative + perfect); <b>non bibam</b> = shall I not drink? (deliberative subjunctive)"},
{v:15,la:"Sequebatur autem Iesum Simon Petrus et alius discipulus.",en:"Simon Peter followed Jesus, and so did another disciple.",n:"<b>sequebatur</b> = imperfect deponent (was following); <b>alius discipulus</b> = another disciple (nom.)"},
{v:17,la:"Dicit ergo Petro ancilla ostiaria: Numquid et tu ex discipulis es hominis istius? Dicit ille: Non sum.",en:"The servant girl at the door said to Peter: You also are not one of this man's disciples, are you? He said: I am not.",n:"<b>ancilla ostiaria</b> = the doorkeeper servant girl (nom.); <b>numquid</b> = question expecting 'no'; <b>ex discipulis</b> = from/of the disciples (abl.); <b>hominis istius</b> = of that man (gen. — slightly contemptuous <i>istius</i>); <b>non sum</b> = I am not — Peter's denial, contrasting with Jesus' <i>ego sum</i>"},
{v:25,la:"Erat autem Simon Petrus stans et calefaciens se. Dixerunt ergo ei: Numquid et tu ex discipulis eius es? Negavit ille et dixit: Non sum.",en:"Now Simon Peter was standing and warming himself. So they said to him: You also are not one of his disciples, are you? He denied it and said: I am not.",n:"<b>stans et calefaciens se</b> = standing and warming himself (present participles); <b>negavit</b> = perfect (he denied); <b>non sum</b> = I am not — second denial"},
{v:27,la:"Iterum ergo negavit Petrus, et statim gallus cantavit.",en:"Peter again denied it, and at once the rooster crowed.",n:"<b>iterum</b> = again; <b>negavit</b> = perfect (denied); <b>statim</b> = immediately; <b>gallus</b> = nom. (rooster); <b>cantavit</b> = perfect (crowed)"},
{v:28,la:"Adducunt ergo Iesum a Caipha in praetorium. Erat autem mane. Et ipsi non introierunt in praetorium, ut non contaminarentur, sed ut manducarent Pascha.",en:"Then they led Jesus from Caiaphas to the governor's headquarters. It was early morning. They themselves did not enter the headquarters, so that they would not be defiled, but could eat the Passover.",n:"<b>adducunt</b> = historical present (they lead); <b>praetorium</b> = acc. (praetorium/headquarters); <b>mane</b> = morning (indeclinable); <b>ut non contaminarentur</b> = lest they be defiled (negative purpose + imperfect passive subjunctive); <b>Pascha</b> = acc. (Passover — indeclinable Hebrew)"},
{v:33,la:"Introivit ergo iterum in praetorium Pilatus et vocavit Iesum et dixit ei: Tu es Rex Iudaeorum?",en:"So Pilate entered his headquarters again and called Jesus and said to him: Are you the King of the Jews?",n:"<b>introivit</b> = perfect (entered); <b>vocavit</b> = perfect (called); <b>tu es</b> = you are (question); <b>Rex Iudaeorum</b> = King of the Jews (nom. + gen.)"},
{v:36,la:"Respondit Iesus: Regnum meum non est de hoc mundo. Si ex hoc mundo esset regnum meum, ministri mei utique decertarent ut non traderer Iudaeis; nunc autem regnum meum non est hinc.",en:"Jesus answered: My kingdom is not of this world. If my kingdom were of this world, my servants would fight, so that I would not be delivered over to the Jews. But my kingdom is not from the world.",n:"<b>regnum meum</b> = my kingdom (nom.); <b>de hoc mundo</b> = of/from this world (abl.); <b>si esset</b> = if it were (imperfect subjunctive — contrary to fact); <b>decertarent</b> = imperfect subjunctive (would fight); <b>ut non traderer</b> = so that I would not be handed over (imperfect passive subjunctive); <b>hinc</b> = from here"},
{v:37,la:"Dixit itaque ei Pilatus: Ergo Rex es tu? Respondit Iesus: Tu dicis quia Rex sum ego. Ego in hoc natus sum et ad hoc veni in mundum, ut testimonium perhibeam veritati. Omnis qui est ex veritate audit vocem meam.",en:"Then Pilate said to him: So you are a king? Jesus answered: You say that I am a king. For this purpose I was born and for this purpose I have come into the world — to bear witness to the truth. Everyone who is of the truth listens to my voice.",n:"<b>tu dicis</b> = you say (emphatic tu); <b>quia Rex sum ego</b> = that I am a king; <b>in hoc natus sum</b> = for this I was born (perfect passive); <b>ad hoc veni</b> = for this I came (perfect); <b>ut testimonium perhibeam</b> = that I may bear witness (purpose + subjunctive); <b>veritati</b> = dat. (to the truth)"},
{v:38,la:"Dicit ei Pilatus: Quid est veritas? Et cum hoc dixisset, iterum exivit ad Iudaeos et dicit eis: Ego nullam invenio in eo causam.",en:"Pilate said to him: What is truth? After he had said this, he went back outside to the Jews and told them: I find no guilt in him.",n:"<b>quid est veritas</b> = what is truth? (the famous question); <b>cum hoc dixisset</b> = when he had said this (pluperfect subjunctive); <b>exivit</b> = perfect (went out); <b>nullam causam</b> = no cause/guilt (acc.)"},
{v:40,la:"Clamaverunt ergo rursum omnes dicentes: Non hunc, sed Barabbam! Erat autem Barabbas latro.",en:"They cried out again: Not this man, but Barabbas! Now Barabbas was a robber.",n:"<b>clamaverunt</b> = 3rd pl. perfect (they cried out); <b>rursum</b> = again; <b>dicentes</b> = present participle (saying); <b>hunc</b> = this one (acc.); <b>latro</b> = nom. (robber/bandit, 3rd decl.)"},
]},
{ch:19,title:"Crucifixion & Burial",subtitle:"Ecce Homo; Golgotha; death of Jesus; burial in the garden",verses:[
{v:1,la:"Tunc ergo apprehendit Pilatus Iesum et flagellavit.",en:"Then Pilate took Jesus and flogged him.",n:"<b>apprehendit</b> = perfect (seized/took); <b>flagellavit</b> = perfect (flogged — 1st conjugation)"},
{v:2,la:"Et milites plectentes coronam de spinis imposuerunt capiti eius, et veste purpurea circumdederunt eum.",en:"And the soldiers twisted together a crown of thorns and put it on his head and arrayed him in a purple robe.",n:"<b>milites</b> = nom. pl. (soldiers); <b>plectentes</b> = present participle (weaving/twisting); <b>coronam</b> = acc. (crown); <b>de spinis</b> = from thorns (abl.); <b>imposuerunt</b> = perfect (placed upon); <b>capiti</b> = dat. (on his head, 3rd decl.); <b>veste purpurea</b> = abl. (with a purple garment); <b>circumdederunt</b> = perfect (clothed/surrounded)"},
{v:3,la:"Et veniebant ad eum et dicebant: Ave, Rex Iudaeorum! Et dabant ei alapas.",en:"They came up to him, saying: Hail, King of the Jews! and struck him with their hands.",n:"<b>veniebant</b> = imperfect (they kept coming — repeated action); <b>Ave</b> = Hail! (imperative); <b>Rex Iudaeorum</b> = King of the Jews (voc.); <b>dabant</b> = imperfect (they kept giving); <b>alapas</b> = acc. pl. (slaps/blows)"},
{v:4,la:"Exivit iterum Pilatus foras et dicit eis: Ecce adduco vobis eum foras, ut cognoscatis quia nullam invenio in eo causam.",en:"Pilate went out again and said to them: See, I am bringing him out to you that you may know that I find no guilt in him.",n:"<b>exivit foras</b> = went outside; <b>ecce</b> = behold; <b>adduco</b> = I bring (present); <b>ut cognoscatis</b> = purpose + subjunctive (that you may know); <b>nullam causam</b> = no fault/guilt"},
{v:5,la:"Exivit ergo Iesus portans coronam spineam et purpureum vestimentum. Et dicit eis: Ecce homo.",en:"So Jesus came out, wearing the crown of thorns and the purple robe. Pilate said to them: Behold the man!",n:"<b>portans</b> = present participle (bearing/wearing); <b>coronam spineam</b> = the thorny crown (acc.); <b>vestimentum</b> = acc. (garment); <b>ecce homo</b> = behold the man — one of the most famous Latin phrases in history"},
{v:6,la:"Cum ergo vidissent eum pontifices et ministri, clamabant dicentes: Crucifige, crucifige eum! Dicit eis Pilatus: Accipite eum vos et crucifigite; ego enim non invenio in eo causam.",en:"When the chief priests and the officers saw him, they cried out: Crucify him, crucify him! Pilate said to them: Take him yourselves and crucify him, for I find no guilt in him.",n:"<b>cum vidissent</b> = when they had seen (pluperfect subjunctive); <b>pontifices et ministri</b> = chief priests and officers (nom.); <b>clamabant</b> = imperfect (they kept crying out); <b>crucifige</b> = singular imperative (crucify!); <b>accipite</b> = 2nd pl. imperative (take!); <b>vos</b> = you yourselves (emphatic)"},
{v:10,la:"Dicit ergo ei Pilatus: Mihi non loqueris? Nescis quia potestatem habeo crucifigere te et potestatem habeo dimittere te?",en:"So Pilate said to him: You will not speak to me? Do you not know that I have authority to release you and authority to crucify you?",n:"<b>mihi non loqueris</b> = you do not speak to me? (dat. + deponent); <b>nescis</b> = do you not know?; <b>potestatem</b> = acc. (power/authority); <b>crucifigere te</b> = to crucify you (infinitive + acc.); <b>dimittere te</b> = to release you"},
{v:11,la:"Respondit Iesus: Non haberes potestatem adversum me ullam, nisi tibi datum esset desuper; propterea qui me tradidit tibi, maius peccatum habet.",en:"Jesus answered: You would have no authority over me at all unless it had been given you from above. Therefore he who delivered me over to you has the greater sin.",n:"<b>non haberes</b> = you would not have (imperfect subjunctive — contrary to fact); <b>adversum me</b> = against me (acc.); <b>ullam</b> = any (acc.); <b>nisi ... datum esset</b> = unless it had been given (pluperfect passive subjunctive); <b>desuper</b> = from above; <b>tradidit</b> = perfect (handed over); <b>maius peccatum</b> = the greater sin (comparative + acc.)"},
{v:16,la:"Tunc ergo tradidit eis illum ut crucifigeretur. Susceperunt autem Iesum et eduxerunt.",en:"So he delivered him over to them to be crucified. So they took Jesus and led him away.",n:"<b>tradidit</b> = perfect (handed over); <b>ut crucifigeretur</b> = purpose + passive subjunctive (so that he might be crucified); <b>susceperunt</b> = perfect (they received/took); <b>eduxerunt</b> = perfect (led out)"},
{v:17,la:"Et baiulans sibi crucem exivit in eum qui dicitur Calvariae locum, Hebraice autem Golgotha,",en:"And carrying his own cross, he went out to what is called the Place of the Skull, which in Hebrew is called Golgotha.",n:"<b>baiulans</b> = present participle (carrying); <b>sibi</b> = dat. reflexive (for himself); <b>crucem</b> = acc. (cross); <b>qui dicitur</b> = which is called (passive); <b>Calvariae locum</b> = the place of the skull (gen. + acc.)"},
{v:18,la:"ubi crucifixerunt eum, et cum eo alios duos hinc et hinc, medium autem Iesum.",en:"There they crucified him, and with him two others, one on either side, and Jesus between them.",n:"<b>crucifixerunt</b> = 3rd pl. perfect (they crucified); <b>cum eo</b> = with him (abl.); <b>alios duos</b> = two others (acc.); <b>hinc et hinc</b> = on this side and that; <b>medium</b> = acc. adj. (in the middle)"},
{v:19,la:"Scripsit autem et titulum Pilatus et posuit super crucem. Erat autem scriptum: Iesus Nazarenus Rex Iudaeorum.",en:"Pilate also wrote an inscription and put it on the cross. It read: Jesus of Nazareth, the King of the Jews.",n:"<b>scripsit</b> = perfect (wrote); <b>titulum</b> = acc. (inscription/title); <b>posuit</b> = perfect (placed); <b>super crucem</b> = upon the cross (acc.); <b>scriptum</b> = perfect passive participle (written) — This is the famous INRI: <i>Iesus Nazarenus Rex Iudaeorum</i>"},
{v:25,la:"Stabant autem iuxta crucem Iesu mater eius et soror matris eius, Maria Cleophae, et Maria Magdalene.",en:"Standing by the cross of Jesus were his mother and his mother's sister, Mary the wife of Clopas, and Mary Magdalene.",n:"<b>stabant</b> = imperfect (were standing); <b>iuxta crucem</b> = beside the cross (prep. + acc.); <b>mater eius</b> = his mother (nom.); <b>soror matris</b> = sister of the mother (nom. + gen.)"},
{v:26,la:"Cum vidisset ergo Iesus matrem et discipulum stantem quem diligebat, dicit matri suae: Mulier, ecce filius tuus.",en:"When Jesus saw his mother and the disciple whom he loved standing nearby, he said to his mother: Woman, behold your son!",n:"<b>cum vidisset</b> = when he had seen (pluperfect subjunctive); <b>matrem</b> = acc. (mother); <b>discipulum stantem</b> = the disciple standing (acc. + participle); <b>quem diligebat</b> = whom he loved (imperfect — ongoing love); <b>matri</b> = dat. (to his mother); <b>mulier</b> = vocative (woman); <b>filius tuus</b> = nom. (your son)"},
{v:27,la:"Deinde dicit discipulo: Ecce mater tua. Et ex illa hora accepit eam discipulus in sua.",en:"Then he said to the disciple: Behold your mother! And from that hour the disciple took her into his own home.",n:"<b>deinde</b> = then/next; <b>discipulo</b> = dat. (to the disciple); <b>ex illa hora</b> = from that hour (abl.); <b>accepit</b> = perfect (received/took); <b>in sua</b> = into his own [things/home] (acc.)"},
{v:28,la:"Postea sciens Iesus quia omnia consummata sunt, ut consummaretur Scriptura, dicit: Sitio.",en:"After this, Jesus, knowing that all was now finished, said (to fulfill the Scripture): I thirst.",n:"<b>sciens</b> = present participle (knowing); <b>consummata sunt</b> = perfect passive (all things have been completed); <b>ut consummaretur</b> = purpose + passive subjunctive (that it might be fulfilled); <b>Scriptura</b> = nom. (Scripture); <b>sitio</b> = 1st sg. present (I thirst)"},
{v:30,la:"Cum ergo accepisset acetum, Iesus dixit: Consummatum est. Et inclinato capite tradidit spiritum.",en:"When Jesus had received the sour wine, he said: It is finished. And he bowed his head and gave up his spirit.",n:"<b>accepisset</b> = pluperfect subjunctive (had received); <b>acetum</b> = acc. (vinegar/sour wine); <b>consummatum est</b> = it is finished/completed (perfect passive — one of the most important phrases in Scripture); <b>inclinato capite</b> = ablative absolute (his head having been bowed); <b>tradidit spiritum</b> = handed over the spirit (perfect + acc.)"},
{v:34,la:"Sed unus militum lancea latus eius aperuit, et continuo exivit sanguis et aqua.",en:"But one of the soldiers pierced his side with a spear, and at once there came out blood and water.",n:"<b>unus militum</b> = one of the soldiers (partitive gen.); <b>lancea</b> = abl. (with a spear/lance); <b>latus</b> = acc. (side, 3rd decl. neut.); <b>aperuit</b> = perfect (opened/pierced); <b>continuo</b> = immediately; <b>exivit</b> = perfect (came out); <b>sanguis et aqua</b> = blood and water (nom.)"},
{v:38,la:"Post haec autem rogavit Pilatum Ioseph ab Arimathaea, eo quod esset discipulus Iesu, occultus autem propter metum Iudaeorum, ut tolleret corpus Iesu. Et permisit Pilatus. Venit ergo et tulit corpus eius.",en:"After these things Joseph of Arimathea, who was a disciple of Jesus, but secretly for fear of the Jews, asked Pilate that he might take away the body of Jesus, and Pilate gave him permission. So he came and took away his body.",n:"<b>rogavit</b> = perfect (asked); <b>eo quod esset</b> = because he was (causal + imperfect subjunctive); <b>occultus</b> = nom. adj. (hidden/secret); <b>propter metum</b> = on account of fear (acc.); <b>ut tolleret</b> = purpose + subjunctive (that he might take away); <b>corpus</b> = acc. (body, 3rd decl. neut.); <b>permisit</b> = perfect (permitted); <b>tulit</b> = perfect of ferre (carried away)"},
{v:41,la:"Erat autem in loco ubi crucifixus est hortus, et in horto monumentum novum, in quo nondum quisquam positus erat.",en:"Now in the place where he was crucified there was a garden, and in the garden a new tomb in which no one had yet been laid.",n:"<b>loco</b> = abl. (in the place); <b>ubi crucifixus est</b> = where he was crucified (perfect passive); <b>hortus</b> = nom. (garden); <b>monumentum novum</b> = a new tomb (nom.); <b>in quo</b> = in which (abl.); <b>nondum</b> = not yet; <b>quisquam</b> = anyone; <b>positus erat</b> = pluperfect passive (had been placed)"},
{v:42,la:"Ibi ergo propter Parasceven Iudaeorum, quia iuxta erat monumentum, posuerunt Iesum.",en:"So because of the Jewish day of Preparation, since the tomb was close at hand, they laid Jesus there.",n:"<b>Parasceven</b> = acc. (Preparation — Greek loanword); <b>iuxta</b> = nearby; <b>posuerunt</b> = 3rd pl. perfect (they placed/laid)"},
]}


];

const DICT=buildDict();
function lookupWord(word){
  const clean=word.toLowerCase().replace(/[.,;:!?\u201C\u201D\u2018\u2019""''()]/g,"").trim();
  if(DICT[clean])return DICT[clean];
  // Try without trailing case endings
  const stems=[clean.replace(/que$/,""),clean.replace(/(m|s|rum|rum|is|us|um|i|ae|am|o|a|em|e|es|ibus|bus)$/,"")];
  for(const s of stems){if(s.length>2&&DICT[s])return{...DICT[s],note:"Root: "+DICT[s].la+". "+DICT[s].note};}
  return null;
}

function showWordPopup(word,info){
  $("word-popup-container").innerHTML=`<div class="word-popup-overlay" id="wp-overlay"></div><div class="word-popup"><h3>${word}</h3><div class="wp-form">${info.form}</div><div class="wp-meaning">${info.meaning}</div><div class="wp-detail"><b>Root:</b> ${info.root}</div><button class="wp-close" id="wp-close">Close</button></div>`;
  $("wp-overlay").addEventListener("click",()=>$("word-popup-container").innerHTML="");
  $("wp-close").addEventListener("click",()=>$("word-popup-container").innerHTML="");
}
function annotatePrayer(prayer){
  if(!prayer.words)return prayer.latin;
  const words=prayer.latin.split(/(\s+|[,;.!?])/);
  return words.map(w=>{const clean=w.replace(/[,;.!?]/g,"").trim();if(prayer.words[clean]){return`<span class="pw" data-word="${clean}">${w}</span>`;}return w;}).join("");
}

// Quiz
function getQuizPool(){return S.quizCategory==="All"?VOCABULARY:VOCABULARY.filter(v=>v.category===S.quizCategory);}
function generateQuestion(){
  const pool=getQuizPool();if(pool.length<4){S.quizCurrent=null;return;}
  // Spaced repetition: weight towards lower-level words
  const weighted=[];pool.forEach(w=>{const lv=srLevel(w.latin);const weight=Math.max(1,5-lv);for(let i=0;i<weight;i++)weighted.push(w);});
  const pick=weighted[Math.floor(Math.random()*weighted.length)];
  S.quizCurrent=pick;
  const wrong=pool.filter(w=>w.latin!==pick.latin).sort(()=>Math.random()-0.5).slice(0,3);
  S.quizOptions=[S.quizCurrent,...wrong].sort(()=>Math.random()-0.5);S.quizSelected=null;
}
function renderQuiz(){
  if(!S.quizCurrent)generateQuestion();
  const cats=["All",...new Set(VOCABULARY.map(v=>v.category))];
  const cur=S.quizCurrent,acc=S.score.total>0?Math.round((S.score.correct/S.score.total)*100):0;
  const isL=S.quizMode==="latin-to-english";
  let fb="";
  if(S.quizSelected!==null){const s=S.quizSelected,ok=isL?s.english===cur.english:s.latin===cur.latin;
    fb=`<div class="quiz-feedback">${ok?`<div class="correct-msg"><b>R\u0113ct\u0113!</b> Correct!</div>`:`<div class="wrong-msg"><b>Err\u0101vist\u012b</b> \u2014 Answer: <i>${isL?cur.english:cur.latin}</i></div>`}<button class="next-btn" id="next-q">Next \u2192</button></div>`;}
  $("practice-content").innerHTML=`
<div class="toggle-row"><button class="toggle-btn ${isL?'active':''}" data-mode="latin-to-english">Latin \u2192 English</button><button class="toggle-btn ${!isL?'active':''}" data-mode="english-to-latin">English \u2192 Latin</button></div>
<div class="quiz-filter-label">Category:</div>
<div class="filter-row">${cats.map(c=>`<button class="filter-btn ${S.quizCategory===c?'active':''}" data-cat="${c}">${c}</button>`).join("")}</div>
<div class="quiz-score-bar"><span>Score: ${S.score.correct}/${S.score.total}</span><span>Accuracy: ${acc}%</span><span>Streak: ${S.streak} \ud83d\udd25</span></div>
${cur?`<div class="quiz-card"><div class="quiz-prompt-label">${isL?"What does this mean?":"Which Latin word means:"}</div><div class="quiz-word">${isL?cur.latin:cur.english}</div>${isL?`<div class="quiz-pronunciation">[${cur.pronunciation}]</div>`:'<div style="margin-bottom:20px"></div>'}<div class="quiz-options">${S.quizOptions.map((o,i)=>{let cls="";if(S.quizSelected!==null){const ok=isL?o.english===cur.english:o.latin===cur.latin;const sel=isL?o.english===S.quizSelected.english:o.latin===S.quizSelected.latin;if(ok)cls="correct";else if(sel)cls="wrong";cls+=" disabled";}return`<button class="quiz-option ${cls}" data-idx="${i}">${isL?o.english:o.latin}</button>`;}).join("")}</div>${fb}</div>`:`<div class="quiz-card"><p>Not enough words. Choose another category.</p></div>`}`;
  document.querySelectorAll("#practice-content > .toggle-row .toggle-btn").forEach(b=>b.addEventListener("click",()=>{S.quizMode=b.dataset.mode;generateQuestion();renderQuiz();}));
  document.querySelectorAll("#practice-content .filter-btn").forEach(b=>b.addEventListener("click",()=>{S.quizCategory=b.dataset.cat;generateQuestion();renderQuiz();}));
  if(S.quizSelected===null&&cur)document.querySelectorAll(".quiz-option").forEach(b=>b.addEventListener("click",()=>{
    const o=S.quizOptions[parseInt(b.dataset.idx)];S.quizSelected=o;
    const ok=isL?o.english===cur.english:o.latin===cur.latin;
    S.score.total++;recordStudyDay();
    if(ok){S.score.correct++;S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;srUp(cur.latin);playCorrect();haptic('success');}
    else{S.streak=0;srDown(cur.latin);playWrong();haptic('error');}
    saveState();renderQuiz();
  }));
  const nq=$("next-q");if(nq)nq.addEventListener("click",()=>{generateQuestion();renderQuiz();});
}

// Sentence Builder
function renderSentenceBuilder(){
  const ex=SENTENCES[S.sbIndex];
  const shuffled=S.sbChecked?ex.correct:[...ex.words].sort(()=>Math.random()-0.5);
  if(!S.sbPlaced.length&&!S.sbChecked)S.sbPlaced=[];
  const avail=shuffled.filter((_,i)=>!S.sbPlaced.includes(i));
  const isCorrect=S.sbChecked&&S.sbPlaced.map(i=>shuffled[i]).join(" ")===ex.correct.join(" ");
  $("practice-content").innerHTML=`
<div class="quiz-card"><div class="quiz-prompt-label">Arrange the Latin words (${S.sbIndex+1}/${SENTENCES.length})</div>
<div class="sb-english">${ex.en}</div>
<div class="sb-answer" id="sb-answer">${S.sbPlaced.map((idx,pos)=>`<button class="sb-word" data-remove="${pos}">${shuffled[idx]}</button>`).join("")}${S.sbPlaced.length===0?'<span style="color:var(--brown-faint);font-size:0.85rem">Tap words below to build the sentence</span>':''}</div>
<div class="sb-words">${shuffled.map((w,i)=>`<button class="sb-word ${S.sbPlaced.includes(i)?'placed':''}" data-idx="${i}">${w}</button>`).join("")}</div>
${S.sbChecked?`<div class="quiz-feedback">${isCorrect?'<div class="correct-msg"><b>R\u0113ct\u0113!</b></div>':`<div class="wrong-msg"><b>Correct:</b> ${ex.correct.join(" ")}</div>`}</div>`:''}
<div style="text-align:center;margin-top:10px">${!S.sbChecked?`<button class="drill-btn" id="sb-check" ${S.sbPlaced.length<ex.correct.length?'disabled style="opacity:0.4"':''}>Check</button><button class="drill-btn" id="sb-clear" style="background:transparent;color:var(--brown-soft);border:1px solid var(--gold-border-strong)">Clear</button>`:`<button class="drill-btn" id="sb-next">Next Sentence \u2192</button>`}</div>
</div>`;
  document.querySelectorAll(".sb-words .sb-word:not(.placed)").forEach(b=>b.addEventListener("click",()=>{
    if(S.sbChecked)return;S.sbPlaced.push(parseInt(b.dataset.idx));renderSentenceBuilder();}));
  document.querySelectorAll("#sb-answer .sb-word").forEach(b=>b.addEventListener("click",()=>{
    if(S.sbChecked)return;S.sbPlaced.splice(parseInt(b.dataset.remove),1);renderSentenceBuilder();}));
  const checkBtn=$("sb-check");if(checkBtn)checkBtn.addEventListener("click",()=>{S.sbChecked=true;recordStudyDay();saveState();const sbWords=SENTENCES[S.sbIndex];const sbShuffled=[...sbWords.words].sort(()=>Math.random()-0.5);if(S.sbPlaced.map(i=>sbWords.words[i]).join(' ')===sbWords.correct.join(' ')){playCorrect();haptic('success');}else{playWrong();haptic('error');}renderSentenceBuilder();});
  const clearBtn=$("sb-clear");if(clearBtn)clearBtn.addEventListener("click",()=>{S.sbPlaced=[];renderSentenceBuilder();});
  const nextBtn=$("sb-next");if(nextBtn)nextBtn.addEventListener("click",()=>{S.sbIndex=(S.sbIndex+1)%SENTENCES.length;S.sbPlaced=[];S.sbChecked=false;renderSentenceBuilder();});
}
